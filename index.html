<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#060A12">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/favicon.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>AILEX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060A12; --panel:#0C1322; --panel2:#101A2E; --line:#1A2540;
  --ink:#E8EDF7; --dim:#8B97AE; --faint:#5A6680;
  --blue:#2F7DF6; --cyan:#41B8FF; --orange:#FF8A3C; --violet:#8A5CFF;
  --ok:#3DD68C; --err:#FF5C6C;
  --grad:linear-gradient(135deg,#41B8FF 0%,#8A5CFF 48%,#FF8A3C 100%);
  --r:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg); color:var(--ink);
  font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  font-size:16px; line-height:1.5; overflow-x:hidden;
}
body::before{ /* circuit atmosphere */
  content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(600px 360px at 85% -5%, rgba(255,138,60,.07), transparent 60%),
    radial-gradient(700px 420px at -10% 10%, rgba(47,125,246,.10), transparent 60%),
    radial-gradient(500px 500px at 50% 110%, rgba(138,92,255,.06), transparent 60%);
}
#app{position:relative;z-index:1;max-width:480px;margin:0 auto;min-height:100%;
  display:flex;flex-direction:column;padding:0 18px calc(24px + env(safe-area-inset-bottom))}
.topbar{display:flex;align-items:center;gap:10px;padding:18px 2px 14px;position:sticky;top:0;
  background:linear-gradient(var(--bg) 78%,transparent);z-index:5}
.logo-badge{width:34px;height:34px;border-radius:9px;background:#0B1020;border:1px solid var(--line);
  display:grid;place-items:center;flex:none;box-shadow:0 0 18px rgba(65,184,255,.18)}
.logo-badge span{font-family:'Chakra Petch';font-weight:700;font-size:19px;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.logo-word{font-family:'Chakra Petch';font-weight:700;font-size:21px;letter-spacing:.12em}
.logo-word b{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.top-status{margin-left:auto;font-size:11px;color:var(--faint);letter-spacing:.14em;text-transform:uppercase;
  font-family:'Chakra Petch'}
.top-status.online{color:var(--ok)}
.back-btn{background:none;border:none;color:var(--dim);font-size:22px;padding:4px 10px 4px 0;cursor:pointer}
.screen{flex:1;display:flex;flex-direction:column;animation:fadeUp .28s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

h1{font-family:'Chakra Petch';font-weight:600;font-size:22px;line-height:1.3;margin-bottom:6px}
h2{font-family:'Chakra Petch';font-weight:600;font-size:17px;margin-bottom:4px}
.sub{color:var(--dim);font-size:14px;margin-bottom:18px}
.eyebrow{font-family:'Chakra Petch';font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--cyan);margin-bottom:8px}

.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-bottom:14px}
.card.glow{box-shadow:0 0 0 1px rgba(65,184,255,.12),0 8px 40px rgba(47,125,246,.10)}

.btn{display:block;width:100%;border:none;border-radius:13px;padding:15px 18px;font-size:16px;font-weight:600;
  font-family:'Inter';cursor:pointer;text-align:center;transition:transform .08s ease,filter .15s}
.btn:active{transform:scale(.985)}
.btn:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
.btn-primary{background:linear-gradient(135deg,#2F7DF6,#1E5FD0);color:#fff;
  box-shadow:0 4px 24px rgba(47,125,246,.35),inset 0 1px 0 rgba(255,255,255,.18)}
.btn-accent{background:linear-gradient(135deg,#FF9A4D,#F0742A);color:#23150A;
  box-shadow:0 4px 24px rgba(255,138,60,.28)}
.btn-ghost{background:var(--panel2);color:var(--ink);border:1px solid var(--line)}
.btn-row{display:flex;gap:10px}.btn-row .btn{flex:1 1 0;min-width:0}
.btn-ico{flex:0 0 auto!important;width:auto;padding:14px!important;font-size:18px;line-height:1}
.btn[disabled]{opacity:.45;pointer-events:none}
.btn + .btn{margin-top:10px}
.btn-mini{display:inline-block;width:auto;padding:8px 14px;font-size:13px;border-radius:9px}

label.fld{display:block;margin-bottom:14px}
label.fld span{display:block;font-size:13px;color:var(--dim);margin-bottom:6px}
input[type=text],input[type=number],input[type=password],select,textarea{
  width:100%;background:#0A1120;border:1px solid var(--line);border-radius:11px;color:var(--ink);
  padding:13px 14px;font-size:16px;font-family:'Inter'}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(47,125,246,.18)}
textarea.ans-grow{resize:none;overflow:hidden;min-height:52px;line-height:1.45}

/* mastery ring (signature) */
.ring-wrap{display:grid;place-items:center;padding:10px 0 6px}
.ring{position:relative;width:210px;height:210px}
.ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.ring .core{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
.ring .core .lbl{font-size:12px;color:var(--dim);letter-spacing:.08em}
.ring .core .pct{font-family:'Chakra Petch';font-weight:700;font-size:46px;line-height:1.05;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.ring .ticks{position:absolute;inset:-9px;border-radius:50%;
  background:repeating-conic-gradient(rgba(91,113,160,.5) 0 .6deg,transparent .6deg 6deg);
  -webkit-mask:radial-gradient(circle, transparent 64%, #000 65%, #000 68%, transparent 69%);
  mask:radial-gradient(circle, transparent 64%, #000 65%, #000 68%, transparent 69%)}

/* segmented progress (like screenshot) */
.segbar{display:flex;gap:4px;margin:10px 0 4px}
.segbar i{flex:1;height:9px;border-radius:3px;background:#16203A}
.segbar i.on{background:linear-gradient(90deg,var(--cyan),var(--blue))}
.segbar i.on.hot{background:linear-gradient(90deg,var(--orange),#FFB071)}

.menu-list{display:flex;flex-direction:column;gap:10px}
.menu-item{display:flex;align-items:center;gap:14px;background:var(--panel);border:1px solid var(--line);
  border-radius:14px;padding:15px 16px;cursor:pointer;text-align:left;width:100%;color:var(--ink);font-family:'Inter'}
.menu-item:active{transform:scale(.985)}
.menu-item .ic{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-size:18px;flex:none;
  background:#0A1120;border:1px solid var(--line)}
.menu-item .t b{display:block;font-size:15px;font-weight:600}
.menu-item .t small{color:var(--dim);font-size:12.5px}
.menu-item .chev{margin-left:auto;color:var(--faint)}

.chiplist{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0 4px}
.chip{font-size:12.5px;color:var(--cyan);background:rgba(65,184,255,.08);border:1px solid rgba(65,184,255,.25);
  border-radius:999px;padding:5px 11px}
.chip.warn{color:var(--orange);background:rgba(255,138,60,.08);border-color:rgba(255,138,60,.3)}

/* drills */
.drill-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px}
.drill-head .n{font-family:'Chakra Petch';font-size:12px;letter-spacing:.14em;color:var(--cyan)}
.drill-head .ph{font-size:12px;color:var(--faint)}
.task-text{font-size:18px;font-weight:600;margin:8px 0 14px;line-height:1.45}
.opt{display:block;width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
  border-radius:12px;padding:14px;font-size:16px;margin-bottom:9px;cursor:pointer;font-family:'Inter'}
.opt:active{transform:scale(.99)}
.opt.right{border-color:var(--ok);background:rgba(61,214,140,.10)}
.opt.wrong{border-color:var(--err);background:rgba(255,92,108,.10)}
/* Lang picker */
.lang-opt:last-child{border-bottom:none!important}
.lang-opt:active{background:rgba(65,184,255,.08)}
.feedback{border-radius:12px;padding:13px 14px;font-size:14.5px;margin-top:10px;display:none;line-height:1.55}
.feedback.ok{display:block;background:rgba(61,214,140,.10);border:1px solid rgba(61,214,140,.35)}
.feedback.bad{display:block;background:rgba(255,92,108,.08);border:1px solid rgba(255,92,108,.32)}
/* A0 (Pre-A1) уровень */
.a0-pattern{text-align:center;margin:12px 0 8px;padding:12px;background:rgba(65,184,255,.08);border-radius:12px;border:1px solid rgba(65,184,255,.25)}
.a0-patt-main{font-size:28px;font-weight:700;color:var(--cyan);letter-spacing:2px}
.a0-ipa{display:block;font-size:16px;color:var(--orange);margin-top:4px}
.a0-examples{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.a0-example{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--panel2);border-radius:10px;border:1px solid var(--line)}
.a0-word{font-size:18px;font-weight:600;color:var(--ink)}
.a0-translit{color:var(--orange);font-size:14px}
.a0-trans{color:var(--dim);font-size:14px;margin-left:auto}
.opt.correct-opt{border-color:var(--ok);background:rgba(61,214,140,.15)}
.opt.wrong-opt{border-color:var(--err);background:rgba(255,92,108,.12)}
/* Алфавитная сетка A0 */
.a0-alpha-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin:10px 0}
.a0-alpha-cell{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:8px 4px;
  text-align:center;cursor:pointer;transition:transform .12s,border-color .12s;user-select:none}
.a0-alpha-cell:active{transform:scale(.94)}
.a0-alpha-cell.playing{border-color:var(--cyan)}
.a0-alpha-cell .a0-ltr{font-size:22px;font-weight:700;color:var(--cyan);line-height:1}
.a0-alpha-cell .a0-sound{font-size:11px;color:var(--orange);margin-top:3px}
.a0-alpha-cell .a0-ex{font-size:10px;color:var(--dim);margin-top:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
/* Мини-сцена A0 */
.a0-scene-other-line{background:var(--panel2);border-radius:12px;padding:10px 12px;margin-bottom:10px;border-left:3px solid var(--cyan)}
.a0-scene-you-line{background:rgba(255,184,65,.06);border-radius:12px;padding:10px 12px;margin-bottom:10px;border-left:3px solid var(--orange)}
.a0-scene-speaker{font-size:11px;color:var(--dim);margin-bottom:4px;font-weight:600;letter-spacing:.3px}
.a0-scene-target{font-size:17px;font-weight:600;color:var(--ink);line-height:1.4}
.a0-scene-translit{display:block;font-size:13px;color:var(--orange);margin-top:2px}
.a0-scene-native{font-size:13px;color:var(--dim);margin-top:4px;font-style:italic}
.a0-scene-say-box{background:var(--panel2);border-radius:12px;padding:14px;text-align:center;font-size:18px;font-weight:600;margin:10px 0;border:1px solid var(--line)}

.vocab-row{display:flex;align-items:center;gap:12px;padding:12px 2px;border-bottom:1px solid var(--line)}
.vocab-row:last-child{border-bottom:none}
.vocab-row .emoji{font-size:24px;flex:none}
.vocab-row .w b{font-size:16.5px}
.vocab-row .w .tr{color:var(--orange);font-size:13px;margin-left:6px}
.vocab-row .w small{display:block;color:var(--dim);font-size:13.5px}
.tts{margin-left:auto;background:#0A1120;border:1px solid var(--line);color:var(--cyan);width:38px;height:38px;
  border-radius:10px;font-size:16px;cursor:pointer;flex:none}

/* quest */
.scene{background:linear-gradient(180deg,var(--panel),#0A101E);border:1px solid var(--line);border-radius:var(--r);
  padding:18px;margin-bottom:12px}
.scene .target{font-size:17px;line-height:1.6;margin-bottom:8px}
.scene .hint{color:var(--dim);font-size:13.5px;font-style:italic}
.must{margin:8px 0}

/* chat (dialogue) */
.chat{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:6px 0 12px}
.msg{max-width:84%;padding:11px 14px;border-radius:14px;font-size:15.5px;line-height:1.5}
.msg.ai{background:var(--panel);border:1px solid var(--line);align-self:flex-start;border-bottom-left-radius:4px}
.msg.ai small{display:block;color:var(--dim);font-size:12.5px;margin-top:5px}
.msg.user{background:linear-gradient(135deg,#2F7DF6,#1E5FD0);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.chat-input{display:flex;gap:8px;align-items:center;padding-top:8px;border-top:1px solid var(--line)}
.chat-input input{flex:1}
.mic{width:50px;height:50px;border-radius:50%;border:1px solid var(--line);background:var(--panel2);color:var(--ink);
  font-size:20px;cursor:pointer;flex:none}
.mic.rec{background:var(--err);border-color:var(--err);animation:pulse 1s infinite}
@keyframes pulse{50%{box-shadow:0 0 0 10px rgba(255,92,108,.15)}}

/* toast */
#toast{position:fixed;left:50%;bottom:34px;transform:translateX(-50%) translateY(20px);opacity:0;z-index:50;
  background:#0E1A12;border:1px solid rgba(61,214,140,.4);color:#BFF3DA;padding:11px 20px;border-radius:999px;
  font-size:14.5px;transition:.3s;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%)}
#toast.neutral{background:var(--panel2);border-color:var(--line);color:var(--ink)}

/* loader */
.loader{display:flex;flex-direction:column;align-items:center;gap:16px;padding:48px 0;color:var(--dim);font-size:14px}
.spin{width:46px;height:46px;border-radius:50%;border:3px solid #1A2540;border-top-color:var(--cyan);
  border-right-color:var(--orange);animation:rot .9s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}

.kpi{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.kpi .box{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:13px 14px}
.kpi .box b{font-family:'Chakra Petch';font-size:21px;display:block}
.kpi .box small{color:var(--dim);font-size:12px}
.note{font-size:13px;color:var(--faint);line-height:1.55;margin-top:10px}
.divider{height:1px;background:var(--line);margin:14px 0}
.steps-guide{counter-reset:s;margin:10px 0}
.steps-guide p{position:relative;padding-left:34px;margin-bottom:12px;font-size:14.5px;color:var(--ink)}
.steps-guide p::before{counter-increment:s;content:counter(s);position:absolute;left:0;top:1px;width:23px;height:23px;
  border-radius:50%;background:var(--panel2);border:1px solid var(--line);color:var(--cyan);
  font-family:'Chakra Petch';font-size:12px;display:grid;place-items:center}
a{color:var(--cyan)}
.tapword{cursor:pointer;border-bottom:1.5px dashed var(--orange);transition:opacity .15s}
.tapword:active{opacity:.55}
.tapall{cursor:pointer;border-bottom:1px dashed rgba(255,255,255,.2);transition:opacity .15s}
.tapall:active{opacity:.55}
.chapter-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin:10px 0}
</style>
</head>
<body>
<div id="app">
  <div class="topbar" id="topbar">
    <button class="back-btn" id="btnBack" style="display:none" aria-label="Назад">‹</button>
    <div class="logo-badge"><span>A</span></div>
    <div class="logo-word">AI<b>LEX</b></div>
    <div class="top-status" id="sysStatus">SYSTEM ONLINE</div>
  </div>
  <div class="screen" id="screen"></div>
</div>
<div id="toast"></div>
<script>
/* ===================================================================
   AILEX 4.1 — реализация методической конституции.
   Принципы: логика → приложение (state machine), контент → Gemini,
   хранилище → изолированный модуль Storage (сейчас локально + экспорт
   JSON «AILEX_StatusDB»; слой подменяется на Google Sheets без
   изменения остального кода). Gemini не знает о базе и не пишет в неё.
   =================================================================== */
"use strict";
/* Версия сборки — должна совпадать с CACHE в sw.js. Показывается в шапке. */
const APP_VERSION = 'v67';
/* 4.29: ключ хранилища незавершённых занятий ЗАФИКСИРОВАН навсегда — версия схемы живёт ВНУТРИ
   снимка. Прежний ключ нёс номер билда, поэтому каждое обновление приложения убивало
   незавершённый урок у всех пользователей. Старые ключи разово переносятся в новый формат. */
const EPISODES_KEY = 'AILEX_episodes';
const EPISODES_SCHEMA = 1;
const EPISODES_MAX = 5;   // сколько незавершённых занятий держим на профиль (вытесняется самое старое)
const LEGACY_CACHE_KEYS = ['AILEX_lesson_cache_v46','AILEX_lesson_cache_v45'];
/* ---------- Локализация интерфейса (i18n, версия 4.13, пункт 13) ----------
   Русский — исходный язык строк. Для другого языка интерфейса строки берутся из
   встроенного словаря (en) или автопереводятся через Gemini и кэшируются на устройстве. */
const I18N = {
  lang: 'ru',
  registry: new Set(),
  dict: {
    en: {
      'Проверить':'Check','Дальше':'Next','Подсказка':'Hint','Правило':'Rule','В меню':'Menu',
      'Повторить':'Retry','Готово':'Done','Назад':'Back','Продолжить':'Continue','Начать':'Start',
      'Профили':'Profiles','Словарь':'Dictionary','Свод правил':'Rules','Настройки':'Settings',
      'Новые слова':'New words','Слова задания':'Task words','Понадобятся':'You will need',
      'SYSTEM ONLINE':'SYSTEM ONLINE','С возвращением':'Welcome back',
      'Готовлю урок':'Preparing lesson','Догружаю урок…':'Loading lesson…','Готовлю Суперквест…':'Preparing Superquest…',
      'Догружаю Суперквест…':'Loading Superquest…','Проверяю…':'Checking…',
      'Не получилось подготовить урок':'Could not prepare the lesson',
      'Напишите предложение, подставив пропущенное слово':'Write the sentence with the missing word filled in',
      'Напишите предложение целиком':'Write the full sentence','Одно слово':'One word','Ваш ответ':'Your answer','Ваша фраза…':'Your phrase…',
      'Верно':'Correct','Опорные слова':'Key words','Запомните и введите верный вариант, чтобы продолжить.':'Memorize and type the correct answer to continue.',
      'Импортировать свои слова':'Import my words','Свой словарь (интенсив)':'My vocabulary (intensive)',
      'к изучению':'to learn','трудное':'hard','встречено в контексте':'seen in context',
      'Закрепление правила':'Rule reinforcement','Понятно, дальше':'Got it, next',
      'Слово в контексте':'Word in context','Повторение':'Review','Повторение в контексте':'Review in context',
      // --- 4.25: расширение охвата (реестр, Приложение А) ---
      'Поговорить':'Talk','Суперквест':'Superquest','Аналитика':'Analytics','Профиль':'Profile',
      'Отправить':'Send','Ответить':'Reply','Далее':'Next','Отмена':'Cancel','Сохранить':'Save',
      'Начать экзамен':'Start exam','Пересдать экзамен':'Retake exam','Начать разбор':'Start review',
      'Подробнее':'More','Повторить сцену':'Repeat scene','Попробовать снова':'Try again','Проверить ещё раз':'Check again',
      'Завершить диалог':'End dialogue','Завершить Суперквест':'End Superquest',
      'В главное меню':'To main menu','К главному меню':'To main menu','Выход в меню':'Exit to menu',
      'К заданиям':'To exercises','Добавить в словарь':'Add to dictionary','Сохранить профиль':'Save profile',
      'Экспорт':'Export','Импорт':'Import','Заменить ключ':'Replace key','Позже':'Later',
      'Как пользоваться':'How to use','Показать подсказки заново':'Show hints again','Понятно ✓':'Got it ✓',
      'Определение уровня':'Level check','Кто занимается?':'Who is studying?','Новый профиль':'New profile',
      'Профиль создан':'Profile created','Работа над ошибками':'Working on mistakes','Квест завершён':'Quest complete',
      'База AILEX_StatusDB':'AILEX_StatusDB database','Ключ Gemini':'Gemini key','Ключ доступа к Gemini':'Gemini access key',
      'Нет связи с сервером':'No server connection','Связь прервалась':'Connection lost','Похоже, заблокирована сеть':'The network seems blocked',
      'Подсказки':'Hints','Справка':'Help','Экзамен':'Exam','Чекпойнт':'Checkpoint',
      'Ваша фраза…':'Your phrase…','Или напишите ответ…':'Or type your reply…','Поиск языка…':'Search language…',
      'Имя':'Name','Возраст':'Age','Удалить профиль и начать заново':'Delete profile and start over'
    }
  },
  init() {
    try {

  t(s) {

/* ===== Интервальное повторение слов (спека 4.27) — только логика приложения =====
   Спокойный слой: выученное слово всплывает через 1 → 3 → 7 → 30 дней. Верно — ступень выше,
   ошибка — сброс на день 1. Вершина (прошёл 30 дней) → «освоено», снят с графика.
   Срочный слой (reviewQueue / импорт / интенсив) — отдельно, всплывает сразу, минуя даты.
   Расписание держим в числовом поле srs_due (номер дня): today() формата ДД.ММ.ГГ не сравнить хронологически. */
const SRS_GAP  = [1, 3, 7, 30];      // дней до следующего показа при текущей ступени 0..3
const SRS_DONE = SRS_GAP.length;     // 4 = вершина: слово освоено, снято с графика
const _dayNum  = () => Math.floor(Date.now() / 86400000);
const SRS = {
  initLearned(v){ if (!v) return; v.srs_stage = 0; v.srs_due = _dayNum() + SRS_GAP[0]; },   // выучено сегодня → показ через 1 день
  review(v, ok){
    if (!v) return;
    const s = (typeof v.srs_stage === 'number') ? v.srs_stage : 0;
    if (ok){
      const ns = s + 1;
      if (ns >= SRS_DONE){ v.srs_stage = SRS_DONE; v.srs_due = null; v.status = 'освоено'; }   // вершина лестницы
      else { v.srs_stage = ns; v.srs_due = _dayNum() + SRS_GAP[ns]; }
    } else {
      v.srs_stage = 0; v.srs_due = _dayNum() + SRS_GAP[0];                                     // сброс на день 1
      if (v.status === 'освоено') v.status = 'на закреплении';                                 // сорвалось освоенное — вернулось в круг
    }
  },
  onLadder(v){ return !!v && typeof v.srs_stage === 'number' && v.srs_stage < SRS_DONE && v.srs_due != null; },
  due(v){ return SRS.onLadder(v) && v.srs_due <= _dayNum(); },
  overdue(v){ return SRS.onLadder(v) ? (_dayNum() - v.srs_due) : -1e9; }   // больше = дольше просрочено
};

  .replace(/ß/g,'ss');
const shuffle = a => { a = a.slice(); for (let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; };
const pick = (a,n) => shuffle(a).slice(0,n);

/* ---------- баланс лексики по CEFR (раздел 5.0, бытовое/интересы) ---------- */
const SURVIVAL_SHARE = { A1:0.40, A2:0.35, B1:0.30, B2:0.25, C1:0.20, C2:0.20 };

/* =====================================================================
   STORAGE — изолированный слой хранения (раздел 2.0–2.4).
   Сейчас: локальная база устройства + экспорт/импорт файла
   «AILEX_StatusDB.json». Замена на Google Sheets (OAuth drive.file)
   меняет ТОЛЬКО этот объект — остальной код о хранилище не знает.
   Структура повторяет четыре листа: Профиль / Прогресс / Словарь / Аналитика.
   ===================================================================== */
const Storage = {
  DB_KEY: 'AILEX_StatusDB',     // прежняя одиночная база (для миграции)
  VAULT_KEY: 'AILEX_Vault',     // сейф с несколькими профилями (4.6)
  API_KEY: 'AILEX_GEMINI_KEY',  // ключ Gemini — общий для устройства
  getKey(){ return localStorage.getItem(this.API_KEY) || ''; },
  setKey(k){ localStorage.setItem(this.API_KEY, k.trim()); },

  _readVault(){ try { return JSON.parse(localStorage.getItem(this.VAULT_KEY)); } catch(e){ return null; } },
  _writeVault(v){ localStorage.setItem(this.VAULT_KEY, JSON.stringify(v)); },
  _newId(){ return 'p' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); },

  // миграция: если сейфа нет, но есть прежняя одиночная база — заворачиваем её в первый профиль
  migrate(){
    let v = this._readVault();
    if (v && Array.isArray(v.profiles)) return v;
    let old = null; try { old = JSON.parse(localStorage.getItem(this.DB_KEY)); } catch(e){}
    if (old && old.profile) {
      const id = this._newId();
      v = { schema:'4.6', activeId:id, profiles:[{ id, db: old }] };
      this._writeVault(v);
      return v;
    }
    return null;
  },

  listProfiles(){
    const v = this._readVault();
    if (!v || !Array.isArray(v.profiles)) return [];
    return v.profiles.map(p => ({ id:p.id, name:(p.db.profile||{}).name||'Профиль',
      nativeLang:(p.db.profile||{}).nativeLang, targetLang:(p.db.profile||{}).targetLang,
      cefr:(p.db.profile||{}).cefr, active: p.id===v.activeId }));
  },
  activeId(){ const v=this._readVault(); return v ? v.activeId : null; },
  switchTo(id){ const v=this._readVault(); if (v && v.profiles.some(p=>p.id===id)){ v.activeId=id; this._writeVault(v); } },

  // load: возвращает базу активного профиля (совместимо со старым кодом)
  load(){
    const v = this._readVault();
    if (!v || !v.profiles.length) return null;
    const p = v.profiles.find(x=>x.id===v.activeId) || v.profiles[0];
    return p ? ensureDbArrays(p.db) : null;   // 4.26: базы, созданные до v64, приходят без core/coreMeta
  },
  // save: записывает базу активного профиля обратно в сейф (совместимо: Storage.save(DB))
  save(d){
    let v = this._readVault();
    if (!v || !v.profiles.length) { return this.addProfile(d); }       // первый профиль
    let p = v.profiles.find(x=>x.id===v.activeId) || v.profiles[0];
    p.db = d; this._writeVault(v);
  },
  // addProfile: создаёт новый профиль и делает его активным; возвращает id
  addProfile(d){
    let v = this._readVault() || { schema:'4.6', activeId:null, profiles:[] };
    const id = this._newId();
    v.profiles.push({ id, db: d }); v.activeId = id; this._writeVault(v);
    return id;
  },
  // wipe: удаляет активный профиль; если остались — переключает на первый
  wipe(){
    let v = this._readVault();
    if (!v) { localStorage.removeItem(this.DB_KEY); return; }
    v.profiles = v.profiles.filter(p => p.id !== v.activeId);
    if (v.profiles.length){ v.activeId = v.profiles[0].id; this._writeVault(v); }
    else { localStorage.removeItem(this.VAULT_KEY); localStorage.removeItem(this.DB_KEY); }
  },

  newDB(profile) {
    return {
      meta: { app:'AILEX', schema:'4.6', created: today() },
      profile,                       // лист «Профиль» (6 полей, раздел 2.2)
      progress: [],                  // лист «Прогресс» (раздел 2.3)
      vocab: [],                     // лист «Словарь» (раздел 2.3-С) = KNOWN_VOCAB
      rules: [],                     // часть «Свод правил» (раздел 2.3-П)
      errorTypes: {},                // счётчик типов ошибок (4.5)
      analytics: [],                 // лист «Аналитика» (раздел 2.6)
      nextStage: '',                 // код следующего этапа
      reviewQueue: [],               // очередь повторения (трудные слова)
      examAttempts: {},              // попытки экзаменов по уровню
      core: [],                      // лист «Ядро языка» (раздел 2.3-Я, 4.26) — склад слов, человеку списком не показывается
      coreMeta: { closedDone:false, levels:[], topicKey:'' },
    };
  },
  // экспорт: весь сейф (все профили) одним файлом
  exportFile() {
    const v = this._readVault() || { schema:'4.6', activeId:null, profiles:[] };
    const blob = new Blob([JSON.stringify(v, null, 2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'AILEX_StatusDB.json';
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href), 4000);
  },
  // импорт: принимает файл-сейф (новый формат) или прежнюю одиночную базу
  importFile(file, cb) {
    const r = new FileReader();
    r.onload = () => {
      try {
        const d = JSON.parse(r.result);
        if (d && Array.isArray(d.profiles) && d.profiles.length) {        // новый формат — сейф
          this._writeVault(d); cb(true);
        } else if (d && d.profile && Array.isArray(d.vocab)) {            // старый формат — одиночная база
          const id = this._newId();
          this._writeVault({ schema:'4.6', activeId:id, profiles:[{ id, db:d }] }); cb(true);
        } else throw 0;
      } catch(e){ cb(false); }
    };
    r.readAsText(file);
  }
};

// дозаполнение полей для баз, созданных в старых версиях
function ensureDbArrays(d){
  if (!d) return d;
  if (!Array.isArray(d.rules)) d.rules = [];
  if (!d.errorTypes) d.errorTypes = {};
  if (!Array.isArray(d.reviewQueue)) d.reviewQueue = [];
  if (!Array.isArray(d.analytics)) d.analytics = [];
  if (!d.examAttempts) d.examAttempts = {};
  if (!Array.isArray(d.core)) d.core = [];                                   // 4.26: Ядро языка
  if (!d.coreMeta) d.coreMeta = { closedDone:false, levels:[], topicKey:'' };
  if (!Array.isArray(d.coreMeta.levels)) d.coreMeta.levels = [];
  return d;
}

let DB = null;

/* =====================================================================
   GEMINI — единственная роль: язык. Строгий JSON-контракт (раздел 2.5).
   Модель не знает о базе, не пишет в неё, получает задание на один шаг.
   ===================================================================== */
const Gemini = {
  MODELS: ['gemini-3.1-flash-lite', 'gemini-3.5-flash', 'gemini-2.5-flash'],  // только живые модели (июнь 2026); порядок по лимитам Free Tier: 3.1-flash-lite=30 RPM/1M TPM, 3.5-flash=15 RPM/250k, 2.5-flash=10 RPM/250k (фолбэк, EOL окт.2026)
  preferred: null,   // последняя успешно ответившая модель — пробуем её первой
  SYSTEM: 'Ты — языковой генератор приложения AILEX (учитель иностранных языков по CEFR; строгий, лаконичный наставник). '
        + 'Отвечай ВСЕГДА одним валидным JSON-объектом точно по запрошенной схеме, без markdown, без текста вне JSON. '
        + 'Все пояснения для ученика — строго на языке native_lang. Жёстко держи уровень CEFR. Никакого оффтопа.',
  async validateKey() {
    // Простой GET к списку моделей: status 400/403 = плохой ключ,
    // TypeError (Failed to fetch) = блокировка сети/просмотрщика, а не ключ.
    const key = Storage.getKey();
    if (!key) throw new Error('NO_KEY');
    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${encodeURIComponent(key)}`);
    if (r.status === 400 || r.status === 403) { const j = await r.json().catch(()=>null); throw new Error('KEY:'+(j?.error?.message||r.status)); }
    if (!r.ok) throw new Error('HTTP '+r.status);
    return true;
  },
  async call(contract, schema) {
    const key = Storage.getKey();
    if (!key) throw new Error('NO_KEY');
    const body = {
      systemInstruction: { parts: [{ text: this.SYSTEM }] },
      contents: [{ role:'user', parts: [{ text:
        'ЗАДАНИЕ (строгий контракт):\n' + JSON.stringify(contract) +
        '\n\nСХЕМА ОТВЕТА (верни ровно такой JSON):\n' + schema }] }],
      generationConfig: { temperature: 0.7, responseMimeType: 'application/json', thinkingConfig: { thinkingBudget: 0 } }
    };
    const sleep = ms => new Promise(res => setTimeout(res, ms));
    let lastErr = null;
    // сначала пробуем запомненную рабочую модель, затем остальные
    const order = this.preferred ? [this.preferred, ...this.MODELS.filter(m=>m!==this.preferred)] : this.MODELS.slice();
    for (const m of order) {
      // до 3 попыток на модель: при 429 (лимит запросов) ждём и повторяем ту же модель
      for (let attempt = 0; attempt < 3; attempt++) {
        try {
          const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${encodeURIComponent(key)}`,
            { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
          if (r.status === 400 || r.status === 403) { const j = await r.json().catch(()=>null); throw new Error('KEY:'+(j?.error?.message||r.status)); }
          if (r.status === 429) {                       // превышен лимит запросов
            lastErr = new Error('HTTP 429 ('+m+')');
            if (attempt < 2) { await sleep(2000 * (attempt + 1)); continue; }  // подождать и повторить ту же модель
            break;                                      // не вышло — к следующей модели
          }
          if (!r.ok) { lastErr = new Error('HTTP '+r.status+' ('+m+')'); await sleep(500); break; }  // иная ошибка — пауза 0.5с, к следующей модели
          const j = await r.json();
          const txt = (j.candidates?.[0]?.content?.parts||[]).map(p=>p.text||'').join('');
          const clean = txt.replace(/```json|```/g,'').trim();
          if (!clean) { lastErr = new Error('EMPTY ('+m+')'); await sleep(500); break; }   // пустой ответ — пауза 0.5с, к следующей модели
          try { const out = JSON.parse(clean); this.preferred = m; return out; }
          catch(pe) {
            const s = clean.indexOf('{'), e = clean.lastIndexOf('}');
            if (s >= 0 && e > s) { try { const out = JSON.parse(clean.slice(s, e+1)); this.preferred = m; return out; } catch(_){} }
            lastErr = new Error('BAD_JSON ('+m+')'); await sleep(500); break;
          }
        } catch(e) {
          if (String(e.message).startsWith('KEY:')) throw e;
          lastErr = e; break;
        }
      }
    }
    throw lastErr || new Error('GEMINI_FAIL');
  }
};

/* ---------- TTS / STT (раздел 5.0 «Чтение и звучание», 5.B) ---------- */
function speak(text, langCode) {
  const bcp = langBcp(langCode);
  if (!bcp) return;          // нет надёжной озвучки → только транскрипция
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = bcp; u.rate = 0.92;
    speechSynthesis.speak(u);
  } catch(e){}
}
/* Кнопка повтора озвучки целевой фразы в блоках обратной связи.
   Возвращает пустую строку если у целевого языка нет TTS. */
function sayBtn(text) {
  if (!DB || !hasTTS(DB.profile.targetLang)) return '';
  return `<button class="tts" style="width:34px;height:34px;font-size:15px;vertical-align:middle;margin-left:8px" `
       + `data-say="${esc(text)}" onclick="replaySay(this)" aria-label="Повторить озвучку">🔊</button>`;
}
function replaySay(el) {
  speak(el.getAttribute('data-say'), (DB && DB.profile && DB.profile.targetLang) || 'de');
}
function makeRecognizer(langCode, onResult, onEnd) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const bcp = langBcp(langCode);
  if (!bcp) return null;     // STT тоже недоступен без BCP-47
  const r = new SR();
  r.lang = bcp; r.interimResults = false; r.maxAlternatives = 1;
  r.onresult = e => onResult(e.results[0][0].transcript);
  r.onend = onEnd; r.onerror = onEnd;
  return r;
}

// Переводит интерфейс: заменяет ТОЛЬКО текстовые узлы, целиком совпадающие со служебной строкой
// из словаря (кнопки/заголовки). Учебный контент так не затрагивается. Для ru — ничего не делает.
function localizeDOM(root) {
  if (!root || I18N.lang === 'ru') return;
  const d = I18N.dict[I18N.lang], known = I18N.dict.en || {};
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
  const nodes = []; let n;
  while ((n = walker.nextNode())) nodes.push(n);
  nodes.forEach(node => {
    const raw = node.nodeValue, key = raw.trim();
    if (!key || known[key] === undefined) return;   // переводим только известные служебные строки
    I18N.registry.add(key);
    if (d && d[key] != null) node.nodeValue = raw.replace(key, d[key]);
  });
}

/* 4.25: второй путь перевода — целые HTML-абзацы (подсказки, справка «Как пользоваться»).
   localizeDOM не годится (он подменяет только короткие надписи по точному совпадению).
   Переводим блок целиком через Gemini, кэшируем по языку+ключу в AILEX_UI_BLOCKS.
   Деградация: кэш → Gemini → русский исходник (blockEl уже показывает русский).
   Русский язык — исходник, ничего не делаем. */
const BLOCK_CACHE_KEY = 'AILEX_UI_BLOCKS';
function _blockCache() { try { return JSON.parse(localStorage.getItem(BLOCK_CACHE_KEY)||'{}'); } catch(_) { return {}; } }
function _blockCacheSave(c) { try { localStorage.setItem(BLOCK_CACHE_KEY, JSON.stringify(c)); } catch(_){} }
async function localizeBlocks(blockEl, key, sourceHtml) {
  if (!blockEl || I18N.lang === 'ru') return;              // русский — исходник
  const lang = I18N.lang, cache = _blockCache();
  const hit = cache[lang] && cache[lang][key];
  if (hit) { blockEl.innerHTML = hit; return; }            // из кэша — мгновенно, офлайн
  if (typeof Gemini === 'undefined' || !Gemini.key) return; // нет ключа — остаётся русский
  try {
    const res = await Gemini.call({
      task:'translate_block', target_ui_lang: lang, html: sourceHtml,
      rules:'Переведи ТЕКСТ этого HTML-фрагмента интерфейса языкового приложения на язык target_ui_lang. Это инструкция-подсказка для пользователя: переводи естественно и понятно носителю языка, а не дословно. СОХРАНИ всю HTML-разметку (теги <b>, <br>, <div>, <p>, class, style), эмодзи и структуру без изменений — переводи только видимый человеку текст между тегами. Верни ТОЛЬКО переведённый HTML, без пояснений и без обёрток ```.'
    }, '{"html":"переведённый HTML-фрагмент"}');
    const out = res && res.html;
    if (out && String(out).trim()) {
      blockEl.innerHTML = out;
      cache[lang] = cache[lang] || {}; cache[lang][key] = out; _blockCacheSave(cache);
    }
  } catch(_) { /* не вышло — остаётся русский исходник, обучение не блокируется */ }
}

/* ---------- коды этапов (раздел 2.1, 7) ---------- */
const LEVELS = ['A1','A2','B1','B2','C1','C2'];
const LESSONS_PER_SUB = 25;          // Checkpoint после 25, Final после 50
const EXAM_PASS = 0.85;              // порог 85%
function parseCode(code){
  const m = code.match(/^([ABC][12])\.(\d)\.(\d+)$/); if (m) return {lvl:m[1], sub:+m[2], n:+m[3]};
  const m0 = code.match(/^A0\.1\.(\d+)$/); if (m0) return {lvl:'A0', sub:1, n:+m0[1]};
  return null;
}
function fmtCode(lvl,sub,n){ return `${lvl}.${sub}.${String(n).padStart(2,'0')}`; }
/* Определяем количество уроков A0 по "дистанции" систем письма */
function getA0Total(nativeLang, targetLang) {
  const ideographic = ['zh','ja','ko'];                         // иероглифы
  const nonLatin    = ['ar','he','fa','th','hi','bn','ta','te','am','ur','ml','kn','gu','si'];
  const cyrillic    = ['ru','uk','bg','sr','mk','be'];
  const greek       = ['el'];
  const georgian    = ['ka'];
  const armenian    = ['hy'];
  const otherAlpha  = [...cyrillic,...greek,...georgian,...armenian];
  if (ideographic.includes(targetLang) || nonLatin.includes(targetLang)) return 15;
  const nIsLatin = !ideographic.includes(nativeLang) && !nonLatin.includes(nativeLang) && !otherAlpha.includes(nativeLang);
  const tIsLatin = !ideographic.includes(targetLang) && !nonLatin.includes(targetLang) && !otherAlpha.includes(targetLang);
  if (nIsLatin !== tIsLatin) return 10;
  return 6;  // оба латинские (или оба кириллические) — только правила чтения
}
/* Определяем тип блока A0 по номеру урока (9 блоков, версия 4.17-rev2) */
function getA0Block(lessonN, total) {
  const pct = lessonN / total;
  if (pct <= 0.17) return { block:'phonics',          focus:'полный алфавит с транскрипцией и произношением',                    hasMiniScene: false };
  if (pct <= 0.33) return { block:'phonics',          focus:'сложные буквосочетания, диграфы и особые звуки',                    hasMiniScene: false };
  if (pct <= 0.42) return { block:'first_contact',    focus:'приветствия, прощания, знакомство: имя, откуда, как дела',          hasMiniScene: true  };
  if (pct <= 0.52) return { block:'numbers_colors',   focus:'числа 1-100, основные цвета',                                      hasMiniScene: false };
  if (pct <= 0.62) return { block:'time_basics',      focus:'сегодня/завтра/вчера, утро/день/вечер, дни недели, месяцы',        hasMiniScene: true  };
  if (pct <= 0.70) return { block:'family_world',     focus:'члены семьи, профессии, предметы вокруг (телефон, ключ, деньги)',  hasMiniScene: false };
  if (pct <= 0.79) return { block:'food_body',        focus:'еда и напитки (выживательный минимум), части тела, самочувствие', hasMiniScene: true  };
  if (pct <= 0.88) return { block:'orientation_shop', focus:'вопросительные слова (где? что? как?), направления, магазин',      hasMiniScene: true  };
  return                  { block:'first_sentences',  focus:'первые конструкции: я есть, это есть, у меня есть, я хочу',        hasMiniScene: true  };
}
function nextAfterLesson(code) {
  // A0: пошагово до конца → A1.1.01
  const a0m = code.match(/^A0\.1\.(\d+)$/);
  if (a0m) {
    const n = +a0m[1], total = DB?.profile?.a0Total || 12;
    if (n >= total) return 'A1.1.01';
    return `A0.1.${String(n+1).padStart(2,'0')}`;
  }
  const p = parseCode(code); if (!p) return code;
  if (p.n >= LESSONS_PER_SUB) return `EXAM_${p.lvl}.${p.sub}`;     // экзамен подуровня
  return fmtCode(p.lvl, p.sub, p.n+1);
}
function nextAfterExamPass(examCode) {
  const m = examCode.match(/^EXAM_([ABC][12])\.(\d)$/); if (!m) return 'A1.1.01';
  const lvl = m[1], sub = +m[2];
  if (sub === 1) return fmtCode(lvl, 2, 1);
  const i = LEVELS.indexOf(lvl);
  return fmtCode(LEVELS[Math.min(i+1, LEVELS.length-1)], 1, 1);
}
function masteryPercent() {
  const a = DB?.analytics || [];
  if (!a.length) return 0;
  const lvl = currentLevel();
  // берём записи текущего уровня (урок/Суперквест/экзамен этого уровня)
  const ofLevel = a.filter(x => {
    const p = parseCode(String(x.lesson||'').replace('SUPER_','').replace('EXAM_',''));
    return p && p.lvl === lvl;
  });
  const set = ofLevel.length ? ofLevel : a;   // если по уровню ещё нет данных — по всем
  return Math.round(set.reduce((s,x)=>s+(x.accuracy_first_try||0),0)/set.length*100);
}
/* Прогресс по текущему уровню CEFR = доля пройденных уроков уровня (4.8).
   Уровень = 2 подуровня × LESSONS_PER_SUB уроков (по умолчанию 25+25 = 50). */
function currentLevel() {
  const next = String(DB?.nextStage||'');
  if (next.startsWith('A0.')) return 'A0';
  const p = parseCode(next.replace('SUPER_','').replace('EXAM_',''));
  return (p && p.lvl) || DB?.profile?.cefr || 'A1';
}
function levelProgress() {
  const next = String(DB?.nextStage||'');
  // A0: особая шкала
  const a0m = next.match(/^A0\.1\.(\d+)$/);
  if (a0m || DB?.profile?.cefr === 'A0') {
    const n     = a0m ? +a0m[1] - 1 : 0;   // пройдено (текущий ещё не пройден)
    const total = DB?.profile?.a0Total || 12;
    const pct   = Math.round(Math.max(0,n) / total * 100);
    return { lvl:'A0', done: Math.max(0,n), total, pct };
  }
  // A1+ стандарт
  const total = LESSONS_PER_SUB * 2;
  const raw   = next.replace('SUPER_','');
  const lvl   = currentLevel();
  let done = 0;
  const em = raw.match(/^EXAM_([ABC][12])\.(\d)$/);
  if (em) {
    done = (+em[2] === 1) ? LESSONS_PER_SUB : total;
  } else {
    const p = parseCode(raw);
    if (p) done = (p.sub === 1 ? 0 : LESSONS_PER_SUB) + (p.n - 1);
  }
  done = Math.max(0, Math.min(total, done));
  const pct = Math.round(done / total * 100);
  return { lvl, done, total, pct };
}

const Core = {
  _pf: false, _failed: false,
  list(){ return (DB && Array.isArray(DB.core)) ? DB.core : []; },
  meta(){ if (!Array.isArray(DB.core)) DB.core = [];
          if (!DB.coreMeta) DB.coreMeta = { closedDone:false, levels:[], topicKey:'' };
          if (!Array.isArray(DB.coreMeta.levels)) DB.coreMeta.levels = []; return DB.coreMeta; },
  // уровень, для которого нужен открытый класс: на A0 ядро не используется (у A0 свой контракт a0_lesson),
  // но как только человек переходит на A1 — сборка запускается сама (см. needsBuild)
  lvlFor(p){ const l = (p && p.cefr) || 'A1'; return (l === 'A0' || !CORE_LEVELS.includes(l)) ? 'A1' : l; },
  topicKey(){ return norm(String((DB.profile && DB.profile.interests) || '')).slice(0,80); },
  _known(){ const s = new Set();
    this.list().forEach(w => s.add(norm(w.term)));
    (DB.vocab||[]).forEach(w => s.add(norm(w.term)));
    return s; },
  // exclude — помощь модели, а НЕ гарантия: гарантию даёт сверка на устройстве при записи (_add)
  _exclude(){ const a = this.list().map(w=>w.term).slice(-160).concat((DB.vocab||[]).map(w=>w.term).slice(-90));
              return [...new Set(a)]; },

  _add(words, tag){
    if (!Array.isArray(DB.core)) DB.core = [];
    const seen = this._known(); let n = 0;
    (words||[]).forEach(w => {
      if (!w || !w.term || !w.translation) return;
      const term = String(w.term).trim(); const k = norm(term);
      if (!k || k.length > 40 || seen.has(k)) return;
      seen.add(k); n++;
      DB.core.push({ term, translation: String(w.translation).trim(), translit: w.translit||'', emoji: w.emoji||'',
        part_of_speech: w.part_of_speech||'', article: w.article||'', forms: w.forms||'',
        is_irregular: w.is_irregular === true,
        cefr: CORE_LEVELS.includes(w.cefr) ? w.cefr : (tag.cefr || 'A1'),
        topic: w.topic||'', freq_rank: (+w.freq_rank || 999),
        klass: tag.klass, layer: tag.layer, status: 'склад',
        topicKey: tag.layer === 'interests' ? this.topicKey() : '' });
    });
    return n;
  },

  async _batch(o){
    const p = DB.profile;
    const req = { task:'generate_core', target_lang:p.targetLang, native_lang:p.nativeLang,
                  cefr:o.cefr, class:o.class, count:o.count, exclude:this._exclude(), rules:CORE_RULES };
    if (o.layer) req.layer = o.layer;
    if (o.part)  req.part  = o.part;
    if (o.hint)  req.hint  = o.hint;
    if (o.topic) req.topic = o.topic;
    const r = await Gemini.call(req, CORE_SCHEMA + ' — ровно ' + o.count + ' объектов');
    return r.words || [];
  },

  // закрытые классы целиком + открытый класс уровня (раздел 4.4)
  async build(onStep){
    const meta = this.meta(), total = CLOSED_BATCHES.length + 5;
    if (!meta.closedDone){
      for (let i=0; i<CLOSED_BATCHES.length; i++){
        const b = CLOSED_BATCHES[i];
        onStep && onStep(`Собираю основу языка — служебные слова и неправильные глаголы… ${i+1}/${total}`);
        const w = await this._batch({ class:'closed', part:b.part, hint:b.hint, count:b.count, cefr:'A1' });
        this._add(w, { klass:'closed', layer:'general', cefr:'A1' });
        Storage.save(DB);
      }
      meta.closedDone = true; Storage.save(DB);
    }
    await this.buildLevel(this.lvlFor(DB.profile), onStep, CLOSED_BATCHES.length, total);
  },

  // открытый класс одного уровня: пропорция бытовое/интересы берётся из раздела 5
  async buildLevel(lvl, onStep, done, total){
    const meta = this.meta();
    if (meta.levels.includes(lvl)) return;
    const p = DB.profile, share = SURVIVAL_SHARE[lvl] ?? 0.3;
    const nGen = Math.round(CORE_LEVEL_TOTAL * share), nInt = CORE_LEVEL_TOTAL - nGen;
    const plan = [];
    for (let left=nGen; left>0; left-=CORE_BATCH) plan.push({ layer:'general',   count: Math.min(CORE_BATCH,left) });
    for (let left=nInt; left>0; left-=CORE_BATCH) plan.push({ layer:'interests', count: Math.min(CORE_BATCH,left) });
    for (let i=0; i<plan.length; i++){
      const b = plan[i];
      onStep && onStep(`Собираю словарь уровня ${lvl}… ${(done||0)+i+1}/${total || plan.length}`);
      const w = await this._batch({ class:'open', layer:b.layer, cefr:lvl, count:b.count,
        topic: b.layer==='interests' ? (p.interests || 'повседневная жизнь') : SURVIVAL_TOPICS });
      this._add(w, { klass:'open', layer:b.layer, cefr:lvl });
      Storage.save(DB);
    }
    meta.levels.push(lvl); Storage.save(DB);
  },

  needsBuild(){
    if (this._failed || !DB || !DB.profile) return false;
    if (DB.profile.cefr === 'A0') return false;          // на A0 ядро не нужно — соберём при переходе на A1
    const m = this.meta();
    return !m.closedDone || !m.levels.includes(this.lvlFor(DB.profile));
  },

  // догрузка следующего уровня фоном (раздел 4.4): человек ожидания не видит
  maybePrefetch(){
    try {
      if (this._pf || this._failed || !DB || !DB.profile) return;
      const m = this.meta(); if (!m.closedDone) return;
      const lvl = this.lvlFor(DB.profile), li = CORE_LEVELS.indexOf(lvl);
      const left = this.list().filter(w => w.status==='склад' && w.klass==='open'
        && CORE_LEVELS.indexOf(w.cefr) <= li).length;
      if (left >= 100) return;
      const next = CORE_LEVELS[li+1];
      if (!next || m.levels.includes(next)) return;
      this._pf = true;
      this.buildLevel(next).catch(()=>{}).then(()=>{ this._pf = false; });
    } catch(e){}
  },

  // смена интересов (раздел 4.4): перегенерируется ТОЛЬКО тематический слой
  async retopic(){
    const key = this.topicKey(); let arch = 0;
    this.list().forEach(w => {
      if (w.layer !== 'interests') return;
      if (w.status === 'склад' && w.topicKey !== key) { w.status = 'архив'; arch++; }   // невыданное старой темы → архив
      else if (w.status === 'архив' && w.topicKey === key) w.status = 'склад';          // тема вернулась → без генерации
    });
    Storage.save(DB);
    const have = this.list().filter(w => w.layer==='interests' && w.status==='склад' && w.topicKey===key).length;
    if (have >= 100) { toast('Тема обновлена ✓'); return; }
    const lvl = this.lvlFor(DB.profile);
    try {
      for (let i=0; i<2; i++){
        Screen.loader(`Подбираю лексику новой темы… ${i+1}/2`);
        const w = await this._batch({ class:'open', layer:'interests', cefr:lvl, count:100, topic: DB.profile.interests||'' });
        this._add(w, { klass:'open', layer:'interests', cefr:lvl });
        Storage.save(DB);
      }
      toast('Лексика темы обновлена ✓');
    } catch(e){ toast('Тему доберём позже — урок работает', true); }
  },

  // порция урока (раздел 5): 5 новых + 2 неправильных глагола, гарантированно
  pickPortion(lvl){
    try {
      const m = this.meta(); if (!m.closedDone) return null;
      const li = CORE_LEVELS.indexOf(CORE_LEVELS.includes(lvl) ? lvl : 'A1');
      const inVocab = new Set((DB.vocab||[]).map(w => norm(w.term)));
      const avail = f => this.list().filter(w => w.status === 'склад'
        && CORE_LEVELS.indexOf(w.cefr) <= li && !inVocab.has(norm(w.term)) && f(w));
      const byFreq = a => a.slice().sort((x,y) => (x.freq_rank||999) - (y.freq_rank||999));
      // 2 неправильных глагола — не «если уместны», а всегда, пока класс не исчерпан
      const irr = byFreq(avail(w => w.is_irregular === true)).slice(0,2);
      const taken = new Set(irr.map(w => norm(w.term)));
      const need = 7 - irr.length;
      const share = SURVIVAL_SHARE[lvl] ?? 0.3;
      const nGen = Math.round(need * share);
      // общий слой = бытовое + служебные слова закрытого класса (они наконец доходят до урока)
      const gen  = byFreq(avail(w => w.layer==='general'   && !w.is_irregular && !taken.has(norm(w.term))));
      const intr = byFreq(avail(w => w.layer==='interests' && !w.is_irregular && !taken.has(norm(w.term))));
      const out = [];
      gen.slice(0, nGen).forEach(w => { out.push(w); taken.add(norm(w.term)); });
      intr.slice(0, need - out.length).forEach(w => { out.push(w); taken.add(norm(w.term)); });
      if (out.length < need){   // одного слоя не хватило — добираем вторым, порция важнее пропорции
        byFreq(avail(w => !w.is_irregular && !taken.has(norm(w.term)))).slice(0, need - out.length)
          .forEach(w => { out.push(w); taken.add(norm(w.term)); });
      }
      const portion = [...irr, ...out];
      if (portion.length < 7) return null;           // Ядро исчерпано → резервный путь (раздел 5)
      return portion.map(w => ({ term:w.term, translation:w.translation, translit:w.translit, emoji:w.emoji,
        part_of_speech:w.part_of_speech, article:w.article, forms:w.forms, is_irregular:w.is_irregular }));
    } catch(e){ return null; }
  },

  // слово переезжает из Ядра в Словарь в момент записи урока и никогда не наоборот
  markIssued(words){
    (words||[]).forEach(x => {
      const c = this.list().find(w => norm(w.term) === norm(x.term));
      if (c) c.status = 'выдано';
    });
  }
};

// экран сборки Ядра: один раз при создании профиля и разово при миграции старого профиля
async function coreBuildScreen(next){
  Screen.loader('Собираю словарь языка — это один раз…');
  try { await Core.build(msg => Screen.loader(msg)); }
  catch(e){
    Core._failed = true;                                  // не зацикливаемся: урок пойдёт резервным путём
    if (String(e.message||'').startsWith('KEY:')) return keyWizard(true);
    toast('Словарь языка соберём позже — урок будет работать', true);
  }
  next();
}

function boot() {
  Storage.migrate();                                   // прежнюю одиночную базу — в первый профиль
  Episodes.migrate();                                  // 4.29: снимок прежнего формата — в эпизоды
  if (!Storage.getKey()) return keyWizard();
  const profs = Storage.listProfiles();
  if (profs.length === 0) return onboardingIntro();    // новый пользователь
  if (profs.length === 1) { DB = ensureDbArrays(Storage.load()); Storage.save(DB); I18N.applyProfileLang(DB.profile); return mainMenu(); }
  return profileSelect();                              // несколько профилей — выбор
}

/* ---------- Заставка при запуске (Splash): логотип + нейросеть ----------
   Короткая (~2.5 с), показывается каждый раз, тап — пропустить. */
function splashScreen(done) {
  const ov = document.createElement('div');
  ov.id = 'splash';
  ov.style.cssText = 'position:fixed;inset:0;z-index:200;background:radial-gradient(120% 90% at 50% 40%,#0A1424 0%,#060A12 70%);'
    + 'display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;'
    + 'transition:opacity .5s ease;opacity:1;cursor:pointer';
  ov.innerHTML = `
    <canvas id="splashNet" style="position:absolute;inset:0;width:100%;height:100%"></canvas>
    <div style="position:relative;display:flex;align-items:center;gap:12px;opacity:0;transform:translateY(8px)"
         id="splashLogo">
      <div style="width:52px;height:52px;border-radius:14px;background:#0B1020;border:1px solid #1A2540;
        display:grid;place-items:center;box-shadow:0 0 30px rgba(65,184,255,.35)">
        <span style="font-family:'Chakra Petch';font-weight:700;font-size:30px;
          background:linear-gradient(135deg,#41B8FF,#8A5CFF 50%,#FF8A3C);-webkit-background-clip:text;
          background-clip:text;color:transparent">A</span>
      </div>
      <div style="font-family:'Chakra Petch';font-weight:700;font-size:34px;letter-spacing:.12em;color:#E8EDF7">AI<span
        style="background:linear-gradient(135deg,#41B8FF,#8A5CFF 50%,#FF8A3C);-webkit-background-clip:text;
        background-clip:text;color:transparent">LEX</span></div>
    </div>
    <div id="splashStatus" style="position:relative;font-family:'Chakra Petch';font-size:12px;letter-spacing:.28em;
      color:#5A6680;text-transform:uppercase;opacity:0;transition:opacity .6s">SYSTEM ONLINE · ${APP_VERSION}</div>`;
  document.body.appendChild(ov);

  // анимация логотипа и статуса
  const logo = ov.querySelector('#splashLogo');
  requestAnimationFrame(()=>{ logo.style.transition='opacity .7s ease,transform .7s ease'; logo.style.opacity='1'; logo.style.transform='none'; });
  setTimeout(()=>{ ov.querySelector('#splashStatus').style.opacity='1'; }, 700);

  // нейросеть на canvas: узлы вспыхивают и соединяются линиями
  const cv = ov.querySelector('#splashNet'), ctx = cv.getContext('2d');
  const DPR = Math.min(window.devicePixelRatio||1, 2);
  let W=0, H=0, nodes = [], raf, t0 = performance.now(), running = true, seeded = false;
  function measure(){
    W = cv.clientWidth || window.innerWidth || 360;
    H = cv.clientHeight || window.innerHeight || 640;
    cv.width = W*DPR; cv.height = H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  function seed(){
    const N = Math.max(28, Math.min(48, Math.round(W*H/15000)));
    nodes = [];
    for (let i=0;i<N;i++) nodes.push({ x:Math.random()*W, y:Math.random()*H,
      vx:(Math.random()-.5)*.28, vy:(Math.random()-.5)*.28, p:Math.random()*Math.PI*2 });
    seeded = true;
  }
  function draw(now){
    if (!running) return;
    // самовосстановление: если разметка ещё не дала размеры — измеряем и рассаживаем
    if (!seeded || W===0 || H===0){ measure(); if (W>0 && H>0) seed(); raf=requestAnimationFrame(draw); return; }
    ctx.clearRect(0,0,W,H);
    // линии между близкими узлами
    for (let i=0;i<nodes.length;i++){
      const a=nodes[i];
      for (let j=i+1;j<nodes.length;j++){
        const b=nodes[j], dx=a.x-b.x, dy=a.y-b.y, d=Math.hypot(dx,dy);
        if (d<130){ const al=(1-d/130)*0.4;
          ctx.strokeStyle=`rgba(65,184,255,${al})`; ctx.lineWidth=1;
          ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); }
      }
    }
    // узлы — вспыхивающие огоньки
    nodes.forEach(n=>{
      n.x+=n.vx; n.y+=n.vy; n.p+=0.05;
      if (n.x<0||n.x>W) n.vx*=-1; if (n.y<0||n.y>H) n.vy*=-1;
      const pulse=0.55+0.45*Math.sin(n.p), r=1.8+pulse*2;
      const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,r*4);
      const hot=(Math.sin(n.p*0.7)>0.6);
      g.addColorStop(0, hot?`rgba(255,138,60,${0.95*pulse})`:`rgba(120,200,255,${0.95*pulse})`);
      g.addColorStop(1,'rgba(10,20,36,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(n.x,n.y,r*4,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=hot?'#FFB071':'#9ED7FF'; ctx.beginPath(); ctx.arc(n.x,n.y,r*0.6,0,Math.PI*2); ctx.fill();
    });
    raf=requestAnimationFrame(draw);
  }
  window.addEventListener('resize', measure);
  // старт после того, как браузер построил разметку оверлея (иначе размеры = 0)
  requestAnimationFrame(()=>{ measure(); if (W>0 && H>0) seed(); raf=requestAnimationFrame(draw); });

  let finished=false;
  function finish(){
    if (finished) return; finished=true; running=false;
    cancelAnimationFrame(raf);
    ov.style.opacity='0';
    setTimeout(()=>{ ov.remove(); done && done(); }, 500);
  }
  ov.onclick = finish;                 // тап — пропустить
  setTimeout(finish, 2500);            // авто-уход ~2.5 с
}

/* ---------- раздел 0: мастер получения ключа Gemini ---------- */
function keyWizard(afterFail) {

    <div class="card glow">
      <div class="steps-guide">
        <p>Нажмите «Получить ключ» — откроется Google AI Studio (войдите в свой Google-аккаунт, если попросит).</p>
        <p>Нажмите там «Create API key» — ключ создаётся в один-два тапа.</p>
        <p>Скопируйте ключ и вставьте его в поле ниже. Больше вы его не увидите — он хранится на устройстве.</p>
      </div>
      <button class="btn btn-ghost" onclick="window.open('https://aistudio.google.com/app/apikey','_blank')">Получить ключ в Google AI Studio ↗</button>
      <div class="divider"></div>
      <label class="fld"><span>Вставьте ключ API</span>
        <input type="password" id="apiKeyInput" placeholder="AIza..." autocomplete="off">
      </label>
      <button class="btn btn-primary" id="saveKey">Сохранить и продолжить</button>
      <p class="note">Ключ привязан к вашему аккаунту Google и оплачивается вами (бесплатной квоты достаточно для занятий). AILEX хранит его только на этом устройстве.</p>
    </div>`);
  $('#saveKey').onclick = async () => {
    const k = $('#apiKeyInput').value.trim();
    if (k.length < 20) return toast('Похоже, это не ключ — проверьте', true);

    Screen.loader('Проверяю ключ…');
    try {
      await Gemini.validateKey();
      toast('Ключ работает ✓');
      boot();
    } catch(e) {
      if (String(e.message).startsWith('KEY:')) { toast('Ключ не принят сервером Google', true); keyWizard(true); }

}

/* =====================================================================
   ОНБОРДИНГ (раздел 4): анкета → placement-тест → создание базы
   ===================================================================== */
/* ============================================================
   СИСТЕМА ОДНОРАЗОВЫХ ПОДСКАЗОК (ONBOARDING HINTS)
   Показывается один раз при первом входе на экран.
   Флаги хранятся в localStorage под ключами hint_shown_*.
   ============================================================ */
const Hints = {
  shown(key) { return !!localStorage.getItem('hint_shown_' + key); },
  mark(key)  { localStorage.setItem('hint_shown_' + key, '1'); },
  reset()    { Object.keys(localStorage).filter(k=>k.startsWith('hint_shown_')).forEach(k=>localStorage.removeItem(k)); },

  show(key, html) {
    if (Hints.shown(key)) return;
    Hints.mark(key);
    const ov = document.createElement('div');
    ov.id = 'hintOverlay';
    ov.style.cssText = 'position:fixed;inset:0;z-index:80;background:rgba(4,7,14,.72);display:flex;align-items:flex-end;justify-content:center;padding-bottom:env(safe-area-inset-bottom,0)';
    ov.innerHTML = `
      <div style="width:100%;max-width:480px;background:var(--panel);border:1px solid var(--line);
                  border-radius:20px 20px 0 0;padding:20px 20px 28px;position:relative">
        <div style="font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);margin-bottom:10px">${t('Подсказка')}</div>
        <div id="hintBody" style="font-size:15px;line-height:1.55;color:var(--text)">${html}</div>
        <button id="hintClose" style="margin-top:18px;width:100%;padding:12px;border-radius:10px;
          background:var(--accent);border:none;color:#fff;font-size:15px;font-weight:600;cursor:pointer">
          ${t('Понятно ✓')}
        </button>

/* Инициализация виджета выбора языка с поиском */
function _initLangPicker(defVal) {
  const hidden  = $('#val');
  const search  = $('#langSearch');
  const listEl  = $('#langList');
  const items   = Array.from(listEl.querySelectorAll('.lang-opt'));

  function select(c) {
    hidden.value = c;
    items.forEach(el => {
      const active = el.dataset.c === c;
      el.style.background = active ? 'var(--accent-dim, #1A2540)' : '';
      el.style.color = active ? 'var(--accent, #41B8FF)' : '';
    });
    // прокрутить выбранный в видимую область
    const active = listEl.querySelector(`.lang-opt[data-c="${c}"]`);
    if (active) active.scrollIntoView({block:'nearest'});
  }

  // клик по элементу
  items.forEach(el => el.onclick = () => {
    select(el.dataset.c);
    search.value = el.textContent.trim();
    // скрыть не выбранные, оставить только выбранный — как подтверждение
    filterList('');
  });

  // фильтр при вводе
  function filterList(q) {
    const s = q.toLowerCase();
    items.forEach(el => {
      const match = !s || el.textContent.toLowerCase().includes(s) || el.dataset.c.includes(s);
      el.style.display = match ? '' : 'none';
    });
  }
  search.oninput = () => filterList(search.value);

  // установить начальное значение
  select(defVal);
  const initEl = LANGS.find(l=>l.c===defVal);
  if (initEl) search.value = initEl.n;
}

function askProfile(i, acc) {
  if (i >= PROFILE_Q.length) return placementIntro(acc);
  const q = PROFILE_Q[i];
  let field = '';
  if (q.type === 'lang') {
    field = `
      <div class="lang-picker" id="langPicker">
        <input type="text" id="langSearch" placeholder="Поиск языка…"
          autocomplete="off" autocorrect="off" spellcheck="false"
          style="width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);
                 background:var(--card);color:var(--ink);font-size:16px;box-sizing:border-box;margin-bottom:8px">
        <div id="langList" style="max-height:240px;overflow-y:auto;border-radius:10px;border:1px solid var(--border)">
          ${LANGS.map(l=>`<div class="lang-opt" data-c="${l.c}" style="padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--border);font-size:15px">${esc(l.n)}</div>`).join('')}
        </div>
        <input type="hidden" id="val" value="">
      </div>`;
  } else if (q.type === 'area') {
    field = `<textarea id="val" rows="3" placeholder="${esc(q.ph)}"></textarea>`;
  } else {
    field = `<input type="${q.type}" id="val" placeholder="${esc(q.ph||'')}">`;
  }
  Screen.show(`
    <div class="eyebrow">Анкета · ${i+1} / ${PROFILE_Q.length}</div>
    <h1>${esc(q.q)}</h1>
    ${q.note?`<p class="sub">${esc(q.note)}</p>`:'<div style="height:6px"></div>'}
    <div class="card">${field}</div>
    <button class="btn btn-primary" id="next">Далее</button>`,
    { back: i>0 ? ()=>askProfile(i-1, acc) : null });
  if (q.type==='lang') {
    // дефолтное значение
    const defVal = (q.k==='targetLang') ? (acc.nativeLang==='en' ? 'de' : 'en') : 'ru';
    const initVal = acc[q.k] || defVal;
    _initLangPicker(initVal);
  }
  $('#next').onclick = () => {
    const v = $('#val').value.trim();
    if (!v) return toast('Заполните поле', true);
    if (q.k==='targetLang' && v===acc.nativeLang) return toast('Целевой язык должен отличаться от родного', true);
    acc[q.k] = q.type==='number' ? +v : v;
    askProfile(i+1, acc);
  };
}

function placementIntro(profile) {
  Screen.show(`

    <button class="btn btn-ghost" id="skipA0">Не знаю язык совсем, даже буквы → начать с основ A0</button>`);
  $('#go').onclick    = () => runPlacement(profile);
  $('#skipA1').onclick = () => finishOnboarding(profile, 'A1');
  $('#skipA0').onclick = () => finishOnboarding(profile, 'A0');

async function runPlacement(profile) {
  Screen.loader('Готовлю вопросы теста…');
  let qs;
  try {
    const resp = await Gemini.call({
      task:'placement_test', target_lang: profile.targetLang, native_lang: profile.nativeLang,
      levels:['A1','A2','B1','B2','C1'], per_level: 3
    },
    `{"questions":[
      {"level":"A1","skill":"grammar","question":"вопрос на целевом языке: ТОЛЬКО структура/порядок слов/спряжение — используй лексику уровня НИЖЕ A1 (самые базовые слова)","options":["в1","в2","в3","в4"],"correct_index":0},
      {"level":"A1","skill":"grammar","question":"ещё один структурный вопрос A1 с базовой лексикой","options":["в1","в2","в3","в4"],"correct_index":0},
      {"level":"A1","skill":"vocab","question":"вопрос на узнавание типичного слова A1","options":["в1","в2","в3","в4"],"correct_index":0}
    ]} — ровно по 3 вопроса на каждый уровень (2 grammar + 1 vocab), по возрастанию сложности. Grammar-вопросы: лексика строго из уровня НИЖЕ тестируемого. Vocab-вопросы: узнавание слова на целевом языке → перевод (или наоборот). Варианты на целевом языке (кроме vocab-вопросов с переводом).`);
    qs = resp.questions;
    if (!Array.isArray(qs) || qs.length < 6) throw 0;
  } catch(e) { toast('Не удалось получить тест — начнём с A1', true); return finishOnboarding(profile, 'A1'); }

  // Счётчики v2: разделяем wrongChoice и dontKnow
  let idx = 0, wrongChoice = {}, dontKnow = {}, passed = {}, stopped = false;

  const shouldStop = (level) => {
    const wc = wrongChoice[level]||0;
    const dk = dontKnow[level]||0;
    const q  = qs.filter(q=>q.level===level);
    // Останавливаем если: 2+ явных ошибки ИЛИ сумма ошибок/незнаний >= кол-ва вопросов уровня
    return wc >= 2 || (wc + dk) >= q.length;
  };

  const step = () => {
    if (stopped || idx >= qs.length) return done();
    const q = qs[idx];
    const isVocab = q.skill === 'vocab';
    const opts = q.options.map((o,i)=>({o,i}));
    Screen.show(`
      <div class="eyebrow">Тест уровня · вопрос ${idx+1} / ${qs.length}</div>
      <div class="card">
        <div class="drill-head">
          <span class="n">${esc(q.level)}</span>
          <span style="font-size:11px;color:var(--dim);margin-left:8px">${isVocab?'лексика':'грамматика'}</span>
        </div>
        <div class="task-text">${esc(q.question)}</div>
        ${shuffle(opts).map(x=>`<button class="opt" data-i="${x.i}">${esc(x.o)}</button>`).join('')}
        <button class="opt" data-i="-1" style="color:var(--dim)">Не знаю</button>
      </div>`);
    document.querySelectorAll('.opt').forEach(b => b.onclick = () => {
      const chosen = +b.dataset.i;
      if (chosen === -1) {
        // «Не знаю» — только grammar-вопросы участвуют в остановке
        if (!isVocab) dontKnow[q.level] = (dontKnow[q.level]||0)+1;
      } else if (chosen === q.correct_index) {
        passed[q.level] = (passed[q.level]||0)+1;
      } else {
        wrongChoice[q.level] = (wrongChoice[q.level]||0)+1;
      }
      // Проверяем остановку только после grammar-вопросов
      if (!isVocab && shouldStop(q.level)) stopped = true;
      idx++; step();
    });
  };

  const done = () => {
    // Уровень подтверждён если ≥ 2 верных из 3 (большинство) и не было ранней остановки
    let level = 'A1';
    for (const L of ['A1','A2','B1','B2','C1']) {
      if ((passed[L]||0) >= 2 && !shouldStop(L)) level = L;
      else break;
    }
    // Если вообще 0 верных на A1 → направляем на A0
    if ((passed['A1']||0) === 0) level = 'A0';
    finishOnboarding(profile, level);
  };
  step();
}

/* ---------- Шаг 3: создание базы ---------- */
async function finishOnboarding(profile, cefr) {
  profile.cefr = cefr;
  DB = Storage.newDB(profile);
  if (cefr === 'A0') {
    const a0Total = getA0Total(profile.nativeLang, profile.targetLang);
    DB.profile.a0Total = a0Total;
    DB.nextStage = 'A0.1.01';
  } else {
    DB.nextStage = fmtCode(cefr==='C2'?'C1':cefr, 1, 1);
  }
  DB.progress.push({ code:'START', date: today(), words:'', next: DB.nextStage, note:'' });
  Storage.addProfile(DB);          // новый профиль, становится активным
  // 4.25: язык интерфейса привязывается к родному языку профиля; переводы надписей
  // и блоков-подсказок предзагружаются один раз здесь (ключ и язык уже известны) → офлайн далее.
  I18N.applyProfileLang(DB.profile);
  toast('Сохранено ✓');
  // 4.26: интересы уже известны — здесь и только здесь собирается Ядро языка (раздел 4.4)
  if (Core.needsBuild()) {
    Screen.loader('Собираю словарь языка — это один раз…');
    try { await Core.build(msg => Screen.loader(msg)); }
    catch(e){ Core._failed = true; toast('Словарь языка соберём позже — урок будет работать', true); }
  }
  const isA0 = cefr === 'A0';
  Screen.show(`
    <div class="eyebrow">Профиль создан</div>
    <h1>${isA0 ? '🔤 Начинаем с основ!' : 'Ваш уровень: '+esc(cefr)}</h1>
    <p class="sub">Профиль «${esc(profile.name)}» (${esc(langName(profile.nativeLang))} → ${esc(langName(profile.targetLang))}) создан.${isA0 ? ` Сначала освоим чтение и базовую лексику (${DB.profile.a0Total} уроков A0), затем перейдём к A1.` : ` Первый урок: <b style="color:var(--ink)">${esc(DB.nextStage)}</b>.`}</p>
    <button class="btn btn-primary" id="go">К главному меню</button>`);
  $('#go').onclick = mainMenu;
}

    <svg viewBox="0 0 210 210">
      <defs><linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">

      </linearGradient></defs>
      <circle cx="105" cy="105" r="${R}" fill="none" stroke="#16203A" stroke-width="10"/>
      <circle cx="105" cy="105" r="${R}" fill="none" stroke="url(#g1)" stroke-width="10"
        stroke-linecap="round" stroke-dasharray="${on} ${C}" style="filter:drop-shadow(0 0 8px rgba(65,184,255,.5))"/>
    </svg>
    <div class="core"><div><div class="lbl">Уровень ${esc(lvl||'')}</div><div class="pct">${pct}%</div></div></div>

function dictWordKey(w){ return (w.term||'?').trim().replace(/^(der|die|das)\s+/i,''); }   // без ведущего артикля
function dictFirstLetter(w){ return (dictWordKey(w).charAt(0)||'#').toUpperCase(); }
function isIrregularVerb(w){ return (w.part_of_speech==='verb' || /en$/.test(w.term||'')) && (w.is_irregular===true); }

// Разбор строки: "[Категория] Термин [транскрипция] — перевод" (категория/транскрипция необязательны)
function parseImportLine(line) {
  let s = String(line).trim();
  if (!s || s.startsWith('#') || s.startsWith('=') || /^[А-ЯA-Z0-9 .]+$/.test(s) && !s.includes('—') && !s.includes('-')) {
    // строка-заголовок/комментарий без пары термин-перевод — пропускаем
  }
  if (!s || s.startsWith('#') || s.startsWith('=')) return null;
  let category = '';
  const mCat = s.match(/^\[([^\]]+)\]\s*/);
  if (mCat) { category = mCat[1].trim(); s = s.slice(mCat[0].length); }
  // разделитель термин/перевод: тире (—, –, -) — берём первое " — " или " - "
  const sep = s.match(/\s[—–-]\s/);
  if (!sep) return null;
  const idx = s.indexOf(sep[0]);
  let left = s.slice(0, idx).trim();
  const translation = s.slice(idx + sep[0].length).trim();
  if (!left || !translation) return null;
  // транскрипция в [...] внутри левой части
  let translit = '';
  const mTr = left.match(/\[([^\]]+)\]/);
  if (mTr) { translit = '['+mTr[1].trim()+']'; left = left.replace(mTr[0], '').trim(); }
  const term = left;
  if (!term) return null;
  return { term, translit, translation, category };
}
function parseImportText(text) {
  const out = [], seen = {};
  String(text).split(/\r?\n/).forEach(l => {
    const w = parseImportLine(l);
    if (w && !seen[norm(w.term)]) { seen[norm(w.term)] = 1; out.push(w); }
  });
  return out;
}
