<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#060A12">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/favicon.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>AILEX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060A12; --panel:#0C1322; --panel2:#101A2E; --line:#1A2540;
  --ink:#E8EDF7; --dim:#8B97AE; --faint:#5A6680;
  --blue:#2F7DF6; --cyan:#41B8FF; --orange:#FF8A3C; --violet:#8A5CFF;
  --ok:#3DD68C; --err:#FF5C6C;
  --grad:linear-gradient(135deg,#41B8FF 0%,#8A5CFF 48%,#FF8A3C 100%);
  --r:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg); color:var(--ink);
  font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  font-size:16px; line-height:1.5; overflow-x:hidden;
}
body::before{ /* circuit atmosphere */
  content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(600px 360px at 85% -5%, rgba(255,138,60,.07), transparent 60%),
    radial-gradient(700px 420px at -10% 10%, rgba(47,125,246,.10), transparent 60%),
    radial-gradient(500px 500px at 50% 110%, rgba(138,92,255,.06), transparent 60%);
}
#app{position:relative;z-index:1;max-width:480px;margin:0 auto;min-height:100%;
  display:flex;flex-direction:column;padding:0 18px calc(24px + env(safe-area-inset-bottom))}
.topbar{display:flex;align-items:center;gap:10px;padding:18px 2px 14px;position:sticky;top:0;
  background:linear-gradient(var(--bg) 78%,transparent);z-index:5}
.logo-badge{width:34px;height:34px;border-radius:9px;background:#0B1020;border:1px solid var(--line);
  display:grid;place-items:center;flex:none;box-shadow:0 0 18px rgba(65,184,255,.18)}
.logo-badge span{font-family:'Chakra Petch';font-weight:700;font-size:19px;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.logo-word{font-family:'Chakra Petch';font-weight:700;font-size:21px;letter-spacing:.12em}
.logo-word b{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.top-status{margin-left:auto;font-size:11px;color:var(--faint);letter-spacing:.14em;text-transform:uppercase;
  font-family:'Chakra Petch'}
.top-status.online{color:var(--ok)}
.back-btn{background:none;border:none;color:var(--dim);font-size:22px;padding:4px 10px 4px 0;cursor:pointer}
.screen{flex:1;display:flex;flex-direction:column;animation:fadeUp .28s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

h1{font-family:'Chakra Petch';font-weight:600;font-size:22px;line-height:1.3;margin-bottom:6px}
h2{font-family:'Chakra Petch';font-weight:600;font-size:17px;margin-bottom:4px}
.sub{color:var(--dim);font-size:14px;margin-bottom:18px}
.eyebrow{font-family:'Chakra Petch';font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--cyan);margin-bottom:8px}

.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-bottom:14px}
.card.glow{box-shadow:0 0 0 1px rgba(65,184,255,.12),0 8px 40px rgba(47,125,246,.10)}

.btn{display:block;width:100%;border:none;border-radius:13px;padding:15px 18px;font-size:16px;font-weight:600;
  font-family:'Inter';cursor:pointer;text-align:center;transition:transform .08s ease,filter .15s}
.btn:active{transform:scale(.985)}
.btn:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
.btn-primary{background:linear-gradient(135deg,#2F7DF6,#1E5FD0);color:#fff;
  box-shadow:0 4px 24px rgba(47,125,246,.35),inset 0 1px 0 rgba(255,255,255,.18)}
.btn-accent{background:linear-gradient(135deg,#FF9A4D,#F0742A);color:#23150A;
  box-shadow:0 4px 24px rgba(255,138,60,.28)}
.btn-ghost{background:var(--panel2);color:var(--ink);border:1px solid var(--line)}
.btn-row{display:flex;gap:10px}.btn-row .btn{flex:1 1 0;min-width:0}
.btn-ico{flex:0 0 auto!important;width:auto;padding:14px!important;font-size:18px;line-height:1}
.btn[disabled]{opacity:.45;pointer-events:none}
.btn + .btn{margin-top:10px}
.btn-mini{display:inline-block;width:auto;padding:8px 14px;font-size:13px;border-radius:9px}

label.fld{display:block;margin-bottom:14px}
label.fld span{display:block;font-size:13px;color:var(--dim);margin-bottom:6px}
input[type=text],input[type=number],input[type=password],select,textarea{
  width:100%;background:#0A1120;border:1px solid var(--line);border-radius:11px;color:var(--ink);
  padding:13px 14px;font-size:16px;font-family:'Inter'}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(47,125,246,.18)}

/* mastery ring (signature) */
.ring-wrap{display:grid;place-items:center;padding:10px 0 6px}
.ring{position:relative;width:210px;height:210px}
.ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.ring .core{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
.ring .core .lbl{font-size:12px;color:var(--dim);letter-spacing:.08em}
.ring .core .pct{font-family:'Chakra Petch';font-weight:700;font-size:46px;line-height:1.05;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.ring .ticks{position:absolute;inset:-9px;border-radius:50%;
  background:repeating-conic-gradient(rgba(91,113,160,.5) 0 .6deg,transparent .6deg 6deg);
  -webkit-mask:radial-gradient(circle, transparent 64%, #000 65%, #000 68%, transparent 69%);
  mask:radial-gradient(circle, transparent 64%, #000 65%, #000 68%, transparent 69%)}

/* segmented progress (like screenshot) */
.segbar{display:flex;gap:4px;margin:10px 0 4px}
.segbar i{flex:1;height:9px;border-radius:3px;background:#16203A}
.segbar i.on{background:linear-gradient(90deg,var(--cyan),var(--blue))}
.segbar i.on.hot{background:linear-gradient(90deg,var(--orange),#FFB071)}

.menu-list{display:flex;flex-direction:column;gap:10px}
.menu-item{display:flex;align-items:center;gap:14px;background:var(--panel);border:1px solid var(--line);
  border-radius:14px;padding:15px 16px;cursor:pointer;text-align:left;width:100%;color:var(--ink);font-family:'Inter'}
.menu-item:active{transform:scale(.985)}
.menu-item .ic{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-size:18px;flex:none;
  background:#0A1120;border:1px solid var(--line)}
.menu-item .t b{display:block;font-size:15px;font-weight:600}
.menu-item .t small{color:var(--dim);font-size:12.5px}
.menu-item .chev{margin-left:auto;color:var(--faint)}

.chiplist{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0 4px}
.chip{font-size:12.5px;color:var(--cyan);background:rgba(65,184,255,.08);border:1px solid rgba(65,184,255,.25);
  border-radius:999px;padding:5px 11px}
.chip.warn{color:var(--orange);background:rgba(255,138,60,.08);border-color:rgba(255,138,60,.3)}

/* drills */
.drill-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px}
.drill-head .n{font-family:'Chakra Petch';font-size:12px;letter-spacing:.14em;color:var(--cyan)}
.drill-head .ph{font-size:12px;color:var(--faint)}
.task-text{font-size:18px;font-weight:600;margin:8px 0 14px;line-height:1.45}
.opt{display:block;width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
  border-radius:12px;padding:14px;font-size:16px;margin-bottom:9px;cursor:pointer;font-family:'Inter'}
.opt:active{transform:scale(.99)}
.opt.right{border-color:var(--ok);background:rgba(61,214,140,.10)}
.opt.wrong{border-color:var(--err);background:rgba(255,92,108,.10)}
.feedback{border-radius:12px;padding:13px 14px;font-size:14.5px;margin-top:10px;display:none;line-height:1.55}
.feedback.ok{display:block;background:rgba(61,214,140,.10);border:1px solid rgba(61,214,140,.35)}
.feedback.bad{display:block;background:rgba(255,92,108,.08);border:1px solid rgba(255,92,108,.32)}

.vocab-row{display:flex;align-items:center;gap:12px;padding:12px 2px;border-bottom:1px solid var(--line)}
.vocab-row:last-child{border-bottom:none}
.vocab-row .emoji{font-size:24px;flex:none}
.vocab-row .w b{font-size:16.5px}
.vocab-row .w .tr{color:var(--orange);font-size:13px;margin-left:6px}
.vocab-row .w small{display:block;color:var(--dim);font-size:13.5px}
.tts{margin-left:auto;background:#0A1120;border:1px solid var(--line);color:var(--cyan);width:38px;height:38px;
  border-radius:10px;font-size:16px;cursor:pointer;flex:none}

/* quest */
.scene{background:linear-gradient(180deg,var(--panel),#0A101E);border:1px solid var(--line);border-radius:var(--r);
  padding:18px;margin-bottom:12px}
.scene .target{font-size:17px;line-height:1.6;margin-bottom:8px}
.scene .hint{color:var(--dim);font-size:13.5px;font-style:italic}
.must{margin:8px 0}

/* chat (dialogue) */
.chat{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:6px 0 12px}
.msg{max-width:84%;padding:11px 14px;border-radius:14px;font-size:15.5px;line-height:1.5}
.msg.ai{background:var(--panel);border:1px solid var(--line);align-self:flex-start;border-bottom-left-radius:4px}
.msg.ai small{display:block;color:var(--dim);font-size:12.5px;margin-top:5px}
.msg.user{background:linear-gradient(135deg,#2F7DF6,#1E5FD0);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.chat-input{display:flex;gap:8px;align-items:center;padding-top:8px;border-top:1px solid var(--line)}
.chat-input input{flex:1}
.mic{width:50px;height:50px;border-radius:50%;border:1px solid var(--line);background:var(--panel2);color:var(--ink);
  font-size:20px;cursor:pointer;flex:none}
.mic.rec{background:var(--err);border-color:var(--err);animation:pulse 1s infinite}
@keyframes pulse{50%{box-shadow:0 0 0 10px rgba(255,92,108,.15)}}

/* toast */
#toast{position:fixed;left:50%;bottom:34px;transform:translateX(-50%) translateY(20px);opacity:0;z-index:50;
  background:#0E1A12;border:1px solid rgba(61,214,140,.4);color:#BFF3DA;padding:11px 20px;border-radius:999px;
  font-size:14.5px;transition:.3s;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%)}
#toast.neutral{background:var(--panel2);border-color:var(--line);color:var(--ink)}

/* loader */
.loader{display:flex;flex-direction:column;align-items:center;gap:16px;padding:48px 0;color:var(--dim);font-size:14px}
.spin{width:46px;height:46px;border-radius:50%;border:3px solid #1A2540;border-top-color:var(--cyan);
  border-right-color:var(--orange);animation:rot .9s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}

.kpi{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.kpi .box{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:13px 14px}
.kpi .box b{font-family:'Chakra Petch';font-size:21px;display:block}
.kpi .box small{color:var(--dim);font-size:12px}
.note{font-size:13px;color:var(--faint);line-height:1.55;margin-top:10px}
.divider{height:1px;background:var(--line);margin:14px 0}
.steps-guide{counter-reset:s;margin:10px 0}
.steps-guide p{position:relative;padding-left:34px;margin-bottom:12px;font-size:14.5px;color:var(--ink)}
.steps-guide p::before{counter-increment:s;content:counter(s);position:absolute;left:0;top:1px;width:23px;height:23px;
  border-radius:50%;background:var(--panel2);border:1px solid var(--line);color:var(--cyan);
  font-family:'Chakra Petch';font-size:12px;display:grid;place-items:center}
a{color:var(--cyan)}
</style>
</head>
<body>
<div id="app">
  <div class="topbar" id="topbar">
    <button class="back-btn" id="btnBack" style="display:none" aria-label="Назад">‹</button>
    <div class="logo-badge"><span>A</span></div>
    <div class="logo-word">AI<b>LEX</b></div>
    <div class="top-status" id="sysStatus">SYSTEM ONLINE</div>
  </div>
  <div class="screen" id="screen"></div>
</div>
<div id="toast"></div>
<script>
/* ===================================================================
   AILEX 4.1 — реализация методической конституции.
   Принципы: логика → приложение (state machine), контент → Gemini,
   хранилище → изолированный модуль Storage (сейчас локально + экспорт
   JSON «AILEX_StatusDB»; слой подменяется на Google Sheets без
   изменения остального кода). Gemini не знает о базе и не пишет в неё.
   =================================================================== */
"use strict";
/* Версия сборки — должна совпадать с CACHE в sw.js. Показывается в шапке. */
const APP_VERSION = 'v22';
/* ---------- утилиты ---------- */
const $ = s => document.querySelector(s);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const today = () => { const d = new Date(); return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getFullYear()).slice(2); };
const norm = s => String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
  .replace(/[.,!?;:«»"'’\-–—()]/g,' ').replace(/\s+/g,' ').trim()
  .replace(/ß/g,'ss');
const shuffle = a => { a = a.slice(); for (let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; };
const pick = (a,n) => shuffle(a).slice(0,n);

let toastTimer = null;
function toast(msg, neutral) {
  const t = $('#toast'); t.textContent = msg;
  t.className = neutral ? 'neutral show' : 'show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

/* ---------- языки ---------- */
const LANGS = [
  {c:'ru', n:'Русский',     bcp:'ru-RU'},
  {c:'en', n:'English',     bcp:'en-US'},
  {c:'de', n:'Deutsch',     bcp:'de-DE'},
  {c:'fr', n:'Français',    bcp:'fr-FR'},
  {c:'es', n:'Español',     bcp:'es-ES'},
  {c:'it', n:'Italiano',    bcp:'it-IT'},
  {c:'pt', n:'Português',   bcp:'pt-PT'},
  {c:'pl', n:'Polski',      bcp:'pl-PL'},
  {c:'tr', n:'Türkçe',      bcp:'tr-TR'},
  {c:'ar', n:'العربية',     bcp:'ar-SA'},
  {c:'zh', n:'中文',         bcp:'zh-CN'},
  {c:'ja', n:'日本語',       bcp:'ja-JP'},
  {c:'ko', n:'한국어',       bcp:'ko-KR'},
  {c:'uk', n:'Українська',  bcp:'uk-UA'},
  {c:'he', n:'עברית',       bcp:'he-IL'},
];
const langName = c => (LANGS.find(l=>l.c===c)||{}).n || c;
const langBcp  = c => (LANGS.find(l=>l.c===c)||{}).bcp || c;

/* ---------- баланс лексики по CEFR (раздел 5.0, бытовое/интересы) ---------- */
const SURVIVAL_SHARE = { A1:0.40, A2:0.35, B1:0.30, B2:0.25, C1:0.20, C2:0.20 };

/* =====================================================================
   STORAGE — изолированный слой хранения (раздел 2.0–2.4).
   Сейчас: локальная база устройства + экспорт/импорт файла
   «AILEX_StatusDB.json». Замена на Google Sheets (OAuth drive.file)
   меняет ТОЛЬКО этот объект — остальной код о хранилище не знает.
   Структура повторяет четыре листа: Профиль / Прогресс / Словарь / Аналитика.
   ===================================================================== */
const Storage = {
  DB_KEY: 'AILEX_StatusDB',     // прежняя одиночная база (для миграции)
  VAULT_KEY: 'AILEX_Vault',     // сейф с несколькими профилями (4.6)
  API_KEY: 'AILEX_GEMINI_KEY',  // ключ Gemini — общий для устройства
  getKey(){ return localStorage.getItem(this.API_KEY) || ''; },
  setKey(k){ localStorage.setItem(this.API_KEY, k.trim()); },

  _readVault(){ try { return JSON.parse(localStorage.getItem(this.VAULT_KEY)); } catch(e){ return null; } },
  _writeVault(v){ localStorage.setItem(this.VAULT_KEY, JSON.stringify(v)); },
  _newId(){ return 'p' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); },

  // миграция: если сейфа нет, но есть прежняя одиночная база — заворачиваем её в первый профиль
  migrate(){
    let v = this._readVault();
    if (v && Array.isArray(v.profiles)) return v;
    let old = null; try { old = JSON.parse(localStorage.getItem(this.DB_KEY)); } catch(e){}
    if (old && old.profile) {
      const id = this._newId();
      v = { schema:'4.6', activeId:id, profiles:[{ id, db: old }] };
      this._writeVault(v);
      return v;
    }
    return null;
  },

  listProfiles(){
    const v = this._readVault();
    if (!v || !Array.isArray(v.profiles)) return [];
    return v.profiles.map(p => ({ id:p.id, name:(p.db.profile||{}).name||'Профиль',
      nativeLang:(p.db.profile||{}).nativeLang, targetLang:(p.db.profile||{}).targetLang,
      cefr:(p.db.profile||{}).cefr, active: p.id===v.activeId }));
  },
  activeId(){ const v=this._readVault(); return v ? v.activeId : null; },
  switchTo(id){ const v=this._readVault(); if (v && v.profiles.some(p=>p.id===id)){ v.activeId=id; this._writeVault(v); } },

  // load: возвращает базу активного профиля (совместимо со старым кодом)
  load(){
    const v = this._readVault();
    if (!v || !v.profiles.length) return null;
    const p = v.profiles.find(x=>x.id===v.activeId) || v.profiles[0];
    return p ? p.db : null;
  },
  // save: записывает базу активного профиля обратно в сейф (совместимо: Storage.save(DB))
  save(d){
    let v = this._readVault();
    if (!v || !v.profiles.length) { return this.addProfile(d); }       // первый профиль
    let p = v.profiles.find(x=>x.id===v.activeId) || v.profiles[0];
    p.db = d; this._writeVault(v);
  },
  // addProfile: создаёт новый профиль и делает его активным; возвращает id
  addProfile(d){
    let v = this._readVault() || { schema:'4.6', activeId:null, profiles:[] };
    const id = this._newId();
    v.profiles.push({ id, db: d }); v.activeId = id; this._writeVault(v);
    return id;
  },
  // wipe: удаляет активный профиль; если остались — переключает на первый
  wipe(){
    let v = this._readVault();
    if (!v) { localStorage.removeItem(this.DB_KEY); return; }
    v.profiles = v.profiles.filter(p => p.id !== v.activeId);
    if (v.profiles.length){ v.activeId = v.profiles[0].id; this._writeVault(v); }
    else { localStorage.removeItem(this.VAULT_KEY); localStorage.removeItem(this.DB_KEY); }
  },

  newDB(profile) {
    return {
      meta: { app:'AILEX', schema:'4.6', created: today() },
      profile,                       // лист «Профиль» (6 полей, раздел 2.2)
      progress: [],                  // лист «Прогресс» (раздел 2.3)
      vocab: [],                     // лист «Словарь» (раздел 2.3-С) = KNOWN_VOCAB
      rules: [],                     // часть «Свод правил» (раздел 2.3-П)
      errorTypes: {},                // счётчик типов ошибок (4.5)
      analytics: [],                 // лист «Аналитика» (раздел 2.6)
      nextStage: '',                 // код следующего этапа
      reviewQueue: [],               // очередь повторения (трудные слова)
      examAttempts: {},              // попытки экзаменов по уровню
    };
  },
  // экспорт: весь сейф (все профили) одним файлом
  exportFile() {
    const v = this._readVault() || { schema:'4.6', activeId:null, profiles:[] };
    const blob = new Blob([JSON.stringify(v, null, 2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'AILEX_StatusDB.json';
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href), 4000);
  },
  // импорт: принимает файл-сейф (новый формат) или прежнюю одиночную базу
  importFile(file, cb) {
    const r = new FileReader();
    r.onload = () => {
      try {
        const d = JSON.parse(r.result);
        if (d && Array.isArray(d.profiles) && d.profiles.length) {        // новый формат — сейф
          this._writeVault(d); cb(true);
        } else if (d && d.profile && Array.isArray(d.vocab)) {            // старый формат — одиночная база
          const id = this._newId();
          this._writeVault({ schema:'4.6', activeId:id, profiles:[{ id, db:d }] }); cb(true);
        } else throw 0;
      } catch(e){ cb(false); }
    };
    r.readAsText(file);
  }
};

// дозаполнение полей для баз, созданных в старых версиях
function ensureDbArrays(d){
  if (!d) return d;
  if (!Array.isArray(d.rules)) d.rules = [];
  if (!d.errorTypes) d.errorTypes = {};
  if (!Array.isArray(d.reviewQueue)) d.reviewQueue = [];
  if (!Array.isArray(d.analytics)) d.analytics = [];
  if (!d.examAttempts) d.examAttempts = {};
  return d;
}

let DB = null;

/* =====================================================================
   GEMINI — единственная роль: язык. Строгий JSON-контракт (раздел 2.5).
   Модель не знает о базе, не пишет в неё, получает задание на один шаг.
   ===================================================================== */
const Gemini = {
  MODELS: ['gemini-3.5-flash', 'gemini-2.5-flash'],
  preferred: null,   // последняя успешно ответившая модель — пробуем её первой
  SYSTEM: 'Ты — языковой генератор приложения AILEX (учитель иностранных языков по CEFR; строгий, лаконичный наставник). '
        + 'Отвечай ВСЕГДА одним валидным JSON-объектом точно по запрошенной схеме, без markdown, без текста вне JSON. '
        + 'Все пояснения для ученика — строго на языке native_lang. Жёстко держи уровень CEFR. Никакого оффтопа.',
  async validateKey() {
    // Простой GET к списку моделей: status 400/403 = плохой ключ,
    // TypeError (Failed to fetch) = блокировка сети/просмотрщика, а не ключ.
    const key = Storage.getKey();
    if (!key) throw new Error('NO_KEY');
    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${encodeURIComponent(key)}`);
    if (r.status === 400 || r.status === 403) { const j = await r.json().catch(()=>null); throw new Error('KEY:'+(j?.error?.message||r.status)); }
    if (!r.ok) throw new Error('HTTP '+r.status);
    return true;
  },
  async call(contract, schema) {
    const key = Storage.getKey();
    if (!key) throw new Error('NO_KEY');
    const body = {
      systemInstruction: { parts: [{ text: this.SYSTEM }] },
      contents: [{ role:'user', parts: [{ text:
        'ЗАДАНИЕ (строгий контракт):\n' + JSON.stringify(contract) +
        '\n\nСХЕМА ОТВЕТА (верни ровно такой JSON):\n' + schema }] }],
      generationConfig: { temperature: 0.7, responseMimeType: 'application/json', thinkingConfig: { thinkingBudget: 0 } }
    };
    const sleep = ms => new Promise(res => setTimeout(res, ms));
    let lastErr = null;
    // сначала пробуем запомненную рабочую модель, затем остальные
    const order = this.preferred ? [this.preferred, ...this.MODELS.filter(m=>m!==this.preferred)] : this.MODELS.slice();
    for (const m of order) {
      // до 3 попыток на модель: при 429 (лимит запросов) ждём и повторяем ту же модель
      for (let attempt = 0; attempt < 3; attempt++) {
        try {
          const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${encodeURIComponent(key)}`,
            { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
          if (r.status === 400 || r.status === 403) { const j = await r.json().catch(()=>null); throw new Error('KEY:'+(j?.error?.message||r.status)); }
          if (r.status === 429) {                       // превышен лимит запросов
            lastErr = new Error('HTTP 429 ('+m+')');
            if (attempt < 2) { await sleep(2000 * (attempt + 1)); continue; }  // подождать и повторить ту же модель
            break;                                      // не вышло — к следующей модели
          }
          if (!r.ok) { lastErr = new Error('HTTP '+r.status+' ('+m+')'); break; }  // иная ошибка — к следующей модели
          const j = await r.json();
          const txt = (j.candidates?.[0]?.content?.parts||[]).map(p=>p.text||'').join('');
          const clean = txt.replace(/```json|```/g,'').trim();
          if (!clean) { lastErr = new Error('EMPTY ('+m+')'); break; }   // пустой ответ — к следующей модели
          try { const out = JSON.parse(clean); this.preferred = m; return out; }
          catch(pe) {
            const s = clean.indexOf('{'), e = clean.lastIndexOf('}');
            if (s >= 0 && e > s) { try { const out = JSON.parse(clean.slice(s, e+1)); this.preferred = m; return out; } catch(_){} }
            lastErr = new Error('BAD_JSON ('+m+')'); break;
          }
        } catch(e) {
          if (String(e.message).startsWith('KEY:')) throw e;
          lastErr = e; break;
        }
      }
    }
    throw lastErr || new Error('GEMINI_FAIL');
  }
};

/* ---------- TTS / STT (раздел 5.0 «Чтение и звучание», 5.B) ---------- */
function speak(text, langCode) {
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = langBcp(langCode); u.rate = 0.92;
    speechSynthesis.speak(u);
  } catch(e){}
}
/* Кнопка повтора озвучки целевой (немецкой) фразы в блоках обратной связи.
   replaySay читает data-say и проговаривает на целевом языке профиля. */
function sayBtn(text) {
  return `<button class="tts" style="width:34px;height:34px;font-size:15px;vertical-align:middle;margin-left:8px" `
       + `data-say="${esc(text)}" onclick="replaySay(this)" aria-label="Повторить озвучку">🔊</button>`;
}
function replaySay(el) {
  speak(el.getAttribute('data-say'), (DB && DB.profile && DB.profile.targetLang) || 'de');
}
function makeRecognizer(langCode, onResult, onEnd) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const r = new SR();
  r.lang = langBcp(langCode); r.interimResults = false; r.maxAlternatives = 1;
  r.onresult = e => onResult(e.results[0][0].transcript);
  r.onend = onEnd; r.onerror = onEnd;
  return r;
}

/* ---------- коды этапов (раздел 2.1, 7) ---------- */
const LEVELS = ['A1','A2','B1','B2','C1','C2'];
const LESSONS_PER_SUB = 25;          // Checkpoint после 25, Final после 50
const EXAM_PASS = 0.85;              // порог 85%
function parseCode(code){ const m = code.match(/^([ABC][12])\.(\d)\.(\d+)$/); return m ? {lvl:m[1], sub:+m[2], n:+m[3]} : null; }
function fmtCode(lvl,sub,n){ return `${lvl}.${sub}.${String(n).padStart(2,'0')}`; }
function nextAfterLesson(code) {
  const p = parseCode(code); if (!p) return code;
  if (p.n >= LESSONS_PER_SUB) return `EXAM_${p.lvl}.${p.sub}`;     // экзамен подуровня
  return fmtCode(p.lvl, p.sub, p.n+1);
}
function nextAfterExamPass(examCode) {
  const m = examCode.match(/^EXAM_([ABC][12])\.(\d)$/); if (!m) return 'A1.1.01';
  const lvl = m[1], sub = +m[2];
  if (sub === 1) return fmtCode(lvl, 2, 1);
  const i = LEVELS.indexOf(lvl);
  return fmtCode(LEVELS[Math.min(i+1, LEVELS.length-1)], 1, 1);
}
function masteryPercent() {
  const a = DB?.analytics || [];
  if (!a.length) return 0;
  const lvl = currentLevel();
  // берём записи текущего уровня (урок/супер-урок/экзамен этого уровня)
  const ofLevel = a.filter(x => {
    const p = parseCode(String(x.lesson||'').replace('SUPER_','').replace('EXAM_',''));
    return p && p.lvl === lvl;
  });
  const set = ofLevel.length ? ofLevel : a;   // если по уровню ещё нет данных — по всем
  return Math.round(set.reduce((s,x)=>s+(x.accuracy_first_try||0),0)/set.length*100);
}
/* Прогресс по текущему уровню CEFR = доля пройденных уроков уровня (4.8).
   Уровень = 2 подуровня × LESSONS_PER_SUB уроков (по умолчанию 25+25 = 50). */
function currentLevel() {
  const p = parseCode(String(DB?.nextStage||'').replace('SUPER_','').replace('EXAM_',''));
  return (p && p.lvl) || DB?.profile?.cefr || 'A1';
}
function levelProgress() {
  const total = LESSONS_PER_SUB * 2;            // уроков на уровень (50)
  const raw = String(DB?.nextStage||'').replace('SUPER_','');
  const lvl = currentLevel();
  let done = 0;
  const em = raw.match(/^EXAM_([ABC][12])\.(\d)$/);
  if (em) {
    done = (+em[2] === 1) ? LESSONS_PER_SUB : total;   // дошёл до экзамена подуровня
  } else {
    const p = parseCode(raw);
    if (p) done = (p.sub === 1 ? 0 : LESSONS_PER_SUB) + (p.n - 1);  // следующий урок ещё не пройден
  }
  done = Math.max(0, Math.min(total, done));
  const pct = Math.round(done / total * 100);
  return { lvl, done, total, pct };
}

/* ---------- Заставка при запуске (Splash): логотип + нейросеть ----------
   Короткая (~2.5 с), показывается каждый раз, тап — пропустить. */
function splashScreen(done) {
  const ov = document.createElement('div');
  ov.id = 'splash';
  ov.style.cssText = 'position:fixed;inset:0;z-index:200;background:radial-gradient(120% 90% at 50% 40%,#0A1424 0%,#060A12 70%);'
    + 'display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;'
    + 'transition:opacity .5s ease;opacity:1;cursor:pointer';
  ov.innerHTML = `
    <canvas id="splashNet" style="position:absolute;inset:0;width:100%;height:100%"></canvas>
    <div style="position:relative;display:flex;align-items:center;gap:12px;opacity:0;transform:translateY(8px)"
         id="splashLogo">
      <div style="width:52px;height:52px;border-radius:14px;background:#0B1020;border:1px solid #1A2540;
        display:grid;place-items:center;box-shadow:0 0 30px rgba(65,184,255,.35)">
        <span style="font-family:'Chakra Petch';font-weight:700;font-size:30px;
          background:linear-gradient(135deg,#41B8FF,#8A5CFF 50%,#FF8A3C);-webkit-background-clip:text;
          background-clip:text;color:transparent">A</span>
      </div>
      <div style="font-family:'Chakra Petch';font-weight:700;font-size:34px;letter-spacing:.12em;color:#E8EDF7">AI<span
        style="background:linear-gradient(135deg,#41B8FF,#8A5CFF 50%,#FF8A3C);-webkit-background-clip:text;
        background-clip:text;color:transparent">LEX</span></div>
    </div>
    <div id="splashStatus" style="position:relative;font-family:'Chakra Petch';font-size:12px;letter-spacing:.28em;
      color:#5A6680;text-transform:uppercase;opacity:0;transition:opacity .6s">SYSTEM ONLINE · ${APP_VERSION}</div>`;
  document.body.appendChild(ov);

  // анимация логотипа и статуса
  const logo = ov.querySelector('#splashLogo');
  requestAnimationFrame(()=>{ logo.style.transition='opacity .7s ease,transform .7s ease'; logo.style.opacity='1'; logo.style.transform='none'; });
  setTimeout(()=>{ ov.querySelector('#splashStatus').style.opacity='1'; }, 700);

  // нейросеть на canvas: узлы вспыхивают и соединяются линиями
  const cv = ov.querySelector('#splashNet'), ctx = cv.getContext('2d');
  const DPR = Math.min(window.devicePixelRatio||1, 2);
  let W=0, H=0, nodes = [], raf, t0 = performance.now(), running = true, seeded = false;
  function measure(){
    W = cv.clientWidth || window.innerWidth || 360;
    H = cv.clientHeight || window.innerHeight || 640;
    cv.width = W*DPR; cv.height = H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  function seed(){
    const N = Math.max(28, Math.min(48, Math.round(W*H/15000)));
    nodes = [];
    for (let i=0;i<N;i++) nodes.push({ x:Math.random()*W, y:Math.random()*H,
      vx:(Math.random()-.5)*.28, vy:(Math.random()-.5)*.28, p:Math.random()*Math.PI*2 });
    seeded = true;
  }
  function draw(now){
    if (!running) return;
    // самовосстановление: если разметка ещё не дала размеры — измеряем и рассаживаем
    if (!seeded || W===0 || H===0){ measure(); if (W>0 && H>0) seed(); raf=requestAnimationFrame(draw); return; }
    ctx.clearRect(0,0,W,H);
    // линии между близкими узлами
    for (let i=0;i<nodes.length;i++){
      const a=nodes[i];
      for (let j=i+1;j<nodes.length;j++){
        const b=nodes[j], dx=a.x-b.x, dy=a.y-b.y, d=Math.hypot(dx,dy);
        if (d<130){ const al=(1-d/130)*0.4;
          ctx.strokeStyle=`rgba(65,184,255,${al})`; ctx.lineWidth=1;
          ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); }
      }
    }
    // узлы — вспыхивающие огоньки
    nodes.forEach(n=>{
      n.x+=n.vx; n.y+=n.vy; n.p+=0.05;
      if (n.x<0||n.x>W) n.vx*=-1; if (n.y<0||n.y>H) n.vy*=-1;
      const pulse=0.55+0.45*Math.sin(n.p), r=1.8+pulse*2;
      const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,r*4);
      const hot=(Math.sin(n.p*0.7)>0.6);
      g.addColorStop(0, hot?`rgba(255,138,60,${0.95*pulse})`:`rgba(120,200,255,${0.95*pulse})`);
      g.addColorStop(1,'rgba(10,20,36,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(n.x,n.y,r*4,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=hot?'#FFB071':'#9ED7FF'; ctx.beginPath(); ctx.arc(n.x,n.y,r*0.6,0,Math.PI*2); ctx.fill();
    });
    raf=requestAnimationFrame(draw);
  }
  window.addEventListener('resize', measure);
  // старт после того, как браузер построил разметку оверлея (иначе размеры = 0)
  requestAnimationFrame(()=>{ measure(); if (W>0 && H>0) seed(); raf=requestAnimationFrame(draw); });

  let finished=false;
  function finish(){
    if (finished) return; finished=true; running=false;
    cancelAnimationFrame(raf);
    ov.style.opacity='0';
    setTimeout(()=>{ ov.remove(); done && done(); }, 500);
  }
  ov.onclick = finish;                 // тап — пропустить
  setTimeout(finish, 2500);            // авто-уход ~2.5 с
}

  { k:'targetLang', q:'Какой язык будем изучать?',       type:'lang' },
  { k:'age',        q:'Сколько вам лет?',                type:'number', ph:'Возраст' },
  { k:'interests',  q:'Ваши интересы и сфера деятельности?', type:'area',
    ph:'Например: наладка станков с ЧПУ, столярное дело, рыбалка…',
    note:'Самое важное поле: на нём строятся все квесты и рассказы.' },
];
function askProfile(i, acc) {
  if (i >= PROFILE_Q.length) return placementIntro(acc);
  const q = PROFILE_Q[i];
  let field = '';
  if (q.type === 'lang') {
    field = `<select id="val">` + LANGS.map(l=>`<option value="${l.c}">${esc(l.n)}</option>`).join('') + `</select>`;
  } else if (q.type === 'area') {
    field = `<textarea id="val" rows="3" placeholder="${esc(q.ph)}"></textarea>`;
  } else {
    field = `<input type="${q.type}" id="val" placeholder="${esc(q.ph||'')}">`;
  }
  Screen.show(`
    <div class="eyebrow">Анкета · ${i+1} / ${PROFILE_Q.length}</div>
    <h1>${esc(q.q)}</h1>
    ${q.note?`<p class="sub">${esc(q.note)}</p>`:'<div style="height:6px"></div>'}
    <div class="card">${field}</div>
    <button class="btn btn-primary" id="next">Далее</button>`,
    { back: i>0 ? ()=>askProfile(i-1, acc) : null });
  if (q.type==='lang' && q.k==='targetLang') $('#val').value = acc.nativeLang==='en' ? 'de' : 'en';
  $('#next').onclick = () => {
    const v = $('#val').value.trim();
    if (!v) return toast('Заполните поле', true);
    if (q.k==='targetLang' && v===acc.nativeLang) return toast('Целевой язык должен отличаться от родного', true);
    acc[q.k] = q.type==='number' ? +v : v;
    askProfile(i+1, acc);
  };
}

/* ---------- Placement Test (раздел 4, шаг 2) ---------- */
function placementIntro(profile) {
  Screen.show(`
    <div class="eyebrow">Шаг 2</div>
    <h1>Тест уровня</h1>
    <p class="sub">Несколько вопросов на ${esc(langName(profile.targetLang))} — от простых к сложным. Не знаете — нажимайте «Не знаю», это нормально: тест завершится раньше.</p>
    <button class="btn btn-primary" id="go">Начать тест</button>
    <button class="btn btn-ghost" id="skip">Я новичок — начать с нуля (A1)</button>`);
  $('#go').onclick = () => runPlacement(profile);
  $('#skip').onclick = () => finishOnboarding(profile, 'A1');
}
async function runPlacement(profile) {
  Screen.loader('Готовлю вопросы теста…');
  let qs;
  try {
    const resp = await Gemini.call({
      task:'placement_test', target_lang: profile.targetLang, native_lang: profile.nativeLang,
      levels:['A1','A2','B1','B2','C1'], per_level: 2
    },
    '{"questions":[{"level":"A1","question":"вопрос на целевом языке (выбор правильного варианта)","options":["в1","в2","в3","в4"],"correct_index":0}]} — ровно по 2 вопроса на уровень, по возрастанию сложности, варианты на целевом языке');
    qs = resp.questions;
    if (!Array.isArray(qs) || qs.length < 4) throw 0;
  } catch(e) { toast('Не удалось получить тест — начнём с A1', true); return finishOnboarding(profile, 'A1'); }

  let idx = 0, wrongAtLevel = {}, passed = {}, stopped = false;
  const step = () => {
    if (stopped || idx >= qs.length) return done();
    const q = qs[idx];
    const opts = q.options.map((o,i)=>({o,i}));
    Screen.show(`
      <div class="eyebrow">Тест уровня · вопрос ${idx+1} / ${qs.length}</div>
      <div class="card">
        <div class="drill-head"><span class="n">${esc(q.level)}</span></div>
        <div class="task-text">${esc(q.question)}</div>
        ${shuffle(opts).map(x=>`<button class="opt" data-i="${x.i}">${esc(x.o)}</button>`).join('')}
        <button class="opt" data-i="-1" style="color:var(--dim)">Не знаю</button>
      </div>`);
    document.querySelectorAll('.opt').forEach(b => b.onclick = () => {
      const ok = +b.dataset.i === q.correct_index;
      if (ok) passed[q.level] = (passed[q.level]||0)+1;
      else {
        wrongAtLevel[q.level] = (wrongAtLevel[q.level]||0)+1;
        if (wrongAtLevel[q.level] >= 2) stopped = true;   // досрочное завершение
      }
      idx++; step();
    });
  };
  const done = () => {
    let level = 'A1';
    for (const L of ['A1','A2','B1','B2','C1']) if ((passed[L]||0) >= 1 && !( (wrongAtLevel[L]||0)>=2 )) level = L; else break;
    finishOnboarding(profile, level);
  };
  step();
}

function dictWordKey(w){ return (w.term||'?').trim().replace(/^(der|die|das)\s+/i,''); }   // без ведущего артикля
function dictFirstLetter(w){ return (dictWordKey(w).charAt(0)||'#').toUpperCase(); }
function isIrregularVerb(w){ return (w.part_of_speech==='verb' || /en$/.test(w.term||'')) && (w.is_irregular===true); }
function showDictionary(letter, irrOnly) {
  irrOnly = !!irrOnly;

  const groups = {};

  document.querySelectorAll('.alpha').forEach(b => b.onclick = () => showDictionary(b.dataset.l, irrOnly));

    if (open) { body.style.display='none'; b.querySelector('.chev').textContent='▾'; return; }

      body.querySelectorAll('.tts[data-t]').forEach(x=>x.onclick=()=>speak(x.dataset.t, DB.profile.targetLang)); }

// Разбор строки: "[Категория] Термин [транскрипция] — перевод" (категория/транскрипция необязательны)
function parseImportLine(line) {
  let s = String(line).trim();
  if (!s || s.startsWith('#') || s.startsWith('=') || /^[А-ЯA-Z0-9 .]+$/.test(s) && !s.includes('—') && !s.includes('-')) {
    // строка-заголовок/комментарий без пары термин-перевод — пропускаем
  }
  if (!s || s.startsWith('#') || s.startsWith('=')) return null;
  let category = '';
  const mCat = s.match(/^\[([^\]]+)\]\s*/);
  if (mCat) { category = mCat[1].trim(); s = s.slice(mCat[0].length); }
  // разделитель термин/перевод: тире (—, –, -) — берём первое " — " или " - "
  const sep = s.match(/\s[—–-]\s/);
  if (!sep) return null;
  const idx = s.indexOf(sep[0]);
  let left = s.slice(0, idx).trim();
  const translation = s.slice(idx + sep[0].length).trim();
  if (!left || !translation) return null;
  // транскрипция в [...] внутри левой части
  let translit = '';
  const mTr = left.match(/\[([^\]]+)\]/);
  if (mTr) { translit = '['+mTr[1].trim()+']'; left = left.replace(mTr[0], '').trim(); }
  const term = left;
  if (!term) return null;
  return { term, translit, translation, category };
}
function parseImportText(text) {
  const out = [], seen = {};
  String(text).split(/\r?\n/).forEach(l => {
    const w = parseImportLine(l);
    if (w && !seen[norm(w.term)]) { seen[norm(w.term)] = 1; out.push(w); }
  });
  return out;
}

    <div class="card">

/* =====================================================================
   УРОК — система 21 дрилла (раздел 5). Один дрилл на экран; нельзя
   перейти дальше, пока текущий не выполнен верно.
   ===================================================================== */
let L = null; // состояние текущего урока
function curCefr(){ const p = parseCode(String(L?.code||'').replace('SUPER_','')); return p ? p.lvl : DB.profile.cefr; }

async function startLesson(code) {
  const p = DB.profile, lvl = parseCode(code).lvl;
  Screen.loader('Готовлю урок ' + code + '…');
  // --- баланс лексики: бытовое + интересы (раздел 5.0) ---
  const survN = Math.round(7 * (SURVIVAL_SHARE[lvl] ?? 0.3));
  const known = DB.vocab.map(w => w.term).slice(-300);
  let words;
  // ПОРЦИЯ 1 (быстрый старт): только слова урока. Узнавание/письмо строятся из них локально.
  try {
    const r1 = await Gemini.call({
      task:'generate_vocab', target_lang:p.targetLang, native_lang:p.nativeLang, cefr:lvl,
      topic:p.interests, count:7,
      split:{ survival: survN, interests: 7 - survN },
      survival_topics:'ориентирование и транспорт, магазин и покупки, деньги и числа, еда, базовая вежливость, время и даты, здоровье',
      known_vocab: known,
      rules:'Исключи слова из known_vocab. Если на этом уровне уместны неправильные глаголы — включи 2 (с формами). Для КАЖДОГО слова заполни поле forms («паспорт»): для глаголов три основные формы + 3-е лицо при смене корня (например "sieht, sah, hat gesehen"), для существительных артикль рода и множественное число (например "der Tisch, die Tische"). Поле part_of_speech: noun/verb/adj/other; для существительных article: der/die/das. Транскрипция — средствами родного языка (native_lang), в квадратных скобках.'
    },
    '{"words":[{"term":"слово на целевом языке","emoji":"один эмодзи-якорь","translit":"[транскрипция родными буквами]","translation":"перевод на родной","part_of_speech":"noun|verb|adj|other","article":"der|die|das или пусто","is_irregular":false,"forms":"паспорт форм: для глаголов 3 формы (+3 лицо у неправильных), для существительных артикль+множественное"}]} — ровно 7 объектов');
    words = (r1.words||[]).filter(w => w.term && w.translation && !DB.vocab.some(v => norm(v.term)===norm(w.term))).slice(0,7);
    if (words.length < 3) throw new Error('FEW_WORDS');
  } catch(e) {
    if (String(e.message).startsWith('KEY:')) return keyWizard(true);
    return lessonLoadError(()=>startLesson(code), e);
  }

  // --- Recap: 7 задач повторения (трудные слова + прошлый урок) ---
  const recapPool = [];
  const inQueue = DB.vocab.filter(w => DB.reviewQueue.includes(w.term));
  const recent  = DB.vocab.slice(-10);
  [...inQueue, ...recent].forEach(w => { if (!recapPool.some(x=>x.term===w.term)) recapPool.push(w); });
  const recapItems = DB.vocab.length >= 4 ? pick(recapPool, Math.min(7, recapPool.length)) : [];

  // --- сборка шагов: узнавание/письмо готовы сразу; построение фраз — порция 2 (фон) ---
  const steps = [];
  recapItems.forEach((w,i) => steps.push({ t:'recog', phase:'Recap', n:`R${i+1}/7`, w, pool:'all' }));
  steps.push({ t:'present' });
  steps.push({ t:'grammar' });   // отрисуется, если правило догрузилось; иначе пропустится
  for (let i=0;i<5;i++) steps.push({ t:'recog', phase:'Recognition', n:`Задание ${i+1}/21`, w: words[i % words.length], pool:'lesson' });
  for (let i=0;i<6;i++) steps.push({ t:'write', phase:'Writing', n:`Задание ${i+6}/21`, w: words[i % words.length] });
  for (let i=0;i<9;i++) steps.push({ t:'construct', phase:'Construction', n:`Задание ${i+12}/21`, ci:i });
  steps.push({ t:'quest', n:'Задание 21/21 · Final Challenge' });

  L = { code, words, steps, i:0, grammar:null, constructs:null, chunk2:{state:'idle',promise:null,err:null},
        lvl, known,
        errors:{ recognition:0, writing:0, construction:0, quest:0 },
        ft:{ ok:0, total:0 }, hints:0, t0: Date.now(),
        wordErr:{}, firstTryDone:{} };
  fetchLessonChunk2();   // порция 2 — в фоне, пока ученик делает повторение/презентацию/узнавание
  renderStep();
}

// Порция 2: задания на построение фраз + правило урока. Грузится в фоне, повторяется локально при сбое.
function fetchLessonChunk2() {
  if (!L) return;
  L.chunk2.state = 'loading'; L.chunk2.err = null;
  const p = DB.profile, lvl = L.lvl, words = L.words, known = L.known;
  L.chunk2.promise = (async () => {
    const r2 = await Gemini.call({
      task:'generate_construction_drills', target_lang:p.targetLang, native_lang:p.nativeLang, cefr:lvl,
      topic:p.interests, lesson_words: words.map(w=>w.term), known_vocab: known.slice(-60), count:9,
      rules:'Задания на активное построение фраз родной→целевой (production). Запрещён обратный перевод. Каждое задание использует хотя бы одно слово урока. Уровень CEFR строго соблюдать.'
    },
    '{"items":[{"prompt_native":"Скажи на целевом языке: «...» (формулировка на родном)","expected_target":"эталонная фраза на целевом языке","focus_word":"слово урока"}]} — ровно 9 объектов');
    const constructs = (r2.items||[]).filter(i=>i.prompt_native && i.expected_target).slice(0,9);
    if (constructs.length < 5) throw new Error('FEW_DRILLS');
    L.constructs = constructs;
    try {
      const knownRules = (DB.rules||[]).map(r=>r.title).slice(-40);
      const rg = await Gemini.call({
        task:'grammar_rule', target_lang:p.targetLang, native_lang:p.nativeLang, cefr:lvl,
        lesson_words: words.map(w=>w.term), known_rules: knownRules,
        rules:'Верни ОДНО уместное по уровню CEFR правило, связанное со словами урока, которого ещё нет в known_rules. Если нового правила нет — has_new_rule=false. Правило ЦЕЛИКОМ: в table ПОЛНЫЙ набор форм по теме. Пояснения и название — на native_lang. Транскрипция — родными буквами в скобках. Проставь categories.'
      },
      '{"has_new_rule":true,"title":"короткое название на родном","summary":"суть в 1-2 фразы на родном","categories":["одна или несколько из: Артикли, Существительные, Глаголы, Времена, Падежи, Предлоги, Порядок слов, Местоимения, Прочее"],"table":[{"form":"форма на целевом","translit":"[транскрипция родными буквами]","translation":"перевод"}],"examples":[{"target":"пример на целевом","translit":"[транскрипция]","translation":"перевод"}],"cefr":"уровень"}');
      if (rg && rg.has_new_rule && rg.title && !(DB.rules||[]).some(r=>norm(r.title)===norm(rg.title))) L.grammar = rg;
    } catch(_) { /* правило необязательно */ }
    L.chunk2.state = 'ready';
  })().catch(e => { L.chunk2.state = 'error'; L.chunk2.err = e; throw e; });
  return L.chunk2.promise;
}

// Гарантирует готовность порции 2 к моменту, когда она нужна (построение фраз / правило).
async function ensureChunk2() {
  if (!L) return false;
  if (L.chunk2.state === 'ready') return true;
  if (L.chunk2.state === 'idle') fetchLessonChunk2();
  Screen.loader('Догружаю урок…');
  try { await L.chunk2.promise; return true; }
  catch(e) {
    if (String(e.message||'').startsWith('KEY:')) { keyWizard(true); return false; }
    lessonLoadError(()=>{ fetchLessonChunk2(); ensureChunk2().then(ok=>{ if(ok) renderStep(); }); }, e);
    return false;
  }
}

function lessonLoadError(retryFn, e) {
  Screen.show(`<h1>Не получилось подготовить урок</h1>
    <p class="sub">Проверьте интернет и попробуйте снова. Обучение не блокируется из-за модели — данные не пострадали.</p>
    <p class="note" style="opacity:.7">Причина: ${esc(String(e?.message||'неизвестно'))}</p>
    <button class="btn btn-primary" id="r">Повторить</button>
    <button class="btn btn-ghost" id="m">В меню</button>`);
  $('#r').onclick = retryFn; $('#m').onclick = mainMenu;
}

function noteWordError(term) {
  L.wordErr[term] = (L.wordErr[term]||0) + 1;
  const v = DB.vocab.find(w => norm(w.term)===norm(term));
  if (v) {
    v.errors = (v.errors||0) + 1;
    v.status = 'на закреплении';
    if (v.errors >= 2) {
      if (!DB.reviewQueue.includes(v.term)) DB.reviewQueue.push(v.term);
      ensureMnemonic(v); // мнемоника — один раз по триггеру (раздел 2.3-М)
    }
  }
}
/* Мнемоника: уровень 1 (текст + эмодзи) генерируется однократно и хранится.
   Уровни 2 (схемы) и 3 (Imagen, «пробовать → откат») — направление развития
   этого прототипа; принцип деградации сохранён в архитектуре. */
async function ensureMnemonic(v) {
  if (v.mnemonic || v._mnemoPending) return;
  v._mnemoPending = true;
  try {
    const r = await Gemini.call({ task:'mnemonic', target_lang:DB.profile.targetLang, native_lang:DB.profile.nativeLang,
      term:v.term, translation:v.translation, topic:DB.profile.interests },
      '{"mnemonic":"один яркий чувственный образ-ассоциация на родном языке, 1–2 коротких предложения"}');
    if (r.mnemonic) { v.mnemonic = r.mnemonic; v.mnemo_date = today(); Storage.save(DB); }
  } catch(e){}
  delete v._mnemoPending;
}

function firstTry(stepKey, ok) {
  if (L.firstTryDone[stepKey]) return;
  L.firstTryDone[stepKey] = true;
  L.ft.total++; if (ok) L.ft.ok++;
}

function renderStep() {
  if (!L || L.i >= L.steps.length) return finishLesson();
  const s = L.steps[L.i];
  if (s.t==='present')   return drillPresent();
  if (s.t==='grammar') {                 // правило из порции 2: если не готово — подождём; нет правила — пропустим
    if (L.isSuper) return (L.i++, renderStep());
    if (L.chunk2.state==='ready') { if (L.grammar) return drillGrammar(); L.i++; return renderStep(); }
    return ensureChunk2().then(ok => { if (!ok) return; if (L.grammar) drillGrammar(); else { L.i++; renderStep(); } });
  }
  if (s.t==='recog')     return drillRecog(s);
  if (s.t==='write')     return drillWrite(s);
  if (s.t==='construct') {               // построение фраз из порции 2
    if (s.c) return drillConstruct(s);   // супер-урок передаёт готовый объект c
    if (L.constructs && L.constructs.length) { s.c = L.constructs[s.ci % L.constructs.length]; return drillConstruct(s); }
    return ensureChunk2().then(ok => { if (!ok) return; s.c = L.constructs[s.ci % L.constructs.length]; drillConstruct(s); });
  }
  if (s.t==='quest')     return runQuest({
      title:'Задание 21 · Интерактивный рассказ-квест',
      topic: DB.profile.interests, cefr: curCefr(),
      mustUse: L.words.slice(0,3).map(w=>w.term), maxScenes: questScenes(curCefr()),
      onError: ()=>{ L.errors.quest++; },
      onDone: ()=>{ L.i++; renderStep(); }
    });
}

/* Точное правило при ошибке (версия 4.7).
   Правило приходит прямо в ответе check_answer — Gemini формулирует его под конкретную
   допущенную ошибку. Показываем сразу при первой ошибке и сохраняем в Свод правил. */
function ruleFromCheck(res) {
  if (!res || !res.rule_title) return null;
  return { title: res.rule_title, summary: res.rule_summary || '', table: res.rule_table || [],
    categories: Array.isArray(res.rule_categories) ? res.rule_categories : [],
    examples: [], cefr: curCefr(), lesson: (L&&L.code)||'', status: 'на закреплении',
    errors: 0, date_added: today() };
}
function saveErrorRule(rule) {
  if (!rule || !rule.title) return;
  DB.rules = DB.rules || [];
  const ex = DB.rules.find(r => norm(r.title) === norm(rule.title));
  if (ex) { ex.errors = (ex.errors||0) + 1; ex.status = 'на закреплении';
            if (!ex.table?.length && rule.table?.length) ex.table = rule.table; }
  else DB.rules.push(rule);
  Storage.save(DB);
}
function showErrorRule(res) {
  const rule = ruleFromCheck(res);
  saveErrorRule(rule);
  const fb = document.getElementById('fb');
  if (!fb || !rule || document.getElementById('errRule')) return;
  const box = document.createElement('div');
  box.id = 'errRule';
  box.style.cssText = 'margin-top:10px;border-top:1px solid var(--line);padding-top:8px;font-size:14px';
  box.innerHTML = `<b style="color:var(--violet)">📐 Правило:</b> <span style="color:var(--ink)">${esc(rule.summary||rule.title)}</span>`
    + (rule.table && rule.table.length ? ` <button class="btn-mini" style="margin-left:6px;display:inline-block;width:auto" id="errRuleMore">Подробнее</button>` : '');
  fb.appendChild(box);
  const more = document.getElementById('errRuleMore');
  if (more) more.onclick = () => showRulePopup(rule);
}

/* ---------- Recognition / Recap: выбор слова по переводу ---------- */
function drillRecog(s) {
  const w = s.w;
  const fillerPool = (s.pool==='lesson' ? L.words : DB.vocab.concat(L.words)).filter(x => norm(x.term)!==norm(w.term));
  const opts = shuffle([w, ...pick(fillerPool, 3)]);
  const isRecap = s.phase==='Recap';
  const key = 'st'+L.i;
  Screen.show(`
    <div class="eyebrow">${esc(L.code)} · ${esc(s.phase)}</div>
    <div class="card">
      <div class="drill-head"><span class="n">${esc(s.n)}</span><span class="ph">🎯 узнавание</span></div>
      <div class="task-text">${esc(w.emoji||'')} ${esc(w.translation)}</div>
      ${opts.map(o=>`<button class="opt" data-t="${esc(o.term)}">${esc(o.term)}</button>`).join('')}
      <div class="feedback" id="fb"></div>
      <button class="btn btn-primary" id="next" style="margin-top:12px" disabled>Дальше</button>
    </div>`);
  document.querySelectorAll('.opt').forEach(b => b.onclick = () => {
    const ok = norm(b.dataset.t) === norm(w.term);
    firstTry(key, ok);
    if (ok) {
      b.classList.add('right');
      document.querySelectorAll('.opt').forEach(x=>x.disabled=true);
      $('#fb').className='feedback ok';
      $('#fb').innerHTML = `✅ <b>${esc(w.term)}</b> <span style="color:var(--orange)">${esc(w.translit||'')}</span>` + sayBtn(w.term);
      speak(w.term, DB.profile.targetLang);
      $('#next').disabled = false;
    } else {
      b.classList.add('wrong'); b.disabled = true;
      L.errors.recognition++; noteWordError(w.term);
      $('#fb').className='feedback bad';
      $('#fb').innerHTML = `❌ Не то. Попробуйте ещё раз — верный вариант на экране.`;
    }
  });
  $('#next').onclick = () => { L.i++; renderStep(); };
}

/* ---------- Writing: написать слово по памяти ---------- */
function drillWrite(s) {
  const w = s.w, key = 'st'+L.i;
  const hard = (L.wordErr[w.term]||0) > 0 || DB.reviewQueue.includes(w.term);
  let mustRetype = false;
  Screen.show(`
    <div class="eyebrow">${esc(L.code)} · Writing</div>
    <div class="card">
      <div class="drill-head"><span class="n">${esc(s.n)}</span><span class="ph">✍️ письмо</span></div>
      <div class="task-text">${esc(w.emoji||'')} ${esc(w.translation)}${hard?` <span style="color:var(--orange);font-size:14px">${esc(w.translit||'')}</span>`:''}</div>
      <input type="text" id="ans" placeholder="Напишите слово на ${esc(langName(DB.profile.targetLang))}" autocomplete="off" autocapitalize="off">
      <div class="feedback" id="fb"></div>
      <div class="btn-row" style="margin-top:12px">
        <button class="btn btn-ghost btn-ico" id="hint" title="Подсказка" aria-label="Подсказка">💡</button>
        <button class="btn btn-primary" id="check">Проверить</button>
      </div>
    </div>`);
  $('#hint').onclick = () => { L.hints++; $('#fb').className='feedback ok'; $('#fb').innerHTML=`💡 <span style="color:var(--orange)">${esc(w.translit||'')}</span> · первая буква: <b>${esc(w.term[0])}</b>`; };
  $('#check').onclick = () => {

      $('#fb').className='feedback ok';
      $('#fb').innerHTML = `✅ Верно: <b>${esc(w.term)}</b> <span style="color:var(--orange)">${esc(w.translit||'')}</span>` + sayBtn(w.term);
      speak(w.term, DB.profile.targetLang);
      $('#check').textContent = 'Дальше';
      $('#check').onclick = () => { L.i++; renderStep(); };
    } else {
      if (!mustRetype) { L.errors.writing++; noteWordError(w.term); mustRetype = true; }
