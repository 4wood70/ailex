/* =====================================================================
   A0 (Pre-A1): уровень фонетики и выживательной лексики (раздел 4.3).
   Используется для пользователей с нулевым знанием языка.
   Контракт: a0_lesson (Пример F, раздел 2.5 спецификации 4.17).
   РЕЖИМЫ: "alphabet" — полный алфавит таблицей + 12 упражнений;
           "standard"  — 5-7 тематических групп + 12 упражнений.
   ===================================================================== */
async function startA0Lesson(code) {
  const p = DB.profile;
  const nm = code.match(/^A0\.1\.(\d+)$/);
  if (!nm) return mainMenu();
  const lessonN = +nm[1];
  const total   = DB.profile.a0Total || 12;
  const blk     = getA0Block(lessonN, total);

  // 4.29: незавершённый урок A0 продолжается с сохранённого шага. Вместе с позицией в снимке лежит
  // и СОДЕРЖИМОЕ урока — иначе Gemini выдал бы при возврате другой урок и «продолжить» потеряло бы смысл.
  const saved = Episodes.get('a0', code);
  if (saved && Array.isArray(saved.steps) && saved.steps.length) return runA0Lesson(saved);

  // Первые два phonics-урока — алфавитный режим; остальные — стандартный
  const isAlpha = blk.block === 'phonics';

  Screen.loader('Готовлю урок A0.' + String(lessonN).padStart(2,'0') + '…');

  let lesson;
  const schemaHint = `{"lesson_title":"заголовок на native_lang","mode":"${isAlpha?'alphabet':'standard'}","items":[{"pattern":"буква/сочетание/тема","ipa_approx":"звук native_lang буквами","native_hint":"подсказка","examples":[{"word":"слово на target_lang","translit":"[транскрипция]","translation":"перевод","emoji":"эмодзи"}]}],"mini_check":[{"prompt_native":"вопрос на native_lang","options":[{"word":"вариант","correct":true}]}]${blk.hasMiniScene?`,"mini_scene":{"situation_native":"ситуация на native_lang — 1 предложение","exchanges":[{"speaker":"other","text_target":"фраза","translit":"[транскр]","text_native":"перевод"},{"speaker":"you","text_native":"что сказать:","task_options":[{"word":"правильная фраза","translit":"[транскр]","correct":true},{"word":"неверный вариант","correct":false},{"word":"неверный вариант","correct":false}]},{"speaker":"other","text_target":"фраза","translit":"[транскр]","text_native":"перевод"},{"speaker":"you","text_target":"фраза","translit":"[транскр]","text_native":"скажите:","task_type":"tap_to_say"}]}`:''}}`;

  const rules = isAlpha
    ? `ПРАВИЛА — АЛФАВИТНЫЙ УРОК (блок: ${blk.focus}):
items: ПОЛНЫЙ алфавит target_lang — ВСЕ буквы и спецсимволы (ü,ö,ä,ß для немецкого и т.п.), по ОДНОЙ букве на item, ОДНО слово-пример на букву. Транскрипция — native_lang буквами.
mini_check: РОВНО 12 упражнений ТОЛЬКО фонетических типов (по 6 каждого):
  Тип 1 (6 шт) — буква → звук: "Как читается буква X?" → 4 варианта транскрипции native_lang буквами.
  Тип 2 (6 шт) — звук → буква: "Какая буква даёт звук [Y]?" → 4 варианта букв.
ЗАПРЕТ: НЕ задавай вопросов на значение слов, перевод или лексику — человек ещё не знает языка, только учится читать буквы.
Все вопросы на native_lang. Транскрипция в квадратных скобках.`
    : `ПРАВИЛА — СТАНДАРТНЫЙ УРОК (блок: ${blk.block}, фокус: ${blk.focus}):
items: 5-7 тематических групп слов/фраз по теме фокуса. Для КАЖДОЙ группы — 3-4 слова или фразы в поле examples. Первое слово каждой группы — самое важное. Транскрипция — native_lang буквами.
mini_check: РОВНО 12 упражнений — узнавание слов, перевод, выбор правильного варианта из 4. Используй слова из items. Каждый вопрос на native_lang.`;

  try {
    lesson = await Gemini.call({
      task: 'a0_lesson', target_lang: p.targetLang, native_lang: p.nativeLang,
      lesson_index: lessonN, total_lessons: total, block: blk.block, focus: blk.focus
    }, schemaHint + '\n' + rules);
    if (!lesson?.items?.length) throw new Error('NO_ITEMS');
  } catch(e) {
    if (String(e.message||'').startsWith('KEY:')) return keyWizard(true);
    Screen.show(`
      <h1>Не удалось загрузить урок A0</h1>
      <p class="sub">Проверьте соединение и попробуйте снова.</p>
      <button class="btn btn-primary" id="retry">Повторить</button>
      <button class="btn btn-ghost" id="back">В меню</button>`);
    $('#retry').onclick = () => startA0Lesson(code);
    $('#back').onclick  = mainMenu;
    return;
  }

  // Сборка шагов:
  // Алфавитный режим: 1 шаг-сетка (все буквы сразу) + 12 упражнений
  // Стандартный: карточки по группам + 12 упражнений
  const steps = [];
  if (isAlpha) {
    steps.push({ type:'alpha_grid', items: lesson.items, title: lesson.lesson_title||'' });
  } else {
    (lesson.items||[]).forEach((item,i) => steps.push({ type:'item', item, idx:i, title: lesson.lesson_title||'' }));
  }
  (lesson.mini_check||[]).forEach((check,i) => steps.push({ type:'check', check, idx:i }));
  // Мини-сцена — финальный шаг тематических уроков (не phonics)
  if (blk.hasMiniScene && lesson.mini_scene?.exchanges?.length) {
    steps.push({ type:'scene', scene: lesson.mini_scene });
  }

  return runA0Lesson({ code, lessonN, total, steps, stepIdx:0, correctChecks:0, spent:0 });
}

/* Прохождение урока A0 из состояния S (4.29). S целиком уходит в снимок эпизода перед каждым
   шагом, поэтому выход из приложения на любом шаге — включая финальную мини-сцену — не теряет
   ни позицию, ни содержимое урока. Снимок снимается только по завершении урока. */
function runA0Lesson(S) {
  const { code, lessonN, total } = S;
  const steps = S.steps;
  const totalChecks = steps.filter(s=>s.type==='check').length;
  let mark = Date.now();   // метка текущего захода: паузы между заходами в статистику не идут

  const runStep = () => {
    S.spent = (S.spent||0) + (Date.now() - mark); mark = Date.now();
    if (S.stepIdx >= steps.length) {
      Episodes.drop('a0', code);   // урок пройден — снимок больше не нужен
      return finishA0Lesson(code, lessonN, total, S.correctChecks, totalChecks, Date.now() - S.spent);
    }
    Episodes.put('a0', code, S);   // снимок позиции перед каждым шагом
    const s = steps[S.stepIdx];
    const progress = `${S.stepIdx+1}/${steps.length}`;
    if (s.type === 'alpha_grid') showA0AlphaGrid(s.items, s.title, lessonN, total, progress, () => { S.stepIdx++; runStep(); });
    else if (s.type === 'item')  showA0Item(s.item, s.title, lessonN, total, progress, () => { S.stepIdx++; runStep(); });
    else if (s.type === 'check') showA0Check(s.check, lessonN, total, progress, (ok) => { if(ok) S.correctChecks++; S.stepIdx++; runStep(); });
    else if (s.type === 'scene') showA0MiniScene(s.scene, lessonN, total, progress, () => { S.stepIdx++; runStep(); });
    else { S.stepIdx++; runStep(); }
  };
  runStep();
}

/* Алфавитная сетка — все буквы сразу, каждая тапается для TTS */
function showA0AlphaGrid(items, title, lessonN, total, progress, onNext) {
  const cells = items.map((item,i) => `
    <div class="a0-alpha-cell" data-idx="${i}">
      <div class="a0-ltr">${esc(item.pattern||'')}</div>
      <div class="a0-sound">${esc(item.ipa_approx||'')}</div>
      <div class="a0-ex">${esc(item.examples?.[0]?.word||'')}</div>
    </div>`).join('');
  Screen.show(`
    <div class="eyebrow">A0 · урок ${lessonN}/${total} · шаг ${progress}</div>
    <div class="card">
      <div class="drill-head"><span class="n" style="font-size:13px">${esc(title)}</span></div>
      <p class="note" style="margin:4px 0 8px">👆 Нажмите на букву, чтобы услышать её произношение</p>
      <div class="a0-alpha-grid" id="alphaGrid">${cells}</div>
    </div>
    <p class="note" style="text-align:center">Изучите все буквы — затем переходите к заданиям</p>
    <button class="btn btn-primary" id="a0next">К заданиям →</button>`);
  // TTS по клику на ячейку
  document.querySelectorAll('.a0-alpha-cell').forEach((cell, i) => {
    cell.onclick = () => {
      const item = items[i];
      const word = item.examples?.[0]?.word || item.pattern || '';
      speak(word, DB.profile.targetLang);
      cell.classList.add('playing');
      setTimeout(()=>cell.classList.remove('playing'), 800);
    };
  });
  $('#a0next').onclick = onNext;
}

function showA0Item(item, title, lessonN, total, progress, onNext) {
  const exHtml = (item.examples||[]).map(ex => `
    <div class="a0-example">
      <span class="a0-word">${esc(ex.emoji||'')} ${esc(ex.word||'')}</span>
      <span class="a0-translit">${esc(ex.translit||'')}</span>
      <span class="a0-trans">= ${esc(ex.translation||'')}</span>
      ${sayBtn(ex.word||'')}
    </div>`).join('');
  Screen.show(`
    <div class="eyebrow">A0 · урок ${lessonN}/${total} · шаг ${progress}</div>
    <div class="card">
      <div class="drill-head"><span class="n" style="font-size:13px">${esc(title)}</span></div>
      <div class="a0-pattern">
        <span class="a0-patt-main">${esc(item.pattern||'')}</span>
        ${item.ipa_approx?`<span class="a0-ipa">≈ ${esc(item.ipa_approx)}</span>`:''}
      </div>
      ${item.native_hint?`<p class="note" style="margin:8px 0">💡 ${esc(item.native_hint)}</p>`:''}
      <div class="a0-examples">${exHtml}</div>
    </div>
    <button class="btn btn-primary" id="a0next">Дальше →</button>`);
  if (item.examples?.[0]?.word) speak(item.examples[0].word, DB.profile.targetLang);
  $('#a0next').onclick = onNext;
}

function showA0Check(check, lessonN, total, progress, onDone) {
  const opts = shuffle([...(check.options||[])]);
  if (!opts.length) { onDone(true); return; }
  Screen.show(`
    <div class="eyebrow">A0 · урок ${lessonN}/${total} · задание ${progress}</div>
    <div class="card" id="a0card">
      <div class="task-text">🎯 ${esc(check.prompt_native||'Выберите правильный вариант:')}</div>
      <div style="height:10px"></div>
      ${opts.map((o,i)=>`<button class="opt" data-correct="${!!o.correct}" data-idx="${i}">${esc(o.word||String(o))}</button>`).join('')}
    </div>`);
  document.querySelectorAll('.opt').forEach(b => b.onclick = () => {
    const ok = b.dataset.correct === 'true';
    document.querySelectorAll('.opt').forEach(x => {
      x.disabled = true;
      if (x.dataset.correct === 'true') x.classList.add('correct-opt');
      else if (x === b && !ok)          x.classList.add('wrong-opt');
    });
    const fb = document.createElement('div');
    fb.className = ok ? 'feedback ok' : 'feedback bad';
    fb.innerHTML = ok ? '✅ Верно!' : '❌ Не совсем — правильный ответ выделен зелёным.';
    document.getElementById('a0card').appendChild(fb);
    if (ok && b.textContent) speak(b.textContent.trim(), DB.profile.targetLang);
    const btn = document.createElement('button');
    btn.className = 'btn btn-primary'; btn.style.marginTop = '14px';
    btn.textContent = 'Дальше →'; btn.onclick = () => onDone(ok);
    document.getElementById('a0card').after(btn);
  });
}

/* Мини-сцена A0: ситуативный диалог в конце тематического урока.
   Каждая реплика — отдельный экран (тот же паттерн, что и остальные шаги).
   Типы: passive (показ реплики + TTS), task_options (выбор фразы), tap_to_say (тап для озвучки). */
function showA0MiniScene(scene, lessonN, total, progress, onDone) {
  if (!scene?.exchanges?.length) { onDone(); return; }
  const sit = scene.situation_native || '';
  let ei = 0;

  const header = () =>
    `<div class="eyebrow">A0 · урок ${lessonN}/${total} · мини-сцена</div>
     <p class="note" style="margin:0 0 8px;font-size:13px">📍 ${esc(sit)}</p>`;

  const nextBtn = (label, cb) => {
    const b = document.createElement('button');
    b.className = 'btn btn-primary'; b.style.marginTop = '12px';
    b.textContent = label; b.onclick = cb;
    return b;
  };

  const advance = () => { ei++; showEx(); };

  const showEx = () => {
    if (ei >= scene.exchanges.length) return onDone();
    const ex = scene.exchanges[ei];
    const isLast = ei === scene.exchanges.length - 1;
    const nextLabel = isLast ? 'Завершить сцену ✓' : 'Дальше →';

    /* --- Выбор фразы (task_options) --- */
    if (ex.task_options?.length) {
      const opts = shuffle([...ex.task_options]);
      Screen.show(`${header()}
        <div class="card" id="scCard">
          ${ex.text_target ? `<div class="a0-scene-other-line">
            <div class="a0-scene-speaker">🧑‍💼</div>
            <div class="a0-scene-target">${esc(ex.text_target)}</div>
            ${ex.translit ? `<span class="a0-scene-translit">${esc(ex.translit)}</span>` : ''}
            ${ex.text_native ? `<div class="a0-scene-native">${esc(ex.text_native)}</div>` : ''}
            ${sayBtn(ex.text_target)}
          </div>` : ''}
          <div class="task-text">🎯 ${esc(ex.text_native || 'Выберите нужную фразу:')}</div>
          <div style="height:8px"></div>
          ${opts.map(o => `<button class="opt" data-correct="${!!o.correct}"
              data-word="${esc(o.word||'')}" data-translit="${esc(o.translit||'')}">
              ${esc(o.word||'')}
              ${o.translit ? `<span style="display:block;font-size:11px;color:var(--orange)">${esc(o.translit)}</span>` : ''}
            </button>`).join('')}
        </div>`);

      document.querySelectorAll('.opt').forEach(b => b.onclick = () => {
        const ok = b.dataset.correct === 'true';
        if (ok) speak(b.dataset.word, DB.profile.targetLang);
        document.querySelectorAll('.opt').forEach(x => {
          x.disabled = true;
          if (x.dataset.correct === 'true') x.classList.add('correct-opt');
          else if (x === b && !ok)          x.classList.add('wrong-opt');
        });
        const fb = document.createElement('div');
        fb.className = ok ? 'feedback ok' : 'feedback bad';
        const correctOpt = opts.find(o => o.correct);
        fb.innerHTML = ok
          ? `✅ Верно! ${esc(b.dataset.translit)}`
          : `❌ Правильно: <b>${esc(correctOpt?.word||'')}</b> ${esc(correctOpt?.translit||'')}`;
        document.getElementById('scCard').appendChild(fb);
        document.getElementById('scCard').after(nextBtn(nextLabel, advance));
      });
      return;
    }

    /* --- Тап для озвучки (tap_to_say) --- */
    if (ex.task_type === 'tap_to_say') {
      Screen.show(`${header()}
        <div class="card" id="scCard">
          <div class="task-text">🎯 ${esc(ex.text_native || 'Нажмите, чтобы произнести:')}</div>
          <div class="a0-scene-say-box">
            ${esc(ex.text_target||'')}
            ${ex.translit ? `<div class="a0-scene-translit" style="font-size:14px;margin-top:6px">${esc(ex.translit)}</div>` : ''}
          </div>
          <button class="btn btn-primary" id="tapSay">🔊 Произнести</button>
        </div>`);
      $('#tapSay').onclick = () => {
        speak(ex.text_target||'', DB.profile.targetLang);
        $('#tapSay').textContent = '✅ Сказано!'; $('#tapSay').disabled = true;
        document.getElementById('scCard').after(nextBtn(nextLabel, advance));
      };
      return;
    }

    /* --- Пассивная реплика (чтение + TTS) --- */
    const isYou = ex.speaker === 'you';
    Screen.show(`${header()}
      <div class="card">
        <div class="${isYou ? 'a0-scene-you-line' : 'a0-scene-other-line'}">
          <div class="a0-scene-speaker">${isYou ? '👤 Вы' : '🧑‍💼'}</div>
          <div class="a0-scene-target">${esc(ex.text_target||'')}</div>
          ${ex.translit ? `<span class="a0-scene-translit">${esc(ex.translit)}</span>` : ''}
          ${ex.text_native ? `<div class="a0-scene-native">${esc(ex.text_native)}</div>` : ''}
          ${sayBtn(ex.text_target||'')}
        </div>
      </div>
      <button class="btn btn-primary" id="a0next">${nextLabel}</button>`);
    if (ex.text_target) speak(ex.text_target, DB.profile.targetLang);
    $('#a0next').onclick = advance;
  };

  showEx();
}

function finishA0Lesson(code, lessonN, total, correct, totalChecks, t0) {
  const next       = nextAfterLesson(code);
  const isLastA0   = (next === 'A1.1.01');
  const secElapsed = Math.round((Date.now() - t0) / 1000);
  const accuracy   = totalChecks > 0 ? correct / totalChecks : 1;

  DB.progress.push({ code, date:today(), words:'', next, note:`A0 ${correct}/${totalChecks}` });
  DB.analytics.push({ lesson:code, date:today(), accuracy_first_try:accuracy,
    errors_by_type:{}, hard_words:[], duration_sec:secElapsed, hints_used:0, delta_accuracy:'' });
  DB.nextStage = next;
  if (isLastA0) DB.profile.cefr = 'A1';
  Storage.save(DB);
  toast('Сохранено ✓');

  const pctOk = totalChecks > 0 ? Math.round(correct/totalChecks*100) : 100;
  Screen.show(`
    <div class="eyebrow">Результат: ${totalChecks>0?`${correct}/${totalChecks} верных (${pctOk}%)`:'урок пройден'}</div>
    <h1>${isLastA0 ? '🎉 Основы пройдены! Добро пожаловать на A1!' : 'Урок A0 завершён'}</h1>
    <p class="sub">${isLastA0
      ? 'Вы освоили чтение и базовую лексику. Теперь начинается настоящее обучение — уровень A1!'
      : `Следующий урок: <b style="color:var(--ink)">${esc(next)}</b> &nbsp;·&nbsp; пройдено ${lessonN} из ${total}`}</p>
    <button class="btn btn-primary" id="bNext">${isLastA0 ? 'Начать A1 🚀' : 'Следующий урок →'}</button>
    <button class="btn btn-ghost"  id="bExit">В главное меню</button>`);
  $('#bNext').onclick = () => isLastA0 ? startLesson(next) : startA0Lesson(next);
  $('#bExit').onclick = mainMenu;
}

/* =====================================================================
   УРОК — система 21 дрилла (раздел 5). Один дрилл на экран; нельзя
   перейти дальше, пока текущий не выполнен верно.
   ===================================================================== */
let L = null; // состояние текущего урока
function curCefr(){ const p = parseCode(String(L?.code||'').replace('SUPER_','')); return p ? p.lvl : DB.profile.cefr; }

/* Резервный путь набора порции (раздел 5, 4.26): Ядро исчерпано или не собралось.
   Прежняя схема generate_vocab + ДОБОР: фильтр дубликатов резал порцию до 3–6 слов и добора не было
   (корень бага «3 слова вместо 7», v63). Теперь недобор добирается вторым запросом с исключениями. */
async function legacyVocabPortion(p, lvl, survN, known) {
  const SCHEMA = '{"words":[{"term":"слово на целевом языке","emoji":"один эмодзи-якорь","translit":"[транскрипция родными буквами]","translation":"перевод на родной","part_of_speech":"noun|verb|adj|other","article":"der|die|das или пусто","is_irregular":false,"forms":"паспорт форм: для глаголов 3 формы (+3 лицо у неправильных), для существительных артикль+множественное"}]}';
  const RULES = 'Исключи ВСЕ слова из known_vocab — они уже известны ученику. Включи ровно 2 неправильных глагола с формами (если в целевом языке их нет как класса — 7 обычных слов). Для КАЖДОГО слова заполни поле forms («паспорт»): для глаголов три основные формы + 3-е лицо при смене корня (например "sieht, sah, hat gesehen"), для существительных артикль рода и множественное число (например "der Tisch, die Tische"). Поле part_of_speech: noun/verb/adj/other; для существительных article: der/die/das. Транскрипция — средствами родного языка (native_lang), в квадратных скобках, IPA запрещён.';
  const fresh = arr => (arr||[]).filter(w => w && w.term && w.translation && !DB.vocab.some(v => norm(v.term)===norm(w.term)));
  const ask = async (n, exclude) => {
    const r = await Gemini.call({
      task:'generate_vocab', target_lang:p.targetLang, native_lang:p.nativeLang, cefr:lvl,
      topic:p.interests, count:n,
      split:{ survival: Math.round(n*(SURVIVAL_SHARE[lvl] ?? 0.3)), interests: n - Math.round(n*(SURVIVAL_SHARE[lvl] ?? 0.3)) },
      survival_topics: SURVIVAL_TOPICS, known_vocab: exclude, rules: RULES
    }, SCHEMA + ' — ровно ' + n + ' объектов');
    return r.words || [];
  };
  let words = fresh(await ask(7, known)).slice(0,7);
  if (words.length < 7) {                       // ДОБОР: исключаем известное + только что предложенное
    const exclude = [...new Set([...known, ...words.map(w=>w.term)])];
    try {
      const more = fresh(await ask(7 - words.length + 3, exclude))
        .filter(w => !words.some(x => norm(x.term)===norm(w.term)));
      words = [...words, ...more].slice(0,7);
    } catch(e){}                                // добор не удался — идём с тем, что есть
  }
  if (words.length < 3) throw new Error('FEW_WORDS');
  return words;
}

async function startLesson(code) {
  // --- восстановление незавершённого урока из снимка (v45, слоты раздельные с 4.29) ---
  const cached = LessonCache.lesson(code);
  if (cached && cached.code === code && cached.i > 0) {
    L = cached;
    // если chunk2 уже был готов — восстанавливаем данные; иначе перезапускаем фоновую загрузку
    if (L.chunk2.state === 'ready') {
      // данные уже в L.constructs/L.grammar/L.phrases — renderStep сам разберётся
    } else {
      L.chunk2 = { state:'idle', promise:null, err:null };
      fetchLessonChunk2();
    }
    renderStep();
    return;
  }
  LessonCache.clearLesson(code);   // 4.29: этот урок начинается заново — прочие эпизоды не трогаем
  const p = DB.profile, lvl = parseCode(code).lvl;
  Screen.loader('Готовлю урок ' + code + '…');
  // --- баланс лексики: бытовое + интересы (раздел 5.0) ---
  const survN = Math.round(7 * (SURVIVAL_SHARE[lvl] ?? 0.3));
  const known = DB.vocab.map(w => w.term).slice(-300);
  let words;
  // ИНТЕНСИВ: если есть импортированные, ещё не показанные слова — урок учит ИХ (а не генерирует посторонние)
  const importedNew = DB.vocab.filter(w => w.source==='import' && (w.status==='новое') && w.seen!==true);
  if (DB.intensive && importedNew.length >= 3) {
    words = importedNew.slice(0, 7);
  } else {
  // 4.26: порцию собирает ПРИЛОЖЕНИЕ из Ядра языка — без запроса к Gemini (раздел 5).
  // Выбор слов = методика, методика принадлежит приложению. Урок стартует мгновенно.
  words = Core.pickPortion(lvl);
  if (!words) {                       // Ядро исчерпано или не построено → резервный путь
    try { words = await legacyVocabPortion(p, lvl, survN, known); }
    catch(e) {
      if (String(e.message).startsWith('KEY:')) return keyWizard(true);
      return lessonLoadError(()=>startLesson(code), e);
    }
  }
  }

  // --- Recap: до 7 задач повторения (спека 4.27: срочный слой → подошедшие по дате) ---
  const recapPool = [];
  // пункт 3: импортированные слова, ещё не показанные, не идут в повторение, пока не «увидены»
  const seenOk = w => !((w.source==='import' || w.priority) && w.seen!==true && (w.status==='новое'||!w.status));
  // QUEUE-38: пассивно встреченные слова (тап в сцене / глоссарий квеста) — не повторяем, лишь выученное.
  const passiveEncounter = w => w.seen_in_context === true
    || w.status === 'встречено в контексте' || w.status === 'встреченное';
  // 1) СРОЧНЫЙ слой: трудные + приоритетные/импортированные — всегда первыми, минуя даты
  const urgent = DB.vocab.filter(w => DB.reviewQueue.includes(w.term) && seenOk(w));
  // 2) СПОКОЙНЫЙ слой: подошедшие по графику 1/3/7/30, самые просроченные первыми (расписание заменяет прежний добор «последние 10»)
  const due = DB.vocab.filter(w => seenOk(w) && !passiveEncounter(w) && !DB.reviewQueue.includes(w.term) && SRS.due(w))
                      .sort((a,b) => SRS.overdue(b) - SRS.overdue(a));
  [...urgent, ...due].forEach(w => { if (!recapPool.some(x=>x.term===w.term)) recapPool.push(w); });
  const recapItems = DB.vocab.length >= 4 ? recapPool.slice(0, 7) : [];

  // пункт 7: часто нарушаемое правило — поднять в начале урока для перечитывания
  const adaptiveRules = (DB.rules||[]).filter(r => (r.errors||0) >= 2)
                                     .sort((a,b)=>(b.errors||0)-(a.errors||0)).slice(0,2);

  // --- сборка шагов: узнавание/контекст готовы сразу; построение фраз — порция 2 (фон) ---
  const steps = [];
  adaptiveRules.forEach(r => steps.push({ t:'ruleRecap', rule: r }));
  // пункт 12: повторение слов прошлого урока — в контексте со скелетами (предложения из порции 2)
  recapItems.forEach((w,i) => steps.push({ t:'reviewCtx', phase:'Повторение', n:`R${i+1}/7`, w, ri:i }));
  steps.push({ t:'present' });
  steps.push({ t:'grammar' });   // отрисуется, если правило догрузилось; иначе пропустится
  for (let i=0;i<5;i++) steps.push({ t:'recog', phase:'Recognition', n:`Задание ${i+1}/21`, w: words[i % words.length], pool:'lesson' });
  for (let i=0;i<6;i++) steps.push({ t:'context', phase:'Слово в контексте', n:`Задание ${i+6}/21`, ci:i });
  if (((parseCode(code)||{}).n || 1) % 2 === 1) steps.push({ t:'phrases' });   // повседневные выражения — через урок (4.14)
  for (let i=0;i<9;i++) steps.push({ t:'construct', phase:'Construction', n:`Задание ${i+12}/21`, ci:i });
  steps.push({ t:'quest', n:'Задание 21/21 · Final Challenge' });

  L = { code, words, steps, i:0, grammar:null, constructs:null, reviewDrills:null,
        reviewWords: recapItems.map(w=>({ term:w.term, translation:w.translation||'' })),
        chunk2:{state:'idle',promise:null,err:null},
        lvl, known,
        errors:{ recognition:0, writing:0, construction:0, quest:0 },
        ft:{ ok:0, total:0 }, hints:0, t0: Date.now(),
        wordErr:{}, firstTryDone:{} };
  fetchLessonChunk2();   // порция 2 — в фоне, пока ученик делает повторение/презентацию/узнавание
  renderStep();
}

// Порция 2: задания на построение фраз + правило урока. Грузится в фоне, повторяется локально при сбое.
function fetchLessonChunk2() {
  if (!L) return;
  L.chunk2.state = 'loading'; L.chunk2.err = null;
  const p = DB.profile, lvl = L.lvl, words = L.words, known = L.known;
  L.chunk2.promise = (async () => {
    const r2 = await Gemini.call({
      task:'generate_construction_drills', target_lang:p.targetLang, native_lang:p.nativeLang, cefr:lvl,
      topic:p.interests, lesson_words: words.map(w=>w.term), known_vocab: known.slice(-60), known_rules: (DB.rules||[]).map(r=>r.title).slice(-40), count:9,
      rules:'Задания на активное построение фраз родной→целевой (production). Запрещён обратный перевод. Каждое задание использует хотя бы одно слово урока. УРОВЕНЬ CEFR: используй ТОЛЬКО грамматические конструкции уровня ' + lvl + ' или ниже (из known_rules). Запрещены конструкции выше уровня: отделяемые приставки, Konjunktiv, Passiv, um...zu, Genitiv, Relativsatz — только если они уже есть в known_rules. СИММЕТРИЯ (критично): prompt_native и expected_target СТРОГО соответствуют друг другу — каждое смысловое слово задания ОБЯЗАНО присутствовать в эталоне и наоборот. Если в задании есть уточнение (на поезд, быстро, металл, очень) — оно ОБЯЗАНО быть в эталоне. Запрещено давать задание с деталью которой нет в эталоне. ПЕРЕВОД: на A1–A2 prompt_native переводи корректно по-русски сохраняя все смысловые слова. Служебные глаголы которые в русском опускаются (sein) — опускай. Порядок слов — русский. Если конструкция не переводится прямо — добавь пояснение в скобках. instruction — короткая внятная инструкция что сделать. ЧИСТОЕ УСЛОВИЕ (критично, 4.28): prompt_native — СТРОГО на native_lang, БЕЗ единого слова target_lang. ЗАПРЕЩЕНО оставлять в prompt_native непереведённые целевые слова (например «нужен рюкзак для Weltreise» — неверно; «нужен рюкзак для кругосветного путешествия» — верно) и ЗАПРЕЩЕНО помещать в prompt_native саму целевую фразу целиком. Целевые слова живут ТОЛЬКО в expected_target и glossary; условие — только перевод смысла на родной. КВОТА НОВОЙ ЛЕКСИКИ (критично, 4.28): expected_target строй из УЖЕ ИЗВЕСТНЫХ слов (known_vocab/lesson_words); НЕ БОЛЕЕ 1 нового слова (которого нет в known_vocab) на фразу. Если нового слова нет — тем лучше. Новое слово ОБЯЗАНО быть в glossary с переводом. GLOSSARY — ВСЕ СЛОВА ЭТАЛОНА (критично, 4.28): в glossary помести КАЖДОЕ слово из expected_target — не только ключевые и не только новые, но и служебные (артикли der/die/das, предлоги für/bei/mit, союзы und/oder), каждое: слово на целевом + транскрипция родными буквами + перевод. Приложение перемешивает эти слова в набор-опору, и тап по любому слову набора обязан находить перевод мгновенно. Также верни everyday_phrases — 3 разговорные фразы-клише по уровню CEFR, каждая: phrase + translit (родными буквами) + translation + when (когда говорят, на родном) + reply (ответная реплика если фраза предполагает ответ: {phrase, translit, translation}).'
    },
    '{"items":[{"instruction":"короткая инструкция что сделать на родном","prompt_native":"что именно сказать/перевести (на родном)","expected_target":"эталонная фраза на целевом, точно соответствующая prompt_native","expected_translit":"[транскрипция всей эталонной фразы родными буквами]","focus_word":"слово урока","glossary":[{"term":"новое слово из эталона","translit":"[транскрипция]","translation":"перевод"}]}] — ровно 9 объектов,"everyday_phrases":[{"phrase":"фраза-клише на целевом","translit":"[транскрипция]","translation":"перевод","when":"когда употребляется (на родном)","reply":{"phrase":"ответная реплика на целевом если применимо, иначе null","translit":"[транскрипция ответа]","translation":"перевод ответа"}}] — 3 штуки}');
    const constructs = (r2.items||[]).filter(i=>i.prompt_native && i.expected_target).slice(0,9);
    if (constructs.length < 5) throw new Error('FEW_DRILLS');
    L.constructs = constructs;
    // QUEUE-07: пул фраз = новые от Gemini + старые из словаря (ротация)
    const newPhrases = (r2.everyday_phrases||[]).filter(f=>f && f.phrase).slice(0,3);
    const savedPhrases = (DB.vocab||[]).filter(v=>v.source==='phrase' && v.term)
      .sort(()=>Math.random()-0.5).slice(0, Math.max(0, 3-newPhrases.length))
      .map(v=>({phrase:v.term, translit:v.translit||'', translation:v.translation||'', when:v.note||''}));
    L.phrases = [...newPhrases, ...savedPhrases].slice(0,3);   // всегда 3 фразы
    // пункт 12: короткие предложения для слов ПОВТОРЕНИЯ — чтобы Recap шёл в контексте со скелетами
    if (L.reviewWords && L.reviewWords.length) {
      try {
        const rv = await Gemini.call({
          task:'generate_review_sentences', target_lang:p.targetLang, native_lang:p.nativeLang, cefr:lvl,
          review_words: L.reviewWords.map(w=>({ word:w.term, meaning:w.translation||'' })), count: L.reviewWords.length,
          rules:'Для КАЖДОГО объекта из review_words верни короткое естественное предложение на целевом языке, СОДЕРЖАЩЕЕ слово word в ЗНАЧЕНИИ meaning. КРИТИЧНО (QUEUE-40): у слова может быть несколько значений — используй ИМЕННО meaning, и весь смысл предложения обязан соответствовать этому значению (если meaning = «патрон (токарный)» — предложение про станок/деталь, НЕ про корм для собаки; если meaning = «корм» — про животное). Предложение строго по уровню CEFR. word — то слово из review_words, к которому относится предложение.'
        },
        '{"items":[{"word":"слово из review_words","sentence":"короткое предложение на целевом, содержащее это слово","translation":"перевод предложения на родной"}]}');
        L.reviewDrills = (rv.items||[]).filter(i=>i.word && i.sentence);
      } catch(_) { L.reviewDrills = []; }
    }
    try {
      const knownRules = (DB.rules||[]).map(r=>r.title).slice(-40);
      const coveredCats = [...new Set((DB.rules||[]).flatMap(r=>r.categories||[]))];
      const rg = await Gemini.call({
        task:'grammar_rule', target_lang:p.targetLang, native_lang:p.nativeLang, cefr:lvl,
        lesson_words: words.map(w=>w.term), known_rules: knownRules, covered_categories: coveredCats,
        rules:'Верни ОДНО уместное по уровню CEFR правило которого ещё нет в known_rules. На A1–A2 СНАЧАЛА закрывай фундаментальные темы которых нет в covered_categories: порядок слов, артикли/род, спряжение и времена, числа, даты, отрицание, вопросы, базовые предлоги — выбери самую базовую из НЕпройденных. Если нового нет — has_new_rule=false. ЯЗЫК ОБЪЯСНЕНИЯ: summary — без лингвистических терминов, объясняй через примеры как живому человеку (не "наречная группа" а "можно добавить уточнение — как быстро, где — это всё равно считается одной частью"). ГЛУБИНА ПО УРОВНЮ: на A1–A2 — одна чёткая строка + 2–3 простых примера без оговорок и исключений; на B1+ — основное правило + примечание о расширениях и исключениях. ПОЛНОТА: правило показывает КОНТРАСТ — как форма выглядит в словаре/инфинитиве И как меняется в предложении (пример А → пример Б). ПРИМЕРЫ в examples: на A1–A2 только простые случаи без усложнений — никаких наречий-расширителей в W-Fragen, никаких отделяемых приставок в примерах спряжения. Правило ЦЕЛИКОМ: в table полный набор форм. Пояснения и название — на native_lang. Транскрипция — родными буквами.'
      },
      '{"has_new_rule":true,"title":"короткое название на родном","summary":"суть в 1-2 фразы на родном","categories":["одна или несколько из: Артикли, Существительные, Глаголы, Времена, Падежи, Предлоги, Порядок слов, Местоимения, Прочее"],"table":[{"form":"форма на целевом","translit":"[транскрипция родными буквами]","translation":"перевод"}],"examples":[{"target":"пример на целевом","translit":"[транскрипция]","translation":"перевод"}],"cefr":"уровень"}');
      if (rg && rg.has_new_rule && rg.title && !(DB.rules||[]).some(r=>norm(r.title)===norm(rg.title))) L.grammar = rg;
    } catch(_) { /* правило необязательно */ }
    L.chunk2.state = 'ready';
  })().catch(e => { L.chunk2.state = 'error'; L.chunk2.err = e; throw e; });
  return L.chunk2.promise;
}

// Гарантирует готовность порции 2 к моменту, когда она нужна (построение фраз / правило).
async function ensureChunk2() {
  if (!L) return false;
  if (L.chunk2.state === 'ready') return true;
  if (L.chunk2.state === 'idle') fetchLessonChunk2();
  Screen.loader('Догружаю урок…');
  try { await L.chunk2.promise; return true; }
  catch(e) {
    if (String(e.message||'').startsWith('KEY:')) { keyWizard(true); return false; }
    lessonLoadError(()=>{ fetchLessonChunk2(); ensureChunk2().then(ok=>{ if(ok) renderStep(); }); }, e);
    return false;
  }
}

function lessonLoadError(retryFn, e) {
  Screen.show(`<h1>Не получилось подготовить урок</h1>
    <p class="sub">Проверьте интернет и попробуйте снова. Обучение не блокируется из-за модели — данные не пострадали.</p>
    <p class="note" style="opacity:.7">Причина: ${esc(String(e?.message||'неизвестно'))}</p>
    <button class="btn btn-primary" id="r">Повторить</button>
    <button class="btn btn-ghost" id="m">В меню</button>`);
  $('#r').onclick = retryFn; $('#m').onclick = mainMenu;
}

function noteWordError(term) {
  L.wordErr[term] = (L.wordErr[term]||0) + 1;
  const v = DB.vocab.find(w => norm(w.term)===norm(term));
  if (v) {
    v.errors = (v.errors||0) + 1;
    v.status = 'на закреплении';
    if (v.errors >= 2) {
      if (!DB.reviewQueue.includes(v.term)) DB.reviewQueue.push(v.term);
      ensureMnemonic(v); // мнемоника — один раз по триггеру (раздел 2.3-М)
    }
  }
}
/* Мнемоника: уровень 1 (текст + эмодзи) генерируется однократно и хранится.
   Уровни 2 (схемы) и 3 (Imagen, «пробовать → откат») — направление развития
   этого прототипа; принцип деградации сохранён в архитектуре. */
async function ensureMnemonic(v) {
  if (v.mnemonic || v._mnemoPending) return;
  v._mnemoPending = true;
  try {
    const r = await Gemini.call({ task:'mnemonic', target_lang:DB.profile.targetLang, native_lang:DB.profile.nativeLang,
      term:v.term, translation:v.translation, topic:DB.profile.interests },
      '{"mnemonic":"один яркий чувственный образ-ассоциация на родном языке, 1–2 коротких предложения"}');
    if (r.mnemonic) { v.mnemonic = r.mnemonic; v.mnemo_date = today(); Storage.save(DB); }
  } catch(e){}
  delete v._mnemoPending;
}

function firstTry(stepKey, ok) {
  if (L.firstTryDone[stepKey]) return;
  L.firstTryDone[stepKey] = true;
  L.ft.total++; if (ok) L.ft.ok++;
}

/* ---------- Незавершённые занятия: хранилище эпизодов (спека 4.29) ----------
   Принцип: снимок живёт, пока занятие не завершено или пока это же занятие не начато заново.
   СРОКА ГОДНОСТИ НЕТ — заниматься можно раз в три дня, прогресс дождётся (прежняя инвалидация
   через 24 часа молча обнуляла урок и обесценивала уже сделанные задания).
   Слоты РАЗДЕЛЬНЫЕ по kind+code (урок / урок A0 / Суперквест) и по профилю: старт Суперквеста
   больше не стирает незавершённый урок. На профиль храним до EPISODES_MAX эпизодов. */
const Episodes = {
  _read() {
    try {
      const v = JSON.parse(localStorage.getItem(EPISODES_KEY));
      if (v && Array.isArray(v.items)) return v;
    } catch(e) {}
    return { schema: EPISODES_SCHEMA, items: [] };
  },
  _write(v) {
    try { v.schema = EPISODES_SCHEMA; localStorage.setItem(EPISODES_KEY, JSON.stringify(v)); return true; }
    catch(e) { return false; }   // переполнение хранилища — молчать нельзя, разбираем в put()
  },
  _id(kind, code, pid) { return (pid||'?') + '|' + kind + '|' + (code||'?'); },
  put(kind, code, data) {
    const pid = Storage.activeId(), id = this._id(kind, code, pid);
    const v = this._read();
    const rec = { id, profileId: pid, kind, code, savedAt: Date.now(), data };
    const at = v.items.findIndex(x => x.id === id);
    if (at >= 0) v.items[at] = rec; else v.items.push(rec);
    // вытеснение: на профиль не больше EPISODES_MAX, уходит самый старый
    const mine = v.items.filter(x => x.profileId === pid).sort((a,b) => b.savedAt - a.savedAt);
    if (mine.length > EPISODES_MAX) {
      const keep = new Set(mine.slice(0, EPISODES_MAX).map(x => x.id));
      v.items = v.items.filter(x => x.profileId !== pid || keep.has(x.id));
    }
    if (this._write(v)) return true;
    // не влезло: жертвуем старыми эпизодами ради текущего, о котором человек знает
    const keepNow = new Set([id]);
    v.items = v.items.filter(x => keepNow.has(x.id));
    if (this._write(v)) return true;
    if (!this._warned) { this._warned = true; toast('Память устройства переполнена — прогресс может не сохраниться', true); }
    return false;
  },
  get(kind, code) {
    const r = this._read().items.find(x => x.id === this._id(kind, code, Storage.activeId()));
    return r ? r.data : null;
  },
  list(kind) {
    const pid = Storage.activeId();
    return this._read().items
      .filter(x => x.profileId === pid && (!kind || x.kind === kind))
      .sort((a,b) => b.savedAt - a.savedAt);
  },
  latest(kind) { const l = this.list(kind); return l.length ? l[0].data : null; },
  drop(kind, code) {
    const id = this._id(kind, code, Storage.activeId());
    const v = this._read(); v.items = v.items.filter(x => x.id !== id); this._write(v);
  },
  dropKind(kind) {
    const pid = Storage.activeId(), v = this._read();
    v.items = v.items.filter(x => !(x.profileId === pid && x.kind === kind)); this._write(v);
  },
  // разовый перенос снимка прежнего формата (единый слот, ключ с номером билда) в эпизоды
  migrate() {
    LEGACY_CACHE_KEYS.forEach(k => {
      let snap = null;
      try { snap = JSON.parse(localStorage.getItem(k)); } catch(e) {}
      if (snap && snap.code) {
        const kind = snap.isSuper ? 'super' : 'lesson';
        const pid  = snap._profileId || Storage.activeId();
        const v = this._read(), id = this._id(kind, snap.code, pid);
        if (!v.items.some(x => x.id === id)) {
          v.items.push({ id, profileId: pid, kind, code: snap.code, savedAt: snap._savedAt || Date.now(), data: snap });
          this._write(v);
        }
      }
      try { localStorage.removeItem(k); } catch(e) {}
    });
  }
};

/* Снимок текущего урока/Суперквеста (объект L) поверх хранилища эпизодов.
   Сериализуем L целиком, кроме promise-объектов chunk2/superParts. */
const LessonCache = {
  save() {
    if (!L) return;
    const snapshot = Object.assign({}, L, {
      chunk2: { state: L.chunk2?.state || 'idle', err: null, promise: null },
      superParts: undefined,   // промисы порции суперквеста не сериализуются
      _savedAt: Date.now(),
      _profileId: Storage.activeId(),
      _spent: Date.now() - (L.t0 || Date.now())   // чистое время занятия: пауза между заходами не идёт в статистику
    });
    Episodes.put(L.isSuper ? 'super' : 'lesson', L.code, snapshot);
  },
  // подготовка снимка к работе: восстановить обёртку chunk2 и сдвинуть t0 на уже потраченное время
  hydrate(snap) {
    if (!snap) return null;
    snap.chunk2 = { state: snap.chunk2?.state || 'idle', err: null, promise: null };
    snap.t0 = Date.now() - (snap._spent || 0);
    return snap;
  },
  lesson(code) { return this.hydrate(Episodes.get('lesson', code)); },
  clearLesson(code) { Episodes.drop('lesson', code); },
  clearSuper(code) { code ? Episodes.drop('super', code) : Episodes.dropKind('super'); }
};

function renderStep() {
  if (!L || L.i >= L.steps.length) return finishLesson();
  LessonCache.save();   // сохраняем позицию при каждом переходе
  const s = L.steps[L.i];
  if (s.t==='present')   return drillPresent();
  if (s.t==='ruleRecap') return drillRuleRecap(s);
  if (s.t==='reviewCtx') {                // повторение слова в контексте предложения (пункт 12)
    const go = () => {
      const rd = (L.reviewDrills||[]).find(d => norm(d.word)===norm(s.w.term));
      if (rd && rd.sentence) return drillReviewContext(s, rd);
      return drillRecog({ ...s, pool:'all' });   // откат: узнавание, если предложение не сгенерировалось
    };
    if (L.chunk2.state==='ready') return go();
    return ensureChunk2().then(ok => { if (ok) go(); });
  }
  if (s.t==='context') {                 // слово в контексте (из порции 2)
    if (L.constructs && L.constructs.length) return drillContext(s);
    return ensureChunk2().then(ok => { if (ok) drillContext(s); });
  }
  if (s.t==='phrases') {                  // повседневные выражения (из порции 2)
    if (L.chunk2.state==='ready') { if (L.phrases && L.phrases.length) return drillPhrases(); L.i++; return renderStep(); }
    return ensureChunk2().then(ok => { if (!ok) return; if (L.phrases && L.phrases.length) drillPhrases(); else { L.i++; renderStep(); } });
  }
  if (s.t==='grammar') {                 // правило из порции 2: если не готово — подождём; нет правила — пропустим
    if (L.chunk2.state==='ready') { if (L.grammar) return drillGrammar(); L.i++; return renderStep(); }
    return ensureChunk2().then(ok => { if (!ok) return; if (L.grammar) drillGrammar(); else { L.i++; renderStep(); } });
  }
  if (s.t==='recog')     return drillRecog(s);
  if (s.t==='write')     return drillWrite(s);
  if (s.t==='construct') {               // построение фраз из порции 2
    if (s.c) return drillConstruct(s);
    if (L.constructs && L.constructs.length) { s.c = L.constructs[s.ci % L.constructs.length]; return drillConstruct(s); }
    return ensureChunk2().then(ok => { if (!ok) return; s.c = L.constructs[s.ci % L.constructs.length]; drillConstruct(s); });
  }
  if (s.t==='quest')     return runQuest({
      title:'Задание 21 · Интерактивный рассказ-квест',
      topic: DB.profile.interests, cefr: curCefr(),
      mustUse: L.words.slice(0,3).map(w=>w.term), maxScenes: questScenes(curCefr()),
      onError: ()=>{ L.errors.quest++; },
      onDone: ()=>{ L.i++; renderStep(); }
    });
}

/* ---------- Recognition / Recap: выбор слова по переводу ---------- */
function drillRecog(s) {
  const w = s.w;
  // фильтр дистракторов: только пройденные слова (seen=true), без мусорных строк (длина, скобки, стрелки)
  const isValidDistractor = x => x.seen === true
    && norm(x.term) !== norm(w.term)
    && x.term.length <= 40
    && !/[()→\d]{2}/.test(x.term)
    && !/[а-яёА-ЯЁ]{3}/.test(x.term);   // не кириллица в поле целевого языка
  const lessonPool = L.words.filter(x => norm(x.term) !== norm(w.term));
  const fillerPool = s.pool==='lesson'
    ? lessonPool
    : DB.vocab.concat(L.words).filter(isValidDistractor);
  // если отфильтрованных не хватает — добираем из lessonPool
  const fillers = pick(fillerPool, 3);
  if (fillers.length < 3) {
    const extra = lessonPool.filter(x => !fillers.some(f=>norm(f.term)===norm(x.term)));
    while (fillers.length < 3 && extra.length) fillers.push(extra.shift());
  }
  const opts = shuffle([w, ...fillers]);
  const key = 'st'+L.i;
  Screen.show(`
    <div class="eyebrow">${esc(L.code)} · ${esc(s.phase)}</div>
    <div class="card">
      <div class="drill-head"><span class="n">${esc(s.n)}</span><span class="ph">🎯 узнавание</span></div>
      <p class="note" style="margin:0 0 8px;color:var(--accent)">🎯 Какое слово соответствует: <b>«${esc(w.translation)}»</b>?</p>
      ${opts.map(o=>`<button class="opt" data-t="${esc(o.term)}">${esc(o.term)}</button>`).join('')}
      <div class="feedback" id="fb"></div>
      <button class="btn btn-primary" id="next" style="margin-top:12px" disabled>Дальше</button>
    </div>`);
  document.querySelectorAll('.opt').forEach(b => b.onclick = () => {
    const ok = norm(b.dataset.t) === norm(w.term);
    firstTry(key, ok);
    if (ok) {
      b.classList.add('right');
      document.querySelectorAll('.opt').forEach(x=>x.disabled=true);
      $('#fb').className='feedback ok';
      $('#fb').innerHTML = `✅ <b>${esc(w.term)}</b> <span style="color:var(--orange)">${esc(w.translit||'')}</span>` + sayBtn(w.term);
      speak(w.term, DB.profile.targetLang);
      $('#next').disabled = false;
    } else {
      b.classList.add('wrong'); b.disabled = true;
      L.errors.recognition++; noteWordError(w.term);
      $('#fb').className='feedback bad';
      $('#fb').innerHTML = `❌ Не то. Попробуйте ещё раз — верный вариант на экране.`;
    }
  });
  $('#next').onclick = () => { L.i++; renderStep(); };
}

/* ---------- Скелеты и контекст (раздел 5, версия 4.12) ---------- */
// Предложение с пропуском на месте целевого слова (прячем именно цель задания)
function makeGapSentence(sentence, word) {
  const s = String(sentence||''); if (!word) return { gapped:s, found:false, answer:word };
  // пробуем: всё слово → без ведущего артикля → последний токен (существительное)
  const candidates = [];
  const w = String(word).trim();
  candidates.push(w);
  const toks = w.split(/\s+/);
  if (toks.length>1 && ARTICLES.includes(norm(toks[0]))) candidates.push(toks.slice(1).join(' '));
  candidates.push(toks[toks.length-1]);
  // длинная основа существительного (на случай склонения: Mechaniker в einen Mechaniker)
  const noun = toks[toks.length-1];
  for (const cand of candidates) {
    if (!cand) continue;
    const re = new RegExp('(^|[^\\p{L}])('+cand.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\p{L}*)(?=[^\\p{L}]|$)','iu');
    const m = s.match(re);
    if (m) return { gapped: s.replace(re, (mm,p1)=>p1+'_____'), found:true, answer:m[2] };
  }
  // не нашли (другая форма) — спрячем существительное по основе (первые 4 буквы)
  if (noun.length>=4) {
    const re2 = new RegExp('(^|[^\\p{L}])('+noun.slice(0,4).replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\p{L}*)(?=[^\\p{L}]|$)','iu');
    const m2 = s.match(re2);
    if (m2) return { gapped: s.replace(re2,(mm,p1)=>p1+'_____'), found:true, answer:m2[2] };
  }
  return { gapped: s, found:false, answer:word };
}
// Каркас слова: первые reveal букв + точки на остальные (помощь с орфографией, не раскрывая всё)
function wordSkeleton(word, reveal) {
  const w = String(word||''); reveal = Math.max(1, reveal||1);
  return w.slice(0, reveal) + (w.length>reveal ? ' ' + '·'.repeat(w.length-reveal) : '');
}
function markSeen(term){ const v = DB.vocab.find(x=>norm(x.term)===norm(term)); if (v) { v.seen=true; } }

// --- человечная проверка (версия 4.13) ---
const ARTICLES = ['der','die','das','den','dem','des','ein','eine','einen','einem','einer','eines'];
// расстояние Левенштейна (с потолком) — для распознавания опечаток
function editDistance(a, b) {
  a = String(a); b = String(b);
  const m = a.length, n = b.length;
  if (Math.abs(m-n) > 3) return 99;
  const dp = Array.from({length:m+1}, (_,i)=>[i, ...Array(n).fill(0)]);
  for (let j=0;j<=n;j++) dp[0][j]=j;
  for (let i=1;i<=m;i++) for (let j=1;j<=n;j++)
    dp[i][j] = Math.min(dp[i-1][j]+1, dp[i][j-1]+1, dp[i-1][j-1] + (a[i-1]===b[j-1]?0:1));
  return dp[m][n];
}
const tokenize = s => norm(s).replace(/[.,!?;:()«»"]/g,' ').split(/\s+/).filter(Boolean);
// сравнить ответ с эталоном локально: 'exact' | 'typo' | 'article' | null(надо звать Gemini)
function localVerdict(user, correct) {
  const u = tokenize(user), c = tokenize(correct);
  if (u.join(' ') === c.join(' ')) return { kind:'exact' };
  // отличие только в артиклях
  const uNoArt = u.filter(w=>!ARTICLES.includes(w)), cNoArt = c.filter(w=>!ARTICLES.includes(w));
  if (uNoArt.join(' ') === cNoArt.join(' ') && u.length === c.length) {
    const wrong = []; for (let i=0;i<c.length;i++) if (u[i]!==c[i] && ARTICLES.includes(c[i])) wrong.push(c[i]);
    return { kind:'article', detail: wrong[0] };
  }
  // мелкая опечатка: те же слова, общее расстояние ≤2, и одинаковое число слов
  if (u.length === c.length) {
    let dist = 0, wrongPair = null;
    for (let i=0;i<c.length;i++) { const d = editDistance(u[i], c[i]); dist += d; if (d>0 && !wrongPair) wrongPair = { got:u[i], exp:c[i] }; }
    if (dist > 0 && dist <= 2) return { kind:'typo', detail: wrongPair };
  }
  return null; // непонятно локально — спросим Gemini (смысл/синонимы)
}
// подсветить расхождение: эталон с выделенным отличающимся словом
function highlightDiff(user, correct) {
  const cTok = String(correct).split(/(\s+)/), uTok = tokenize(user);
  let ui = 0;
  return cTok.map(tok => {
    if (/^\s+$/.test(tok) || !tok) return esc(tok);
    const plain = norm(tok.replace(/[.,!?;:()«»"]/g,''));
    const u = uTok[ui++]; const same = u !== undefined && u === plain;
    return same ? esc(tok) : `<u style="color:var(--orange);text-decoration-thickness:2px">${esc(tok)}</u>`;
  }).join('');
}

/* ---------- Construction: построение фраз (проверка через Gemini) ---------- */
function drillConstruct(s) {
  const c = s.c, key = 'st'+L.i;
  let mustRetype = false, correctForm = c.expected_target;
  // словарик новых слов задания (с переводом+транскрипцией) + автосохранение в словарь
  const gloss = Array.isArray(c.glossary) ? c.glossary.filter(g=>g && g.term) : [];
  gloss.forEach(g => {
    const ex = DB.vocab.find(v=>norm(v.term)===norm(g.term));
    if (ex) { if (g.translit && !ex.translit) ex.translit=g.translit; return; }
    DB.vocab.push({ term:g.term, translation:g.translation||'', translit:g.translit||'', emoji:'💬',
      part_of_speech:'', article:'', is_irregular:false, forms:'', lesson:'CONTEXT',
      errors:0, status:'встречено в контексте', source:'task', seen_in_context:true, mnemonic:'', date_added:today(), date_review:today() });
  });
  if (gloss.length) Storage.save(DB);
  // ЛЮБОЕ немецкое слово, показанное в формулировке задания, получает перевод+транскрипцию из словаря —
  // даже «известное» (как Bedienfeld), чтобы не было слов без пояснения (версия 4.13)
  const shownText = (instr0()+' '+(c.prompt_native||'')+' '+(c.focus_word||''));
  function instr0(){ return c.instruction || ''; }
  const latinTokens = (shownText.match(/[A-Za-zÄÖÜäöüß]{2,}/g) || []);
  const seenG = new Set(gloss.map(g=>norm(g.term)));
  latinTokens.forEach(tok => {
    const n = norm(tok); if (seenG.has(n)) return;
    const v = DB.vocab.find(x=>norm(x.term)===n || norm(x.term).split(' ').pop()===n);
    if (v && (v.translation||v.translit)) { seenG.add(n); gloss.push({ term: tok, translit: v.translit||'', translation: v.translation||'' }); }
  });
  // «Собери фразу» (4.28): набор всех слов эталона, перемешанный — опора для сборки.
  // Набор строит ПРИЛОЖЕНИЕ из expected_target (split+shuffle) — логика, не Gemini.
  // Все слова, включая служебные, попадают в набор (иначе фразу не собрать); каждое — с тап-переводом.
  const bankWords = String(c.expected_target||'').trim().split(/\s+/)

  const bankHTML = bankWords.length
    ? `<div class="note" style="margin:8px 0 4px;line-height:2">🧩 Соберите фразу из слов <span style="opacity:.6">(тап — перевод)</span>:<br>${shuffle(bankWords.slice()).map(word=>`<span class="tapword tapall" data-word="${esc(word)}">${esc(word)}</span>`).join(', ')}</div>` : '';
  const instruction = c.instruction || `Соберите и впишите фразу на ${esc(langName(DB.profile.targetLang))}:`;
  Screen.show(`
    <div class="eyebrow">${esc(L.code)} · Construction</div>
    <div class="card">
      <div class="drill-head"><span class="n">${esc(s.n)}</span><span class="ph">🧩 собери фразу</span></div>
      <p class="note" style="margin:0 0 6px;color:var(--accent)">🎯 ${esc(instruction)}</p>

      <textarea id="ans" class="ans-grow" placeholder="Ваш ответ на ${esc(langName(DB.profile.targetLang))}" autocomplete="off" autocapitalize="off"></textarea>

        <button class="btn btn-primary" id="check">Проверить</button>
      </div>
    </div>`);
  if (L.grammar) $('#rule').onclick = () => { L.hints++; showRulePopup(L.grammar); };
  bindAutoGrow('ans');
  attachTapAll(document, gloss);   // 4.28: тап-перевод слов набора (gloss — быстрый источник, дальше словарь/Gemini)
  // подсказка: ПОЛНЫЙ правильный ответ — фраза целиком + транскрипция + перевод + озвучка (версия 4.14)
  $('#hint').onclick = () => { L.hints++; $('#fb').className='feedback ok';

    $('#fb').innerHTML = `💡 Полный ответ: <b>${esc(correctForm)}</b>${tr}` + sayBtn(correctForm) + `<br><span style="font-size:13px">${esc(c.prompt_native||'')}</span>`;
    speak(correctForm, DB.profile.targetLang); }; // QUEUE-10: авто-TTS при показе полного ответа
  $('#check').onclick = async () => {
