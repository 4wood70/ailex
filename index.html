        cefr: curCefr(), expected: c.expected_target, user_answer: a,
        rules:'Проверяй по СМЫСЛУ и грамматике, НЕ по точному совпадению строк. Любой грамматически корректный вариант с тем же смыслом — correct=true (синонимы, иной порядок слов, иные но верные конструкции). Равноценные формы (in dem=im, zu dem=zum, an dem=am) — верны. Мелкие опечатки (1-2 буквы) — correct=true. Если ответ верен, но эталон естественнее — correct=true и note на native_lang («Верно. Более типично: …»). Только при реальной смысловой/грамматической ошибке correct=false: в explanation короткий разбор именно этой ошибки на native_lang, в rule_title/rule_summary правило под неё (полно), rule_table — полный набор форм.' },
        '{"correct":true,"error_type":"spelling|article|word_order|verb_conjugation|vocabulary_gap|none","note":"мягкая подсказка если ответ верен но есть лучший вариант, иначе пусто","explanation":"короткий разбор именно этой ошибки на родном","correct_form":"верная фраза","correct_translit":"[транскрипция верной фразы родными буквами]","rule_title":"короткое название правила под эту ошибку (на родном)","rule_summary":"правило целиком, 2-4 фразы на родном","rule_categories":["одна или несколько из: Артикли, Существительные, Глаголы, Времена, Падежи, Предлоги, Порядок слов, Местоимения, Прочее"],"rule_table":[{"form":"форма на целевом","translit":"[транскрипция]","translation":"перевод"}]}');
    } catch(e){}
    $('#check').disabled = false;
    if (!res) { toast('Связь барахлит — ответ засчитан', true); firstTry(key, true); return passOK(null); }
    if (res.correct) { firstTry(key, true); return passOK(res); }
    firstTry(key, false);
    L.errors.construction++; if (c.focus_word) noteWordError(c.focus_word);
    correctForm = (res && res.correct_form) || c.expected_target;
    const cTr = (res && res.correct_translit) ? ` <span style="color:var(--orange)">${esc(res.correct_translit)}</span>` : '';
    mustRetype = true;
    $('#fb').className='feedback bad';
    $('#fb').innerHTML = `❌ ${esc(res?.explanation || 'Есть ошибка.')}<br>Сверьте: ${highlightDiff(a, correctForm)}${cTr}` + sayBtn(correctForm) + `<br>🧠 Запомните и введите верный вариант, чтобы продолжить.`;
    speak(correctForm, DB.profile.targetLang);
    showErrorRule(res);
    $('#ans').value=''; $('#ans').focus();
  };
  function passOK(res) {
    $('#fb').className='feedback ok';
    const note = res && res.note ? `<br><span style="color:var(--orange);font-size:13px">💡 ${esc(res.note)}</span>` : '';
    $('#fb').innerHTML = `✅ <b>${esc(correctForm)}</b>` + sayBtn(correctForm) + note;
    speak(correctForm, DB.profile.targetLang);
    if (res && res.articleSlip) {   // пункт 14: копим промахи по артиклям в адаптивное правило
      let r = DB.rules.find(x=>norm(x.title)==='артикли' || (x.categories||[]).includes('Артикли'));
      if (!r) { r = { title:'Артикли', summary:'Род существительного определяет артикль (der/die/das). Обращайте внимание на артикль при заучивании слова.', table:[], examples:[], categories:['Артикли'], cefr:'A1', lesson:L.code, status:'на закреплении', errors:0, date_added:today() }; DB.rules.push(r); }
      r.errors = (r.errors||0) + 1; r.status='на закреплении'; Storage.save(DB);
    }
    if (res && res.note && res.rule_title) saveErrorRule(ruleFromCheck(res));
    $('#check').textContent='Дальше'; $('#check').disabled=false;
    $('#check').onclick = () => { L.i++; renderStep(); };
  }
}

/* =====================================================================
   КВЕСТ — интерактивный рассказ с развилками 2×2 (раздел 5.A).
   Каркас жёсткий (приложение), реакция живая (Gemini). Anti-Frustration:
   после 2 ошибок — режим напарника и Graceful Exit.
   ===================================================================== */
// Длина квеста растёт с уровнем: связный рассказ 8–12+ предложений (версия 4.12)
function questScenes(lvl){ return ({A1:8, A2:9, B1:11, B2:13, C1:15, C2:15})[lvl] || 8; }
// QUEUE-42: проверка согласованности сцены перед показом.
// Структурная (код): не показан ли каркас уже достроенным иным словом в сцене (праймящая коллизия).
// Семантическая (Gemini-валидатор): отвечает ли expected_target на prompt_for_user по смыслу.
// Графичный fallback: при любом сбое валидатора возвращаем исходную сцену — поток не блокируется.
async function validateScene(sc, p, cefr) {
  if (!sc || !sc.expected_target || !sc.prompt_for_user) return sc; // финальная сцена без задания — нечего проверять
  // 1) Структурная проверка кодом
  let structuralCollision = false;
  try {
    const stem = String(sc.scaffold||'').split('___')[0];           // видимая часть до первого прочерка
    const stemN = norm(stem).replace(/\s+/g,' ').trim();
    if (stemN && stemN.split(' ').length >= 2) {                    // нужен осмысленный стем (≥2 слова)
      const sceneN = norm(sc.scene_text||'').replace(/\s+/g,' ');
      const expN   = norm(sc.expected_target||'').replace(/\s+/g,' ').trim();
      // стем каркаса есть в сцене, а эталон целиком — нет → сцена достроила конструкцию иначе
      if (sceneN.includes(stemN) && expN && !sceneN.includes(expN)) structuralCollision = true;
    }
  } catch(_) {}
  // 2) Семантический валидатор (Gemini)
  let v = null;
  try {
    v = await Gemini.call({
      task:'validate_quest_scene', target_lang:p.targetLang, native_lang:p.nativeLang, cefr:cefr,
      scene_text: sc.scene_text, prompt_for_user: sc.prompt_for_user,
      expected_target: sc.expected_target, scaffold: String(sc.scaffold||''),
      structural_collision: structuralCollision,
      rules:'Проверь согласованность задания по ЧЕТЫРЁМ критериям и при нарушении ПОЧИНИ. '
        + '(1) СМЫСЛ: expected_target обязан быть прямым ответом на prompt_for_user — на том же уровне вопроса. Если вопрос «кто делает: сам или коллега?» — ответ про того, кто делает (ich … selbst / ich rufe den Kollegen), а НЕ про режим работы. Если вопрос «что выбираешь: аэропорт или кафе?» — ответ называет аэропорт или кафе. Если эталон отвечает не на тот вопрос — приведи prompt_for_user и expected_target в соответствие, сохранив смысл сцены (обычно проще поправить вопрос под эталон). '
        + '(2) КОЛЛИЗИЯ: конструкция каркаса не должна быть уже показана в scene_text достроенной ДРУГИМ словом (если structural_collision=true — это уже обнаружено кодом, обязательно почини). Почини так, чтобы expected_target был выводим из контекста, а сцена не праймила неверное завершение. '
        + '(3) УЗУАЛЬНОСТЬ И КОРРЕКТНОСТЬ СЛОВ: expected_target обязан быть живой, употребимой фразой носителя БЕЗ битых/несуществующих слов и без калек. Проверь каждое слово эталона: существует ли оно в такой форме (например «weiterlauf» НЕ существует — есть глагол «weiterlaufen» или существительное «das Weiterlaufen»; «das Programm weiterlaufend» — не по-немецки). Если в эталоне битое слово или неидиоматичная конструкция — перепиши задание под ПРОСТУЮ употребимую фразу строго уровня CEFR '+cefr+' (лучше упростить, чем сохранить кривую конструкцию). '
        + '(4) СОГЛАСОВАННОСТЬ ГЛОССАРИЯ: слова в answer_glossary и форма, которую требует expected_target, обязаны совпадать — что показано ученику, то и в ответе (нельзя дать в глоссарии «weiterlauf», а в эталоне ждать «weiterlaufend»). Если задание подразумевает ВЫБОР из вариантов — в answer_glossary должно быть не меньше двух вариантов, иначе выбор фиктивный: либо добавь второй вариант, либо переформулируй prompt_for_user без выбора. '
        + 'После починки expected_target, scaffold и answer_glossary обязаны остаться согласованными между собой и строго на уровне CEFR '+cefr+'. scaffold — это expected_target с ___ на месте ключевых слов. Если всё уже согласовано — верни ok=true, остальные поля можно вернуть прежними.'
    },
    '{"ok":true,"prompt_for_user":"задание на родном (исправленное или прежнее)","expected_target":"эталон на целевом (исправленный или прежний)","scaffold":"каркас с ___ согласованный с эталоном","answer_glossary":[{"term":"слово","translit":"[транскрипция]","translation":"перевод"}]}');
  } catch(_) { return sc; }
  if (v && v.ok === false) {
    if (v.prompt_for_user) sc.prompt_for_user = v.prompt_for_user;
    if (v.expected_target) sc.expected_target = v.expected_target;
    if (v.scaffold) sc.scaffold = v.scaffold;
    if (Array.isArray(v.answer_glossary) && v.answer_glossary.length) sc.answer_glossary = v.answer_glossary;
  }
  return sc;
}

async function runQuest(cfg) {
  const p = DB.profile;
  const Q = { scene:1, errors:0, summary:'', choice:null, branchesUsed:0 };
  // QUEUE-46: возобновление квеста внутри урока. Позиция квеста хранится на L (L.qResume)
  // и сериализуется вместе с уроком через LessonCache. При возврате к уроку восстанавливаем сцену.
  if (L && L.qResume) {
    Q.scene = L.qResume.scene || 1;
    Q.summary = L.qResume.summary || '';
    Q.choice = L.qResume.choice || null;
    Q.errors = L.qResume.errors || 0;
    Q.branchesUsed = L.qResume.branchesUsed || 0;
  }
  nextScene();

  function saveQuestPos() {
    // 4.29: позиция квеста — в снимок урока ПЕРЕД показом сцены (а не только при переходе дальше),
    // иначе выход на первой же сцене квеста терял бы её.
    if (!L) return;
    L.qResume = { scene:Q.scene, summary:Q.summary, choice:Q.choice, errors:Q.errors, branchesUsed:Q.branchesUsed };
    LessonCache.save();
  }

  async function nextScene() {
    saveQuestPos();
    Screen.loader(`Сцена ${Q.scene} из ${cfg.maxScenes}…`);
    let sc;
    try {
      sc = await Gemini.call({
        task:'quest_step', target_lang:p.targetLang, native_lang:p.nativeLang, cefr:cfg.cefr,
        topic:cfg.topic, must_use:cfg.mustUse, scene_index:Q.scene, max_scenes:cfg.maxScenes,
        user_choice:Q.choice, story_so_far:Q.summary,
        known_rules:(DB.rules||[]).map(r=>r.title).slice(-40),
        rules:'Всего в истории ровно 2 развилки по 2 варианта; развилок уже использовано: '+Q.branchesUsed+'. РАЗВИЛКА — СЮЖЕТНАЯ, НЕ ГРАММАТИЧЕСКАЯ (QUEUE-48, критично): когда is_branch=true, два варианта choices — это РАЗНЫЕ поступки/повороты сюжета (что герой делает дальше), ведущие к разным продолжениям истории. ОБА варианта грамматически верны и естественны. ЗАПРЕЩЕНО делать выбор между правильной и неправильной формой (артикль/падеж/окончание/спеллинг) или между двумя формулировками одного и того же — это не развилка, а квиз. label_target — осмысленное действие в мире истории (напр. «К реке» / «Остаться в лагере»), label_native — его перевод. Языковое задание сцены (expected_target) отдельно и НЕ является выбором ветки. Конкретная чувственная сцена в сфере интересов. is_final=true ТОЛЬКО когда scene_index === max_scenes (последняя сцена акта). До этого — is_final=false ВСЕГДА, история продолжается. На последней сцене заверши историю (is_final=true, без развилки). УРОВЕНЬ CEFR (критично): вся грамматика сцены и задания — строго уровня '+cfg.cefr+' или ниже. На A1 ЗАПРЕЩЕНО использовать в prompt_for_user и expected_target: ВСЕ модальные глаголы (müssen/möchten/wollen/können/dürfen/sollen) — КРОМЕ тех которые есть в known_rules (список пройденных правил передан в параметре known_rules); отделяемые приставки; um...zu; Konjunktiv; Passiv; Perfekt; Genitiv; Relativsatz; сравнительные конструкции. На A1 РАЗРЕШЕНО только: Präsens обычных глаголов (sein/haben/обычные глаголы действия), простые предложения Субъект+Глагол+Объект. Для задания используй ТОЛЬКО конструкции из known_rules — если правило не в списке, считай его непройденным. ГРАММАТИКА СЦЕНЫ (критично): scene_text ОБЯЗАН быть грамматически безупречным — каждый глагол спрягается правильно (ich berechne, не ich berechnen), артикли согласованы, порядок слов верный. УЗУАЛЬНОСТЬ (QUEUE-34, критично): scene_text и expected_target обязаны быть такими, как реально говорит носитель целевого языка — живая, употребимая фраза, а НЕ формально-правильная дословная сборка слов. Перед выдачей перечитай каждое предложение и спроси себя: «так действительно говорят в живой речи?» — если фраза грамматически верна, но неупотребима, переформулируй естественнее. Пример калька↔живое (нем.): «das Ankratzen im Manuell» ❌ → «im Handbetrieb» / «manuell» / «im manuellen Betrieb» ✅. Не заставляй ученика заучивать кальку. SCAFFOLD (обязательно на A1–A2): поле scaffold ВСЕГДА заполняй — каркас expected_target с ___ на месте ключевых слов которые нужно вспомнить/вставить; минимум 1 прочерк. КАРКАС И ВЫБОР (критично): если prompt_for_user предлагает выбор из двух и более слов разного рода/падежа — артикль (der/die/das/den/dem...) НЕЛЬЗЯ выносить за прочерк, он входит в прочерк вместе с существительным («Ich nutze ___.», а НЕ «Ich nutze den ___.»). Прочерк обязан поглощать всё что различается между допустимыми ответами (артикль, род, падежное окончание); видимая часть каркаса одинаково верна для любого допустимого варианта. prompt_for_user ОБЯЗАН быть напрямую связан с содержимым scene_text — спрашивай ТОЛЬКО о том что упомянуто в сцене; ответ пользователя должен быть выводим из текста сцены. Запрещено задавать вопросы о вещах которых нет в тексте. АНТИ-КОЛЛИЗИЯ ПОДСКАЗКИ (QUEUE-36, критично): конструкция/глагол, который задание просит достроить (например «Ich wähle ___», «Ich bezahle ___»), НЕ должна встречаться в scene_text уже достроенной с ДРУГИМ объектом. Если задание просит достроить «Ich wähle (аэропорт/кафе)» — в сцене ЗАПРЕЩЕНО писать «Ich wähle das Ziel»; если просит «Ich bezahle ___» — в сцене не должно быть «Ich bezahle das Ticket». Иначе сцена учит одному завершению, а эталон требует другого, и ответ становится невыводимым из контекста. Перед выдачей проверь: expected_target согласован с тем, как эта конструкция (не) показана в сцене. ЯВНЫЙ НАБОР ОТВЕТОВ (QUEUE-36): если задание — выбор из перечисленных слов (например аэропорт или кафе), prompt_for_user обязан прямо называть этот ограниченный набор («Выберите: аэропорт или кафе?»), а не давать размытое «используя конструкцию Ich wähle ___». prompt_for_user должен быть логически точным на native_lang: если задание про транспорт — «на чём вы едете», не «куда едете»; вопрос должен точно соответствовать ожидаемому ответу. Задание которое пользователь МОЖЕТ выполнить зная только слова урока и конструкции из known_rules. ЗАПРЕЩЕНО использовать технические коды, аббревиатуры, цифровые команды (G01, T010101, CNC-команды и т.п.) как целевые слова — только обычные слова целевого языка. ПЕРЕВОД (native_hint): на A1–A2 переводи корректно по-русски сохраняя ВСЕ смысловые слова оригинала. Служебные глаголы которые в русском опускаются (sein/быть) — опускай ("Ich bin dort" → "Я там", не "Я есть там"). Порядок слов — русский, не немецкий. Если конструкция принципиально не переводится прямо — добавь пояснение в скобках ("stehen здесь = находиться"). В answer_glossary — ВСЕ ключевые слова для ответа с транскрипцией и переводом. СЛОВА ЗАДАНИЯ С АРТИКЛЕМ (критично): в answer_glossary и encountered_words поле term для СУЩЕСТВИТЕЛЬНЫХ целевого языка обязано включать артикль рода в словарной форме (нем.: die Automatik, der Handbetrieb, das Auto). Прилагательным, наречиям, глаголам артикль НЕ добавляется (manuell, schneiden). Если в целевом языке артиклей нет — не добавляется. В encountered_words — значимые слова сцены (до 5). translit — ТОЛЬКО буквами native_lang, пример: [форбэрайтн].'
      },
      '{"scene_text":"текст сцены на целевом языке (объём по CEFR)","native_hint":"перевод-подсказка на родном","prompt_for_user":"внятное задание на родном: что сказать","expected_target":"эталонная фраза на целевом","scaffold":"каркас предложения с ___ на месте ключевых слов которые нужно подставить (напр. Ich ___ auch mit dem Bus ___), или null если задание простое","answer_glossary":[{"term":"слово нужное для ответа","translit":"[транскрипция]","translation":"перевод"}],"encountered_words":[{"term":"слово на целевом","translit":"[транскрипция]","translation":"перевод"}],"is_branch":false,"choices":[{"id":"A","label_target":"вариант на целевом","label_native":"перевод варианта А на родном"},{"id":"B","label_target":"вариант на целевом","label_native":"перевод варианта Б на родном"}],"is_final":false}');
    } catch(e) {
      // 4.29: раньше обрыв связи молча ЗАСЧИТЫВАЛ квест → finishLesson стирал урок и сдвигал этап.
      // Телефон после сна поднимает сеть не сразу, поэтому это било ровно по тем, кто вернулся продолжать.
      if (String(e.message||'').startsWith('KEY:')) { keyWizard(true); return; }
      saveQuestPos();
      Screen.show(`
        <div class="eyebrow">${esc(cfg.title||'Квест')}</div>
        <h1>Связь прервалась</h1>
        <p class="sub">Сцену ${Q.scene} не удалось загрузить. Прогресс урока сохранён — повторите сейчас или вернитесь позже через «Продолжить урок».</p>
        <button class="btn btn-primary" id="bRetryQ">Повторить сцену</button>
        <button class="btn btn-ghost" id="bMenuQ">Выход в меню</button>`);
      $('#bRetryQ').onclick = () => nextScene();
      $('#bMenuQ').onclick  = mainMenu;
      return;
    }
    sc = await validateScene(sc, p, cfg.cefr);   // QUEUE-42: согласованность задания (структурно + семантически)
    // слова сцены И слова для ответа — в словарь (без дублей), статус «встречено в контексте»
    [...(sc.encountered_words||[]), ...(sc.answer_glossary||[])].forEach(w => {
      if (!w || !w.term) return;
      const ex = DB.vocab.find(v=>norm(v.term)===norm(w.term));
      if (ex) { ex.seen_in_context = true; if (w.translit && !ex.translit) ex.translit = w.translit; return; }
      DB.vocab.push({ term:w.term, translation:w.translation||'', translit:w.translit||'', emoji:'💬',
        part_of_speech:'', article:'', is_irregular:false, forms:'',
        lesson:'CONTEXT', errors:0, status:'встречено в контексте', source:'quest',
        seen_in_context:true, mnemonic:'', date_added:today(), date_review:today() });
    });
    Storage.save(DB);
    const isFinal = Q.scene >= cfg.maxScenes; // QUEUE-28: строго по числу сцен, ранний is_final игнорируем
    let mustRetype = false, correctForm = sc.expected_target || '';
    Screen.show(`
      <div class="eyebrow">${esc(cfg.title||'Квест')}</div>
      <div class="segbar">${Array.from({length:cfg.maxScenes},(_,i)=>`<i class="${i<Q.scene?'on':''} ${i===cfg.maxScenes-1&&i<Q.scene?'hot':''}"></i>`).join('')}</div>
      <div class="scene">
        <div class="target" id="questSceneText">${tapAllWordsHTML(sc.scene_text)} ${hasTTS(DB.profile.targetLang)?`<button class="tts" style="vertical-align:middle" id="sayScene">🔊</button>`:''}</div>
        <div class="hint">${esc(sc.native_hint||'')}</div>
      </div>
      <div class="card">
        <div class="task-text" style="font-size:16px">🎯 ${esc(sc.prompt_for_user||'Ответьте на целевом языке')}</div>
        ${sc.scaffold?`<div id="questScaffold" style="margin:8px 0;padding:8px 10px;background:var(--card2,rgba(255,255,255,.05));border-radius:8px;font-size:15px">
          <span style="color:var(--dim);font-size:12px;text-transform:uppercase;letter-spacing:.05em">Каркас:</span><br>
          ${sc.scaffold.split('___').map((part,i,arr)=>
            i<arr.length-1
              ? tapAllWordsHTML(part)+'<span style="display:inline-block;min-width:60px;border-bottom:2px solid var(--orange);margin:0 4px;vertical-align:bottom">&nbsp;</span>'
              : tapAllWordsHTML(part)
          ).join('')}
        </div>`:''}
        <textarea id="ans" class="ans-grow" autocomplete="off" autocapitalize="off" placeholder="Ваша фраза…"></textarea>
        ${(sc.answer_glossary&&sc.answer_glossary.length)?`<div class="note" style="margin:8px 0;line-height:1.7">📒 Слова задания: ${sc.answer_glossary.map(g=>`<b>${esc(g.term)}</b> <span style="color:var(--orange)">${esc(g.translit||'')}</span> — ${esc(g.translation||'')}`).join(' · ')}</div>`:''}
        <div class="feedback" id="fb"></div>
        <div class="btn-row" style="margin-top:12px">
          ${(L&&L.grammar)?`<button class="btn btn-ghost btn-ico" id="qrule" title="Правило" aria-label="Правило">📐</button>`:''}
          ${correctForm?`<button class="btn btn-ghost btn-ico" id="qhint" title="Показать ответ" aria-label="Показать ответ">💡</button>`:''}
          <button class="btn btn-primary" id="check">Отправить</button>
        </div>
      </div>`);
    if (L&&L.grammar) $('#qrule').onclick = () => { L.hints++; showRulePopup(L.grammar); };
    if (correctForm) $('#qhint').onclick = () => { L.hints++; $('#fb').className='feedback ok'; $('#fb').innerHTML = '💡 Ответ: <b>'+esc(correctForm)+'</b>' + sayBtn(correctForm); speak(correctForm, p.targetLang); };
    attachTapAll(null, [...(sc.encountered_words||[]), ...(sc.answer_glossary||[])]);
    bindAutoGrow('ans');
    if (Q.scene === 1) Hints.show('quest', HintTexts.quest);
    $('#sayScene').onclick = () => speak(sc.scene_text, p.targetLang);
    speak(sc.scene_text, p.targetLang);

    $('#check').onclick = async () => {
      const a = $('#ans').value.trim(); if (!a) return;
      if (mustRetype) {
        if (norm(a) === norm(correctForm)) return pass();
        $('#fb').className='feedback bad'; $('#fb').innerHTML=`Введите точно: <b>${esc(correctForm)}</b>`; return;
      }
      if (correctForm && norm(a) === norm(correctForm)) return pass();
      // локальная человечная проверка: опечатка / только артикль — засчитываем
      if (correctForm) {
        const v = localVerdict(a, correctForm);
        if (v && v.kind==='typo') { toast('Верно, опечатка: '+v.detail.exp, false); return pass(); }
        if (v && v.kind==='article') { toast('Почти верно — артикль: '+v.detail, false); return pass(); }
      }
      $('#check').disabled = true; $('#fb').className='feedback ok'; $('#fb').textContent='Проверяю…';
      let res = null;
      try {
        res = await Gemini.call({ task:'check_answer', target_lang:p.targetLang, native_lang:p.nativeLang, cefr:cfg.cefr,
          expected: correctForm || '(свободный ответ по смыслу сцены)', user_answer:a,
          allow_creative:true, rules:'Creative Path: проверяй ГРАММАТИКУ и СМЫСЛ КОММУНИКАЦИИ, не точность совпадения с expected_target. Если в answer_glossary слова даны через слэш (Not-Aus / Notschalter) — это синонимы, любой один вариант = correct=true. Если задание — описание местонахождения, действия или ситуации — любой грамматически верный ответ подходящий по смыслу = correct=true, даже если конкретная локация/формулировка отличается от expected_target (например: задание «где G01?» → «в программе», «в станке», «в коде» — все верны если грамматически правильно). Равноценные формы (in dem=im, zum, am) — верны. Мелкие опечатки — верны. Только грубая грамматическая ошибка или полное несоответствие смыслу задания = correct=false. Если есть ошибка — rule_title/rule_summary точно под эту ошибку на native_lang. ТОЧНОСТЬ ГРАММАТИКИ (критично): explanation, rule_summary и rule_table обязаны быть фактически верны — род существительного, падеж и спряжение проверь прежде чем называть; запрещено приписывать существительному неверный род. Если задание — выбор из вариантов (например «ручной режим или автоматика») — любой из предложенных вариантов с грамматически верным артиклем = correct=true.' },
          '{"correct":true,"error_type":"spelling|article|word_order|verb_conjugation|vocabulary_gap|none","explanation":"короткий разбор именно этой ошибки на родном","correct_form":"верная фраза","correct_translit":"[транскрипция верной фразы родными буквами]","rule_title":"название правила под ошибку (на родном)","rule_summary":"правило целиком, 2-4 фразы на родном","rule_categories":["одна или несколько из: Артикли, Существительные, Глаголы, Времена, Падежи, Предлоги, Порядок слов, Местоимения, Прочее"],"rule_table":[{"form":"форма","translit":"[транскрипция]","translation":"перевод"}]}');
      } catch(e){}
      $('#check').disabled = false;
      if (!res) { toast('Связь барахлит — ответ засчитан', true); return pass(); }
      if (res.correct) return pass();
      Q.errors++; cfg.onError && cfg.onError();
      const qTr = (res && res.correct_translit) ? ` <span style="color:var(--orange)">${esc(res.correct_translit)}</span>` : '';
      if (Q.errors >= 2) { // Graceful Exit: напарник даёт ответ с мнемоникой
        $('#fb').className='feedback ok';
        $('#fb').innerHTML = `🤝 Я подскажу как напарник: <b>${esc(res?.correct_form||correctForm)}</b>${qTr}` + sayBtn(res?.correct_form||correctForm) + `<br>🧠 ${esc(res?.explanation||'Запомните эту конструкцию — она встретится снова.')}`;
        speak(res?.correct_form||correctForm, p.targetLang);
        showErrorRule(res);
        $('#check').textContent = isFinal ? 'Завершить квест' : 'Дальше';
        $('#check').onclick = () => advance(sc, isFinal, true);
        return;
      }
      mustRetype = true; correctForm = res?.correct_form || correctForm || a;
      $('#fb').className='feedback bad';
      $('#fb').innerHTML = `❌ ${esc(res?.explanation||'Есть ошибка, попробуйте ещё раз.')}<br>Сверьте: ${highlightDiff(a, correctForm)}${qTr}` + sayBtn(correctForm) + ` — запомните и введите вручную.`;
      speak(correctForm, p.targetLang);
      showErrorRule(res);   // точное правило под ошибку — сразу
      $('#ans').value=''; $('#ans').focus();
    };
    function pass() {
      $('#fb').className='feedback ok';
      $('#fb').innerHTML = correctForm ? `✅ Отлично! <b>${esc(correctForm)}</b>` + sayBtn(correctForm) : `✅ Отлично!`;
      // QUEUE-45: после верного ответа лампочка бессмысленна и затирает #fb (в т.ч. кнопки развилки) — прячем её.
      { const _qh = document.getElementById('qhint'); if (_qh) _qh.style.display='none'; }
      if (sc.is_branch && !isFinal && Array.isArray(sc.choices) && sc.choices.length>=2) {
        Q.branchesUsed++;
        $('#fb').innerHTML += `<div style="margin-top:10px">Развилка — что делаем дальше?</div>` +
          sc.choices.slice(0,2).map(c=>`<button class="opt" style="margin-top:8px;text-align:left" data-c="${esc(c.id)}"><b>${esc(c.label_target)}</b>${c.label_native?`<br><span style='font-size:12px;color:var(--dim)'>${esc(c.label_native)}</span>`:''}</button>`).join('');
        document.querySelectorAll('[data-c]').forEach(b=>b.onclick=()=>{ Q.choice=b.dataset.c; advance(sc,false,false); });
        $('#check').style.display='none';
      } else {
        $('#check').textContent = isFinal ? 'Завершить квест' : 'Дальше';
        $('#check').onclick = () => advance(sc, isFinal, false);
      }
    }
  }
  function advance(sc, isFinal, partner) {
    // QUEUE-30: включаем выбор ветки в summary, чтобы Gemini продолжал выбранную линию
    const choiceNote = Q.choice ? ` [Пользователь выбрал: вариант ${Q.choice} — ${(sc.choices||[]).find(c=>c.id===Q.choice)?.label_target||Q.choice}]` : '';
    Q.summary = (Q.summary + ' ' + sc.scene_text + choiceNote).slice(-700);
    if (isFinal) {
      if (L) { delete L.qResume; LessonCache.save(); }   // QUEUE-46: квест пройден — позицию не храним
      Screen.show(`
        <div class="eyebrow">Квест завершён</div>
        <h1>${Q.errors>=2?'🤝 Дошли вместе!':'🏆 История пройдена!'}</h1>
        <p class="sub">${Q.errors>=2?'Ошибки — часть пути: трудные места вернутся в повторение.':'Лексика урока закреплена в живом сюжете.'}</p>
        <button class="btn btn-primary" id="go">Продолжить</button>`);
      $('#go').onclick = cfg.onDone;
    } else {
      Q.scene++; if (!sc.is_branch) Q.choice = null;
      nextScene();   // позицию пишет saveQuestPos() внутри nextScene (единая точка, 4.29)
    }
  }
}

/* =====================================================================
   ЗАВЕРШЕНИЕ УРОКА: автосохранение (5.1) + диагностика-адаптация (2.7)
   «Gemini советует — приложение решает»; защита с откатом к метрикам.
   ===================================================================== */
const DIAG_TYPES  = ['recognition','spelling','verb_conjugation','word_order','vocabulary_gap','none'];
const DIAG_TRENDS = ['improving','stable','declining'];

async function finishLesson() {
  LessonCache.clearLesson(L.code);   // урок завершён — снимок больше не нужен
  const acc = L.ft.total ? +(L.ft.ok / L.ft.total).toFixed(2) : 1;
  const prev = DB.analytics.length ? DB.analytics[DB.analytics.length-1].accuracy_first_try : null;
  const hard = Object.keys(L.wordErr).filter(t => L.wordErr[t] >= 2);

  // --- 1) Сбор: запись слов в «Словарь» ---
  L.words.forEach(w => {
    if (!DB.vocab.some(v => norm(v.term)===norm(w.term))) {
      DB.vocab.push({ term:w.term, translation:w.translation, translit:w.translit||'', emoji:w.emoji||'',
        part_of_speech: w.part_of_speech||'', article: w.article||'',
        is_irregular: !!w.is_irregular, forms: w.forms || w.irregular_forms || '', irregular_forms: w.irregular_forms||'',
        lesson: L.code, errors: L.wordErr[w.term]||0,
        status: (L.wordErr[w.term]||0) >= 2 ? 'на закреплении' : 'новое',
        mnemonic:'', date_added: today(), date_review: today(),
        srs_stage: 0, srs_due: _dayNum() + SRS_GAP[0] });   // 4.27: свежее слово → на лестницу, показ через 1 день
    }
  });
  hard.forEach(t => { if (!DB.reviewQueue.includes(t)) DB.reviewQueue.push(t); });
  // 4.27: старое авто-«освоено» (0 ошибок за один урок) УБРАНО — это оперативная память, не долговременная.
  //       Единственный вход в «освоено» теперь — вершина лестницы 1/3/7/30 (SRS.review).
  Core.markIssued(L.words);   // 4.26: слово переехало из Ядра в Словарь — обратно не возвращается

  // 4.27: итог повторения — двигаем ступени слов, показанных в Recap этого урока.
  //       Верно (0 ошибок на слове) → ступень выше; ошибка → сброс на день 1. Вершина → «освоено».
  (L.reviewWords || []).forEach(rw => {
    const v = DB.vocab.find(x => norm(x.term) === norm(rw.term));
    if (v) SRS.review(v, (L.wordErr[rw.term] || 0) === 0);
  });

  // 4.26 (раздел 2.7): выход из очереди повторения — два урока подряд без ошибок на слове.
  // До 4.26 очередь чистил только Суперквест и она росла монотонно, размывая повторение.
  const met = [...L.words.map(w=>w.term), ...((L.reviewWords||[]).map(w=>w.term))];
  [...new Set(met)].forEach(t => {
    const v = DB.vocab.find(x => norm(x.term)===norm(t));
    if (!v) return;
    if ((L.wordErr[t]||0) > 0) { v.cleanStreak = 0; return; }     // ошибка — счётчик обнуляется
    if (!DB.reviewQueue.includes(v.term)) return;
    v.cleanStreak = (v.cleanStreak||0) + 1;
    if (v.cleanStreak >= 2) {
      // 4.27: уход из СРОЧНОГО слоя ≠ «освоено». Слово возвращается на спокойную лестницу и крутится по датам.
      DB.reviewQueue = DB.reviewQueue.filter(x => x !== v.term);
      v.cleanStreak = 0;
      if (v.status === 'на закреплении') v.status = 'новое';
      if (v.status !== 'освоено' && !SRS.onLadder(v)) SRS.initLearned(v);   // не было расписания (старое слово) → на лестницу; вершину не трогаем
    }
  });

  // --- 2) Диагностика (Gemini, строго из словаря категорий) ---
  Screen.loader('Сохраняю и анализирую урок…');
  let diag = null;
  try {
    const d = await Gemini.call({ task:'diagnose', native_lang:DB.profile.nativeLang, cefr:curCefr(),
      summary:{ accuracy_first_try:acc, errors_by_type:L.errors, hard_words:hard, prev_accuracy:prev } },
      '{"dominant_error_type":"recognition|spelling|verb_conjugation|word_order|vocabulary_gap|none","risk_words":["..."],"confidence_trend":"improving|stable|declining","note_native":"1 короткое предложение на родном языке"}');
    if (DIAG_TYPES.includes(d.dominant_error_type) && DIAG_TRENDS.includes(d.confidence_trend)) diag = d;
  } catch(e){} // откат к чистым метрикам — обучение не блокируется

  // --- 3) Действие: жёсткие правила в коде ---
  (diag?.risk_words||[]).forEach(t => { if (DB.vocab.some(v=>norm(v.term)===norm(t)) && !DB.reviewQueue.includes(t)) DB.reviewQueue.push(t); });
  let next = nextAfterLesson(L.code), note = 'PASS';
  if (acc < 0.70) {                                   // слабый результат: идём дальше, но усиливаем повторение
    note = 'REVIEW';
    L.words.forEach(w => { if (!DB.reviewQueue.includes(w.term)) DB.reviewQueue.push(w.term); });
    DB.vocab.forEach(v => { if (L.words.some(w=>norm(w.term)===norm(v.term))) v.status = 'на закреплении'; });
  }

  // --- листы «Прогресс» и «Аналитика» ---
  DB.progress.push({ code:L.code, date:today(), words:L.words.map(w=>w.term).join(', '), next, note });
  DB.analytics.push({ lesson:L.code, date:today(), accuracy_first_try:acc, errors_by_type:L.errors,
    hard_words:hard, duration_sec: Math.round((Date.now()-L.t0)/1000), hints_used:L.hints,
    delta_accuracy: prev==null ? '' : ((acc-prev)>=0?'+':'')+ (acc-prev).toFixed(2) });
  DB.nextStage = next;
  DB.profile.cefr = parseCode(next.startsWith('EXAM_') ? next.replace('EXAM_','')+'.01' : next)?.lvl || DB.profile.cefr;
  Storage.save(DB);
  toast('Сохранено ✓');

  // --- завершающий экран (5.1): простая фраза, крупные кнопки ---
  const code = L.code, hintsUsed = L.hints; L = null;
  Screen.show(`
    <div class="eyebrow">Точность: ${Math.round(acc*100)}% · подсказок: ${hintsUsed}</div>
    <h1>Урок ${esc(code)} завершён, прогресс сохранён.</h1>
    <p class="sub">${diag?.note_native ? '💡 '+esc(diag.note_native) : (note==='REVIEW' ? 'Точность ниже 70% — лексика урока добавлена в усиленное повторение, но движемся вперёд.' : 'Что дальше?')}</p>
    ${hard.length?`<div class="chiplist">${hard.map(h=>`<span class="chip warn">⚠️ ${esc(h)}</span>`).join('')}</div><p class="note">Эти слова вернутся в Повторение и Суперквест.</p>`:''}
    <div style="height:8px"></div>
    <button class="btn btn-primary" id="bNext">${next.startsWith('EXAM_')?'Экзамен '+esc(next.replace('EXAM_','')):'Следующий урок '+esc(next)}</button>
    <button class="btn btn-ghost" id="bSuper">Суперквест (повторение)</button>
    <button class="btn btn-ghost" id="bTalk">🎙️ Поговорить</button>
    <button class="btn btn-ghost" id="bExit">Выход в меню</button>`);
  $('#bNext').onclick  = () => next.startsWith('EXAM_') ? startExam(next) : startLesson(next);
  $('#bSuper').onclick = startSuperLesson;
  $('#bTalk').onclick  = startDialogue;
  $('#bExit').onclick  = mainMenu;
}

/* =====================================================================
   СУПЕРКВЕСТ (раздел 6, версия 4.15) — заменяет прежний «Супер-урок».
   Один цельный квест-погружение на 30–50 предложений вместо набора
   отдельных заданий: история разбита на 3–5 актов по CEFR, между актами —
   экран-итог (не сюжетный). Развилки не фиксированы числом — расставляет
   генерация истории по логике повествования (не больше 1–2 за акт).
   Лексика: 80% known_vocab / 20% новая служебная; баланс бытовое/интересы
   по CEFR. Anti-Frustration (Q.errors) обнуляется в начале каждого акта;
   итоговая точность (L.ft) — нет, копится за весь Суперквест.
   Движок переиспользует контракт quest_step (раздел 5.A, 2.5), расширенный
   полями act_index/acts_total/branches_used_in_act/branch_limit_in_act и
   ответным полем is_act_final (отдельно от is_final — конец ВСЕЙ истории).
   ===================================================================== */
// Шкала актов и общего объёма истории по CEFR (раздел 6.3)
const SUPERQUEST_ACTS   = { A1:3, A2:3, B1:4, B2:4, C1:5, C2:5 };
const SUPERQUEST_SCENES = { A1:30, A2:34, B1:40, B2:44, C1:50, C2:50 };
function splitScenesAmongActs(total, acts) {
  const base = Math.floor(total/acts), rem = total % acts;
  return Array.from({length:acts}, (_,i) => base + (i < rem ? 1 : 0));
}
// Тап-перевод: оборачивает встречающиеся в тексте сцены слова в кликабельные span'ы.
// Список 📒 «Слова задания» НЕ заменяется этим — тапы добавляются как дополнительный способ (раздел 6.5).
function tapWordsHTML(text, words) {
  let html = esc(text);
  const list = (words||[]).filter(w=>w && w.term).slice().sort((a,b)=>b.term.length-a.term.length);
  const used = new Set(), final = [];
  list.forEach(w => {
    const key = norm(w.term); if (used.has(key)) return;
    const escTerm = String(w.term).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    let re; try { re = new RegExp('('+escTerm+')','i'); } catch(_) { return; }
    if (re.test(html)) {
      used.add(key);
      const idx = final.length;
      html = html.replace(re, `<span class="tapword" data-tw="${idx}">$1</span>`);
      final.push(w);
    }
  });
  return { html, words: final };
}
// Служебные слова — не кликабельны при тапе всех слов в квестах
const TAP_SKIP = new Set(['der','die','das','ein','eine','einen','einem','einer','eines',
  'und','oder','aber','doch','auch','nicht','noch','schon','nur','mal','denn',
  'in','an','auf','zu','von','mit','bei','aus','nach','vor','über','unter',
  'für','um','bis','seit','durch','ohne','gegen','je','per',
  'ich','du','er','sie','es','wir','ihr','sie','mich','dich','sich',
  'is','the','a','an','and','or','but','in','on','at','to','of','for',
  'с','в','на','и','или','но','не','а','по','за','от','до','из','к','у','о','со','во']);

// Разбить текст на кликабельные токены (все слова, кроме служебных)
function tapAllWordsHTML(text) {
  if (!text) return '';
  // Токенизация: слова и не-слова (пунктуация, пробелы)
  const tokens = text.match(/[\wÄäÖöÜüß\u00C0-\u024F\u0400-\u04FF]+|[^\wÄäÖöÜüß\u00C0-\u024F\u0400-\u04FF]+/g) || [];
  return tokens.map(tok => {
    const low = tok.toLowerCase().replace(/[.,!?;:"'«»()]/g,'');
    if (/^[\wÄäÖöÜüß\u00C0-\u024F\u0400-\u04FF]+$/.test(tok) && !TAP_SKIP.has(low) && tok.length > 1 && !/^_+$/.test(tok)) {
      return `<span class="tapword tapall" data-word="${esc(tok)}">${esc(tok)}</span>`;
    }
    return esc(tok);
  }).join('');
}

// Поиск слова: сначала словарь, потом Gemini
async function lookupAndShowWord(raw, anchorEl, sceneWords) {
  const term = raw.replace(/[.,!?;:"'«»()]/g,'').trim();
  if (!term) return;
  // explain_element: контекст для кнопки «почему так?» — целевое предложение из контейнера сцены
  const ctx = (anchorEl && anchorEl.closest('.target'))
    ? anchorEl.closest('.target').textContent.replace(/🔊/g,'').replace(/\s+/g,' ').trim()
    : '';
  // QUEUE-19: добавляем sceneWords в кэш сцены
  if (sceneWords && L) { if (!L.encounteredCache) L.encounteredCache = []; sceneWords.forEach(w=>{ if(w&&w.term&&!L.encounteredCache.find(x=>norm(x.term)===norm(w.term))) L.encounteredCache.push(w); }); }
  // 1. Ищем в словаре пользователя
  const _stripArt = x => String(x||'').replace(/^(der|die|das|ein|eine)\s+/i,'');
  // QUEUE-19: сначала слова ТЕКУЩЕЙ сцены — контекст важнее общего словаря (иначе 'plane' → 'самолёт')
  const sc0 = Array.isArray(sceneWords) ? sceneWords.find(w => w && w.term && (norm(w.term)===norm(term) || norm(_stripArt(w.term))===norm(_stripArt(term)))) : null;
  if (sc0 && (sc0.translit || sc0.translation)) { showTapPopup(sc0, anchorEl, ctx); return; }
  const found = DB.vocab.find(v => norm(v.term) === norm(term)
    || norm(_stripArt(v.term)) === norm(_stripArt(term))
  );
  // Показываем из словаря только если запись полная (есть translit или translation).
  // Иначе идём к Gemini — дополним пустые поля и тогда покажем попап.
  if (found && (found.translit || found.translation)) { showTapPopup(found, anchorEl, ctx); return; }
  // 2. Ищем в encountered_words текущего урока (сохранены в L.encounteredCache)
  const enc = (L && L.encounteredCache) ? L.encounteredCache.find(w => norm(w.term)===norm(term) || norm(_stripArt(w.term))===norm(_stripArt(term))) : null;
  if (enc && (enc.translit || enc.translation)) { showTapPopup(enc, anchorEl, ctx); return; }
  // 3. Запрашиваем Gemini
  const bar = document.getElementById('tapOverlay'); if (bar) bar.remove();
  const loading = document.createElement('div'); loading.id = 'tapOverlay';
  loading.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:60;display:flex;justify-content:center;pointer-events:none';
  loading.innerHTML = `<div style="pointer-events:auto;width:100%;max-width:480px;background:var(--panel);border:1px solid var(--line);border-radius:16px 16px 0 0;padding:12px 16px;display:flex;align-items:center;gap:8px;box-shadow:0 -4px 24px rgba(0,0,0,.4)"><span style="color:var(--faint);font-size:14px">🔍 ${esc(term)}…</span></div>`;
  document.body.appendChild(loading);
  let w = null;
  try {
    const p = DB.profile;
    w = await Gemini.call(
      { task:'translate_word', target_lang:p.targetLang, native_lang:p.nativeLang, word:term },
      '{"term":"слово как в тексте","translit":"[транскрипция родными буквами native_lang]","translation":"перевод на native_lang"}'
    );
  } catch(e) {}
  loading.remove();
  if (!w || !w.term) { showTapPopup({term, translit:'', translation:'?'}, anchorEl, ctx); return; }
  // Сохраняем как «встреченное» в словарь; если слово уже есть — дополняем пустые поля
  const existingW = DB.vocab.find(v => norm(v.term)===norm(w.term));
  if (existingW) {
    let updated = false;
    if (w.translit && !existingW.translit) { existingW.translit = w.translit; updated = true; }
    if (w.translation && !existingW.translation) { existingW.translation = w.translation; updated = true; }
    if (updated) Storage.save(DB);
  } else {
    DB.vocab.push({ term:w.term, translation:w.translation, translit:w.translit||'', emoji:'',
      part_of_speech:'', is_irregular:false, forms:'', lesson: L ? L.code : 'quest',
      errors:0, status:'встреченное', mnemonic:'', date_added:today(), date_review:today() });
    Storage.save(DB);
  }
  showTapPopup(w, anchorEl, ctx);
}

// Подключить тап-обработчики на все .tapall в контейнере
function attachTapAll(container, _sceneWords) {
  (container || document).querySelectorAll('.tapall').forEach(el => {
    el.onclick = e => { e.stopPropagation(); lookupAndShowWord(el.dataset.word, el, _sceneWords); };
  });
}

function showTapPopup(w, anchorEl, ctx) {
  // QUEUE-18: попап рядом со словом, не снизу экрана
  if (!w || !w.term) return;
  let old = document.getElementById('tapOverlay'); if (old) old.remove();
  const popup = document.createElement('div');
  popup.id = 'tapOverlay';
  const tts = hasTTS(DB.profile.targetLang)
    ? `<button id="tapSay" aria-label="Озвучить" style="background:none;border:none;font-size:18px;cursor:pointer;padding:0 2px;flex-shrink:0">🔊</button>`
    : '';
  // explain_element: кнопка «почему так?» — только когда есть контекст предложения (тап внутри сцены)
  const whyBtn = ctx
    ? `<button id="tapWhy" aria-label="Объяснить почему так" title="Почему так?" style="background:none;border:none;font-size:16px;cursor:pointer;padding:0 2px;flex-shrink:0">📘</button>`
    : '';
  popup.innerHTML = `<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <span style="font-weight:600;font-size:15px">${esc(w.term)}</span>
      ${tts}
      <span style="color:var(--orange);font-size:13px">${esc(w.translit||'')}</span>
      <span style="color:var(--faint);font-size:13px;flex:1">${esc(w.translation||'')}</span>
      ${whyBtn}
      <button id="tapClose" aria-label="Закрыть" style="background:none;border:none;font-size:18px;line-height:1;color:var(--faint);cursor:pointer;padding:0">✕</button>
    </div>
    <div id="tapWhyBox" style="display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--line,#333);font-size:13px;line-height:1.5"></div>`;
  popup.style.cssText = [
    'position:fixed',
    'z-index:200',
    'max-width:320px',
    'background:var(--panel,#1e2130)',
    'border:1px solid var(--line,#333)',
    'border-radius:12px',
    'padding:10px 14px',
    'box-shadow:0 4px 24px rgba(0,0,0,.6)',
    'backdrop-filter:blur(8px)',
    '-webkit-backdrop-filter:blur(8px)',
    'pointer-events:auto'
  ].join(';');
  document.body.appendChild(popup);
  // Позиционирование относительно тапнутого слова (переиспользуемое — попап может вырасти после раскрытия правила)
  const rect = anchorEl ? anchorEl.getBoundingClientRect() : {top:window.innerHeight/2, left:window.innerWidth/2, bottom:window.innerHeight/2, width:0};
  const margin = 8;
  function clampPopup() {
    const pw = popup.offsetWidth || 280;
    const ph = popup.offsetHeight || 60;
    // По горизонтали: центрируем над словом, не выходим за края
    let left = rect.left + rect.width/2 - pw/2;
    left = Math.max(margin, Math.min(left, window.innerWidth - pw - margin));
    // По вертикали: если слово в верхней половине — попап под словом, иначе — над
    let top = (rect.bottom < window.innerHeight / 2) ? rect.bottom + margin : rect.top - ph - margin;
    top = Math.max(margin, Math.min(top, window.innerHeight - ph - margin));
    popup.style.left = left + 'px';
    popup.style.top  = top  + 'px';
  }
  clampPopup();
  if (hasTTS(DB.profile.targetLang)) document.getElementById('tapSay').onclick = () => speak(w.term, DB.profile.targetLang);
  document.getElementById('tapClose').onclick = () => popup.remove();
  // explain_element: «почему так?» → запрос правила к Gemini, разворачиваем в том же попапе
  const whyEl = document.getElementById('tapWhy');
  if (whyEl) whyEl.onclick = () => explainElement(w.term, ctx, popup, clampPopup);
  // Закрывать при тапе вне попапа
  setTimeout(() => { document.addEventListener('click', function h(e){ if(!popup.contains(e.target)){popup.remove(); document.removeEventListener('click',h);} }); }, 50);
}

// explain_element (спецификация 4.22): второй уровень тап-попапа — объяснение, почему слово/форма стоит в предложении именно так.
// Перевод даётся мгновенно (первый уровень); правило подтягивается только по тапу 📘 — лишний запрос к Gemini лишь по факту нажатия (RPM не страдает).
async function explainElement(term, sentence, popup, reposition) {
  const box = popup.querySelector('#tapWhyBox');
  const btn = popup.querySelector('#tapWhy');
  if (!box) return;
  if (box.dataset.loaded === '1') {          // повторный тап — сворачиваем/разворачиваем
    box.style.display = box.style.display === 'none' ? 'block' : 'none';
    if (reposition) reposition();
    return;
  }
  box.style.display = 'block';
  box.style.maxHeight = '42vh'; box.style.overflowY = 'auto';
  box.innerHTML = `<span style="color:var(--faint)">📘 Разбираю…</span>`;
  if (btn) btn.disabled = true;
  if (reposition) reposition();
  const p = DB.profile;
  let r = null;
  try {
    r = await Gemini.call({
      task:'explain_element', target_lang:p.targetLang, native_lang:p.nativeLang, cefr:curCefr(),
      sentence: sentence, element: term,
      rules:'Объясни на native_lang, ПОЧЕМУ слово/форма «'+term+'» стоит В ЭТОМ предложении (sentence) именно так. '
        + 'КРИТИЧНО (QUEUE-41): разбирай ровно ту форму, что в sentence. Если в sentence у слова НЕТ артикля — не объясняй артикль, которого нет («Мы используем den» запрещено, если в sentence нет den). Если форма в sentence отличается от словарной — объясняй именно форму из sentence. Поле example — это ДРУГОЕ предложение, его грамматика может отличаться от sentence; НЕЛЬЗЯ переносить разбор примера на sentence и выдавать грамматику примера за объяснение исходной фразы. Если пример показывает иную форму (напр. с артиклем, когда в sentence его нет) — упомяни это только как явный контраст («а в другом случае…»), но explanation и detail всегда строго про sentence. '
        + 'СТРОГО БЕЗ лингвистических терминов — аудитория дети и взрослые без подготовки. Запрещены слова: «падеж/аккузатив/датив/родительный», «нулевой/определённый/неопределённый артикль», «абстрактное существительное», «спряжение», «отделяемая приставка», «адвербиальный/наречный оборот», «предложное управление». Заменяй смыслом: «слово-свойство» вместо «абстрактное существительное»; «здесь артикль не нужен» вместо «нулевой артикль»; «отвечает на вопрос как?» вместо «наречный оборот»; «кусочек глагола уехал в конец» вместо «отделяемая приставка». '
        + 'Верни ДВА уровня. explanation — короткая суть, 1–2 предложения простыми словами (показывается сразу). detail — развёрнутый разбор по структуре: (1) почему именно так в sentence, из чего вытекает по смыслу; (2) 2–3 примера ТОЙ ЖЕ модели на target_lang с переводом (например для «mit Sorgfalt»: mit Ruhe — спокойно, mit Geduld — терпеливо); (3) контраст «а когда было бы иначе» — короткий пример, где форма или артикль изменились бы, с пояснением почему. 3–5 предложений, без терминов. '
        + 'Если «'+term+'» — кусочек составного глагола: в explanation назови глагол целиком и скажи, что часть уехала в конец. Не пересказывай перевод всего предложения. '
        + 'example — один короткий пример той же конструкции на target_lang (для озвучки), или "". Помни: грамматика example не отменяет разбор формы из sentence.'
    }, '{"explanation":"короткая суть, 1-2 предложения на native_lang, без терминов","detail":"развёрнутый разбор без терминов: почему так + 2-3 примера той же модели + контраст когда иначе","example":"короткий пример той же конструкции на target_lang или пусто"}');
  } catch(e) {
    box.innerHTML = `<span style="color:var(--faint)">Не удалось получить объяснение. Попробуйте ещё раз.</span>`;
    if (btn) btn.disabled = false;
    if (reposition) reposition();
    return;
  }
  if (btn) btn.disabled = false;
  const expl = (r && r.explanation) ? r.explanation : 'Объяснение недоступно.';
  const detail = (r && r.detail) ? r.detail : '';
  const ex = (r && r.example) ? r.example : '';
  const exRow = ex ? `<div style="margin-top:6px;color:var(--orange)">${esc(ex)} ${hasTTS(p.targetLang)?`<button aria-label="Озвучить пример" onclick="speak(${JSON.stringify(ex).replace(/"/g,'&quot;')}, '${p.targetLang}')" style="background:none;border:none;font-size:14px;cursor:pointer;padding:0">🔊</button>`:''}</div>` : '';
  // Вариант Б: суть сразу, развёрнутый разбор — по кнопке «подробнее» (оба уровня уже получены, без второго запроса)
  const moreBlock = detail
    ? `<button id="tapMore" style="margin-top:8px;background:none;border:none;color:var(--accent,#6ea8fe);font-size:13px;cursor:pointer;padding:0">подробнее ▼</button>`
      + `<div id="tapDetail" style="display:none;margin-top:6px;line-height:1.5">${esc(detail).replace(/\n/g,'<br>')}</div>`
    : '';
  box.innerHTML = `<div>${esc(expl)}</div>` + exRow + moreBlock;
  box.dataset.loaded = '1';
  const moreBtn = box.querySelector('#tapMore');
  if (moreBtn) moreBtn.onclick = () => {
    const d = box.querySelector('#tapDetail');
    const open = d.style.display === 'none';
    d.style.display = open ? 'block' : 'none';
    moreBtn.textContent = open ? 'свернуть ▲' : 'подробнее ▼';
    if (reposition) reposition();
  };
  if (reposition) reposition();
}
// Подбор слов для must_use на конкретный акт: ротация приоритетных + известных + стартовой служебной лексики.
function superquestActMustUse() {
  const pri = pick(L.sp.priority||[], Math.min(3, (L.sp.priority||[]).length));
  const restPool = (L.sp.knownSample||[]).filter(t=>!pri.includes(t));
  const rest = pick(restPool, Math.min(4, restPool.length));
  const func = L.sp.functionalNew||[];
  return [...new Set([...pri, ...rest, ...func])].slice(0,8);
}

async function startSuperLesson() {
  const p = DB.profile, lvl = p.cefr;
  const base = DB.nextStage.startsWith('EXAM_') ? DB.nextStage.replace('EXAM_','')+'.25' : DB.nextStage;
  Screen.loader('Готовлю Суперквест…');
  LessonCache.clearSuper();   // 4.29: новый Суперквест заменяет прежний незавершённый; урок в своём слоте не страдает
  // 4.27: спокойный слой кормит и Суперквест — подошедшие по дате слова идут первыми, затем случайный добор
  const dueWords = DB.vocab.filter(w=>SRS.due(w)).sort((a,b)=>SRS.overdue(b)-SRS.overdue(a)).map(w=>w.term);
  const knownSample = [...new Set([...dueWords, ...pick(DB.vocab, Math.min(20, DB.vocab.length)).map(w=>w.term)])].slice(0,20);
  const imported = DB.vocab.filter(w=>w.priority || w.source==='import').map(w=>w.term);
  const riskQueue = DB.vocab.filter(w=>DB.reviewQueue.includes(w.term)).map(w=>w.term);
  const riskFirst = [...new Set([...imported, ...riskQueue])];
  const intensiveTopic = DB.intensive && imported.length
    ? (p.interests ? p.interests + '; ' : '') + 'прикладная отработка импортированных профессиональных терминов в реальных рабочих сценариях'
    : p.interests;
  const acts = SUPERQUEST_ACTS[lvl] || 3;
  const scenesTotal = SUPERQUEST_SCENES[lvl] || 30;
  const scenesPerAct = splitScenesAmongActs(scenesTotal, acts);
  const survShare = SURVIVAL_SHARE[lvl] ?? 0.3;
  const topicMode = `бытовое ≈${Math.round(survShare*100)}% / интересы ≈${Math.round((1-survShare)*100)}% (бытовое: ориентирование и транспорт, магазин, деньги, еда, вежливость, время, здоровье); бытовое вплетать в сюжет, не отдельным списком`;

  // небольшой стартовый набор новой служебной лексики (раздел 6.2) — войдёт в must_use по ходу истории
  // Запрос идёт параллельно с подготовкой данных (Promise выполняется пока мы собираем L)
  let functionalNew = [];
  const functionalNewPromise = Gemini.call({
    task:'super_lesson_plan', part:'functional', target_lang:p.targetLang, native_lang:p.nativeLang, cefr:lvl,
    known_vocab:knownSample,
    rules:'Ровно 2 новых служебных слова (предлоги/союзы/частицы), которых нет в known_vocab — будут вплетены в историю Суперквеста по ходу повествования.'
  }, '{"functional_new":[{"term":"связка/предлог","emoji":"эмодзи","translit":"[родными буквами]","translation":"перевод"}] — ровно 2}')
    .then(r => { functionalNew = (r.functional_new||[]).filter(w=>w && w.term); })
    .catch(e => {
      if (String(e.message||'').startsWith('KEY:')) throw e;
      // стартовый набор необязателен — история всё равно введёт новые слова по ходу (encountered_words)
    });
  try { await functionalNewPromise; } catch(e) {
    if (String(e.message||'').startsWith('KEY:')) return keyWizard(true);
  }
  functionalNew.forEach(w => {
    if (w.term && !DB.vocab.some(v=>norm(v.term)===norm(w.term)))
      DB.vocab.push({ term:w.term, translation:w.translation||'', translit:w.translit||'', emoji:w.emoji||'',
        is_irregular:false, forms:'', lesson:'SUPER_'+base, errors:0, status:'новое', mnemonic:'', date_added:today(), date_review:today() });
  });
  Storage.save(DB);

  L = { code:'SUPER_'+base, isSuper:true, words:[],
        sp: { p, lvl, base, knownSample, priority: riskFirst.slice(0,7), topic:intensiveTopic,
              functionalNew: functionalNew.map(w=>w.term), reviewDue: dueWords },   // 4.27: подошедшие по дате — для оценки ступеней в finishSuper
        sqMustUsed: [],   // 4.27: копим активно требуемые (must_use) слова по актам — их двигаем по лестнице
        actsTotal: acts, scenesPerAct, topicMode,
        superStory: { summary:'', arc:null },
        errors:{recognition:0,writing:0,construction:0,quest:0},
        ft:{ok:0,total:0}, hints:0, t0:Date.now(), wordErr:{}, firstTryDone:{} };
  // СЮЖЕТНЫЙ ДВИЖОК (раздел 6, ред. 4.21): один раз строим скелет истории-новеллы на весь суперквест
  Screen.loader('Готовлю историю…');
  try {
    const ar = await Gemini.call({
      task:'generate_story_arc', target_lang:p.targetLang, native_lang:p.nativeLang, cefr:lvl,
      topic:intensiveTopic, topic_mode:topicMode, acts_total:acts, scenes_per_act:scenesPerAct, scenes_total:scenesTotal,
      priority_words:riskFirst.slice(0,7), known_sample:knownSample,
      rules:'Построй СКЕЛЕТ цельной истории-новеллы, которую интересно читать: живой герой от первого лица, смена мест и действий, юмор и яркие образы, развязка. Это приключение, а не описание одной комнаты. '
        +'Верни РОВНО scenes_total битов (по одному на сцену), пронумерованных по актам согласно scenes_per_act (акт 1 — первые scenes_per_act[0] сцен и т.д.). Каждый бит — КОРОТКИЕ фразы, НЕ проза: place (где), action (что делает герой/что происходит), shift (что меняется к следующему биту), опц. twist (поворот). '
        +'Арка через все акты: завязка -> нарастание -> кульминация -> развязка. Размечай 1-2 развилки на акт (is_branch_point=true) в логически уместных точках, с branch_hint о чём выбор; последствие выбора подразумевай в последующих битах. Развилка (QUEUE-48) — это выбор между двумя РАЗНЫМИ поступками/направлениями сюжета (что герой делает дальше), а НЕ языковой/грамматический выбор; branch_hint описывает именно расхождение сюжета. '
        +'priority_words/known_sample — МЯГКАЯ опора: раскидай естественные поводы их употребить по битам; новые слова допустимы и желательны для живости. CEFR ('+lvl+') ограничивает ТОЛЬКО будущую грамматику заданий, НЕ богатство мира и образов. '
        +'hero — уникальный под эту историю: краткие name, role, voice (манера/характер). tone — живой, с юмором.'
    }, '{"logline":"одна фраза о чём история","hero":{"name":"имя","role":"роль","voice":"манера/характер кратко"},"tone":"живой, с юмором","beats":[{"act":1,"scene":1,"place":"где","action":"что происходит","shift":"что меняется","twist":"","is_branch_point":false,"branch_hint":""}]}');
    if (ar && Array.isArray(ar.beats) && ar.beats.length) L.superStory.arc = ar;
  } catch(e) {
    if (String(e.message||'').startsWith('KEY:')) return keyWizard(true);
    // арка необязательна: без неё работает прежний режим «сцена за сценой» по story_so_far
  }
  startSuperquestAct(1);
}

function resumeSuper(cached) {
  // QUEUE-46: возобновление Суперквеста из снимка. Восстанавливаем L (арка, сводка, акт,
  // накопители) и перезаходим в сохранённый акт; runSuperquestAct поднимет сцену из L._resumeScene.
  L = LessonCache.hydrate(cached);
  L._resumeScene = L.sqScene || 1;
  startSuperquestAct(L.actIndex || 1);
}

function startSuperquestAct(actIndex) {
  L.actIndex = actIndex;
  const scenesInAct = L.scenesPerAct[actIndex-1];
  const isLastAct = actIndex >= L.actsTotal;
  const _mu = superquestActMustUse();
  L.sqMustUsed = [...new Set([...(L.sqMustUsed||[]), ..._mu])];   // 4.27: активно требуемые слова — их и двигаем по лестнице в finishSuper
  runSuperquestAct({
    actIndex, actsTotal: L.actsTotal, scenesInAct, isLastAct,
    cefr: L.sp.lvl, topic: L.sp.topic, topicMode: L.topicMode,
    mustUse: _mu
  });
}

// Цикл сцен ОДНОГО акта. История (L.superStory.summary) копится сквозным образом через все акты —
// это одна непрерывная история, а не три разных квеста, как в прежней реализации.
async function runSuperquestAct(cfg) {
  const p = DB.profile;
  const Q = { scene:1, errors:0, branchesUsedInAct:0, choice:null, newWordsInAct:new Set() };
  // QUEUE-46: возобновление Суперквеста. Позиция (акт+сцена+сводка+арка) живёт на L и
  // сериализуется через LessonCache. L._resumeScene выставляется при входе из меню «Продолжить».
  if (L && L._resumeScene) {
    Q.scene = L._resumeScene;
    Q.choice = L.sqChoice || null;
    Q.branchesUsedInAct = L.sqBranches || 0;
    Q.newWordsInAct = new Set(L.sqNewWords || []);
    delete L._resumeScene;   // одноразово
  }
  nextScene();

  function saveSuperPos() {
    // снимок позиции Суперквеста перед показом сцены (акт уже в L.actIndex; сводка в L.superStory.summary)
    if (!L) return;
    L.sqScene = Q.scene; L.sqChoice = Q.choice;
    L.sqBranches = Q.branchesUsedInAct; L.sqNewWords = [...Q.newWordsInAct];
    LessonCache.save();
  }

  async function nextScene() {
    saveSuperPos();
    Screen.loader(`Акт ${cfg.actIndex}/${cfg.actsTotal} · сцена ${Q.scene} из ${cfg.scenesInAct}…`);
    let sc;

    const _priorScenes = (L.scenesPerAct||[]).slice(0, cfg.actIndex-1).reduce((a,b)=>a+b,0);
    const _beatObj = (_arc && Array.isArray(_arc.beats)) ? _arc.beats[_priorScenes + (Q.scene-1)] : null;

          +'Развилка — ТОЛЬКО в логически уместный момент сюжета, не больше branch_limit_in_act развилок за акт (в этом акте уже использовано: '+Q.branchesUsedInAct+'); основная линия должна оставаться прямой — не превращай историю в лабиринт выборов. РАЗВИЛКА СЮЖЕТНАЯ, НЕ ГРАММАТИЧЕСКАЯ (QUEUE-48, критично): при is_branch=true два варианта choices — РАЗНЫЕ поступки/повороты сюжета (что герой делает дальше), ведущие к разным продолжениям. ОБА варианта грамматически верны и естественны; ЗАПРЕЩЕНО выбирать между верной и неверной формой (артикль/падеж/окончание) или между двумя формулировками одного и того же. label_target — осмысленное действие в мире истории, не языковой тест. Языковое задание сцены (expected_target) отдельно от выбора ветки. '
          +'Если это последняя сцена акта — заверши акт логичной паузой: is_act_final=true, без развилки. '
          +(cfg.isLastAct ? 'Это ПОСЛЕДНИЙ акт истории: is_act_final=true и is_final=true ТОЛЬКО на сцене '+cfg.scenesInAct+' (последней). До неё — is_act_final=false ВСЕГДА.' : 'Это не последний акт — is_final=false ВСЕГДА. is_act_final=true ТОЛЬКО на сцене '+cfg.scenesInAct+' (последней сцене этого акта). До неё — is_act_final=false.')

употребима, переформулируй естественнее. Пример калька↔живое (нем.): «das Ankratzen im Manuell» ❌ → «im Handbetrieb» / «manuell» / «im manuellen Betrieb» ✅. Не заставляй ученика заучивать кальку. ПЕРЕВОД (native_hint): на A1–A2 корректно по-русски, все смысловые слова сохраняются, служебные глаголы (sein) опускаются, порядок слов русский. prompt_for_user ОБЯЗАН быть напрямую связан с содержимым scene_text — спрашивай ТОЛЬКО о том что упомянуто в сцене; запрещено задавать вопросы о вещах которых нет в тексте сцены. АНТИ-КОЛЛИЗИЯ ПОДСКАЗКИ (QUEUE-36, критично): конструкция/глагол, который задание просит достроить (например «Ich wähle ___», «Ich bezahle ___»), НЕ должна встречаться в scene_text уже достроенной с ДРУГИМ объектом. Если задание просит достроить «Ich wähle (аэропорт/кафе)» — в сцене ЗАПРЕЩЕНО писать «Ich wähle das Ziel»; если просит «Ich bezahle ___» — в сцене не должно быть «Ich bezahle das Ticket». Иначе сцена учит одному завершению, а эталон требует другого, и ответ становится невыводимым из контекста. Перед выдачей проверь: expected_target согласован с тем, как эта конструкция (не) показана в сцене. ЯВНЫЙ НАБОР ОТВЕТОВ (QUEUE-36): если задание — выбор из перечисленных слов, prompt_for_user обязан прямо называть этот ограниченный набор («Выберите: аэропорт или кафе?»), а не давать размытое «используя конструкцию Ich wähle ___». ЗАПРЕТ ВЫДАЧИ ОТВЕТА: prompt_for_user НЕ должен содержать готовый эталон целиком — формулировки вида «Используйте структуру X ist Y», где X ist Y и есть ответ, ЗАПРЕЩЕНЫ. Структуру-подсказку давай ТОЛЬКО как scaffold с прочерками. must_use — мягкая опора: вплетай эти слова там где естественно по сюжету; новые слова допустимы и желательны для живости истории (тап и глоссарий их подхватят). Динамика сюжета важнее повторения лексики. ЗАПРЕЩЕНО использовать технические коды, аббревиатуры, цифровые команды (G01, T010101, CNC-команды и т.п.) как целевые слова для изучения — только обычные слова целевого языка. В answer_glossary — ВСЕ ключевые слова для ответа (термин+транскрипция+перевод). СЛОВА ЗАДАНИЯ С АРТИКЛЕМ (критично): в answer_glossary и encountered_words поле term для СУЩЕСТВИТЕЛЬНЫХ целевого языка обязано включать артикль рода в словарной форме (нем.: die Automatik, der Handbetrieb, das Auto). Прилагательным, наречиям, глаголам артикль НЕ добавляется (manuell, schneiden). Если в целевом языке артиклей нет — не добавляется. В encountered_words — значимые слова из текста сцены (до 5) — доступны по тапу. translit — ТОЛЬКО буквами native_lang, пример: [форбэрайтн].'
      },
      '{"scene_text":"текст сцены на целевом языке (объём по CEFR)","native_hint":"перевод-подсказка на родном","prompt_for_user":"внятное задание на родном: что сказать","expected_target":"эталонная фраза на целевом","scaffold":"каркас с ___ на месте ключевых слов (обязательно на A1-A2)","answer_glossary":[{"term":"слово нужное для ответа","translit":"[транскрипция]","translation":"перевод"}],"encountered_words":[{"term":"слово на целевом","translit":"[транскрипция]","translation":"перевод"}],"is_branch":false,"choices":[{"id":"A","label_target":"вариант на целевом","label_native":"перевод варианта А на родном"},{"id":"B","label_target":"вариант на целевом","label_native":"перевод варианта Б на родном"}],"is_act_final":false,"is_final":false}');
    } catch(e) {
      if (String(e.message||'').startsWith('KEY:')) { keyWizard(true); return; }
      if (Q.scene === 1 && cfg.actIndex === 1) {

    attachTapAll(null, [...(sc.encountered_words||[]), ...(sc.answer_glossary||[])]);
