/* ---------- Construction: построение фраз (проверка через Gemini) ---------- */
function drillConstruct(s) {
  const c = s.c, key = 'st'+L.i;
  let mustRetype = false, correctForm = c.expected_target;
  Screen.show(`
    <div class="eyebrow">${esc(L.code)} · Construction</div>
    <div class="card">
      <div class="drill-head"><span class="n">${esc(s.n)}</span><span class="ph">🧩 фраза</span></div>
      <div class="task-text">🎯 ${esc(c.prompt_native)}</div>
      <input type="text" id="ans" placeholder="Фраза на ${esc(langName(DB.profile.targetLang))}" autocomplete="off" autocapitalize="off">
      <div class="feedback" id="fb"></div>
      <div class="btn-row" style="margin-top:12px">
        <button class="btn btn-ghost btn-ico" id="hint" title="Подсказка" aria-label="Подсказка">💡</button>
        ${L.grammar?`<button class="btn btn-ghost btn-ico" id="rule" title="Правило" aria-label="Правило">📐</button>`:''}
        <button class="btn btn-primary" id="check">Проверить</button>
      </div>
    </div>`);
  if (L.grammar) $('#rule').onclick = () => { L.hints++; showRulePopup(L.grammar); };
  $('#hint').onclick = () => { L.hints++; $('#fb').className='feedback ok'; $('#fb').innerHTML=`💡 Опорное слово: <b>${esc(c.focus_word||'')}</b>. Начало: <b>${esc(correctForm.split(' ').slice(0,2).join(' '))}…</b>`; };
  $('#check').onclick = async () => {
    const a = $('#ans').value.trim();
    if (!a) return;
    if (mustRetype) {
      if (norm(a) === norm(correctForm)) { passOK(); } else { $('#fb').className='feedback bad'; $('#fb').innerHTML=`❌ Введите точно: <b>${esc(correctForm)}</b>`; }
      return;
    }
    if (norm(a) === norm(correctForm)) { firstTry(key, true); return passOK(); }
    // строгий контракт check_answer (раздел 2.5, пример B)
    $('#check').disabled = true; $('#fb').className='feedback ok'; $('#fb').textContent='Проверяю…';
    let res = null;
    try {
      res = await Gemini.call({ task:'check_answer', target_lang:DB.profile.targetLang, native_lang:DB.profile.nativeLang,
        cefr: curCefr(), expected: c.expected_target, user_answer: a,
        rules:'Проверяй по СМЫСЛУ и грамматике, а не по точному совпадению строк. Равноценные грамматические формы — ВЕРНЫ (correct=true): слитные формы предлога с артиклем in dem = im, zu dem = zum, an dem = am, bei dem = beim, von dem = vom и любые иные равнозначные варианты. Если ответ верен, но есть более естественная/частая форма — correct=true, заполни note мягкой подсказкой на native_lang («Верно. Кстати, чаще пишут слитно: im = in dem») И заполни rule_title/rule_summary этим правилом (например про слитные формы), чтобы оно попало в Свод правил. Если есть настоящая ошибка — в explanation короткий разбор ИМЕННО этой ошибки, а в rule_title/rule_summary правило точно под неё (полно), на native_lang; rule_table — полный набор форм по теме.' },
        '{"correct":true,"error_type":"spelling|article|word_order|verb_conjugation|vocabulary_gap|none","note":"мягкая подсказка если ответ верен но есть лучший вариант, иначе пусто","explanation":"короткий разбор именно этой ошибки на родном","correct_form":"верная фраза","correct_translit":"[транскрипция верной фразы родными буквами]","rule_title":"короткое название правила под эту ошибку (на родном)","rule_summary":"правило целиком, 2-4 фразы на родном","rule_categories":["одна или несколько из: Артикли, Существительные, Глаголы, Времена, Падежи, Предлоги, Порядок слов, Местоимения, Прочее"],"rule_table":[{"form":"форма на целевом","translit":"[транскрипция]","translation":"перевод"}]}');
    } catch(e){}
    $('#check').disabled = false;
    if (!res) { toast('Связь барахлит — ответ засчитан', true); firstTry(key, true); return passOK(null); }
    if (res.correct) { firstTry(key, true); return passOK(res); }
    firstTry(key, false);
    L.errors.construction++; if (c.focus_word) noteWordError(c.focus_word);
    correctForm = (res && res.correct_form) || c.expected_target;
    const cTr = (res && res.correct_translit) ? ` <span style="color:var(--orange)">${esc(res.correct_translit)}</span>` : '';
    mustRetype = true;
    $('#fb').className='feedback bad';
    $('#fb').innerHTML = `❌ ${esc(res?.explanation || 'Есть ошибка.')}<br>Верно: <b>${esc(correctForm)}</b>${cTr}` + sayBtn(correctForm) + `<br>🧠 Запомните и введите верный вариант, чтобы продолжить.`;
    speak(correctForm, DB.profile.targetLang);   // сразу озвучиваем верное — запоминание, не угадайка
    showErrorRule(res);   // точное правило под ошибку — сразу
    $('#ans').value=''; $('#ans').focus();
  };
  function passOK(res) {
    $('#fb').className='feedback ok';
    const note = res && res.note ? `<br><span style="color:var(--orange);font-size:13px">💡 ${esc(res.note)}</span>` : '';
    $('#fb').innerHTML = `✅ <b>${esc(correctForm)}</b>` + sayBtn(correctForm) + note;
    speak(correctForm, DB.profile.targetLang);
    if (res && res.note) saveErrorRule(ruleFromCheck(res));   // слитные формы и т.п. — в Свод правил
    $('#check').textContent='Дальше'; $('#check').disabled=false;
    $('#check').onclick = () => { L.i++; renderStep(); };
  }
}

/* =====================================================================
   КВЕСТ — интерактивный рассказ с развилками 2×2 (раздел 5.A).
   Каркас жёсткий (приложение), реакция живая (Gemini). Anti-Frustration:
   после 2 ошибок — режим напарника и Graceful Exit.
   ===================================================================== */
// Длина квеста растёт с уровнем: связный рассказ 8–12+ предложений (версия 4.12)
function questScenes(lvl){ return ({A1:8, A2:9, B1:11, B2:13, C1:15, C2:15})[lvl] || 8; }
async function runQuest(cfg) {
  const p = DB.profile;
  const Q = { scene:1, errors:0, summary:'', choice:null, branchesUsed:0 };
  nextScene();

  async function nextScene() {
    Screen.loader(`Сцена ${Q.scene} из ${cfg.maxScenes}…`);
    let sc;
    try {
      sc = await Gemini.call({
        task:'quest_step', target_lang:p.targetLang, native_lang:p.nativeLang, cefr:cfg.cefr,
        topic:cfg.topic, must_use:cfg.mustUse, scene_index:Q.scene, max_scenes:cfg.maxScenes,
        user_choice:Q.choice, story_so_far:Q.summary,
        rules:'Всего в истории ровно 2 развилки по 2 варианта; развилок уже использовано: '+Q.branchesUsed+'. Конкретная чувственная сцена в сфере интересов. На последней сцене обязательно заверши историю (is_final=true, без развилки). prompt_for_user просит написать фразу на целевом языке. В encountered_words верни значимые НЕслужебные слова, встреченные в тексте сцены (существительные/глаголы/прилагательные), с транскрипцией родными буквами и переводом — до 5 штук.'
      },
      '{"scene_text":"текст сцены на целевом языке (объём по CEFR)","native_hint":"перевод-подсказка на родном","prompt_for_user":"задание на родном: какую фразу написать","expected_target":"эталонная фраза на целевом","encountered_words":[{"term":"слово на целевом","translit":"[транскрипция]","translation":"перевод"}],"is_branch":false,"choices":[{"id":"A","label_target":"вариант на целевом"},{"id":"B","label_target":"вариант на целевом"}],"is_final":false}');
    } catch(e) {
      toast('Связь прервалась — квест засчитан', true);
      return cfg.onDone();
    }
    // слова, встреченные в контексте сцены, — в словарь (без дублей), статус «встречено в контексте»
    (sc.encountered_words||[]).forEach(w => {
      if (!w || !w.term) return;
      const ex = DB.vocab.find(v=>norm(v.term)===norm(w.term));
      if (ex) { ex.seen_in_context = true; if (w.translit && !ex.translit) ex.translit = w.translit; return; }
      DB.vocab.push({ term:w.term, translation:w.translation||'', translit:w.translit||'', emoji:'💬',
        part_of_speech:'', article:'', is_irregular:false, forms:'',
        lesson:'CONTEXT', errors:0, status:'встречено в контексте', source:'quest',
        seen_in_context:true, mnemonic:'', date_added:today(), date_review:today() });
    });
    Storage.save(DB);
    const isFinal = sc.is_final || Q.scene >= cfg.maxScenes;
    let mustRetype = false, correctForm = sc.expected_target || '';
    Screen.show(`
      <div class="eyebrow">${esc(cfg.title||'Квест')}</div>
      <div class="segbar">${Array.from({length:cfg.maxScenes},(_,i)=>`<i class="${i<Q.scene?'on':''} ${i===cfg.maxScenes-1&&i<Q.scene?'hot':''}"></i>`).join('')}</div>
      <div class="scene">
        <div class="target">${esc(sc.scene_text)} <button class="tts" style="vertical-align:middle" id="sayScene">🔊</button></div>
        <div class="hint">${esc(sc.native_hint||'')}</div>
      </div>
      <div class="chiplist must">${cfg.mustUse.map(m=>`<span class="chip">${esc(m)}</span>`).join('')}</div>
      <div class="card">
        <div class="task-text" style="font-size:16px">🎯 ${esc(sc.prompt_for_user||'Ответьте на целевом языке')}</div>
        <input type="text" id="ans" autocomplete="off" autocapitalize="off" placeholder="Ваша фраза…">
        <div class="feedback" id="fb"></div>
        <div class="btn-row" style="margin-top:12px">
          ${(L&&L.grammar)?`<button class="btn btn-ghost btn-ico" id="qrule" title="Правило" aria-label="Правило">📐</button>`:''}
          <button class="btn btn-primary" id="check">Отправить</button>
        </div>
      </div>`);
    if (L&&L.grammar) $('#qrule').onclick = () => { L.hints++; showRulePopup(L.grammar); };
    $('#sayScene').onclick = () => speak(sc.scene_text, p.targetLang);
    speak(sc.scene_text, p.targetLang);

    $('#check').onclick = async () => {
      const a = $('#ans').value.trim(); if (!a) return;
      if (mustRetype) {
        if (norm(a) === norm(correctForm)) return pass();
        $('#fb').className='feedback bad'; $('#fb').innerHTML=`Введите точно: <b>${esc(correctForm)}</b>`; return;
      }
      if (correctForm && norm(a) === norm(correctForm)) return pass();
      $('#check').disabled = true; $('#fb').className='feedback ok'; $('#fb').textContent='Проверяю…';
      let res = null;
      try {
        res = await Gemini.call({ task:'check_answer', target_lang:p.targetLang, native_lang:p.nativeLang, cefr:cfg.cefr,
          expected: correctForm || '(свободный ответ по смыслу сцены)', user_answer:a,
          allow_creative:true, rules:'Creative Path: если пользователь решил задачу своими словами без грубых ошибок — correct=true. Проверяй по смыслу, равноценные формы (in dem = im, zum, am…) — верны. Если есть ошибка — в rule_title/rule_summary сформулируй правило точно под эту ошибку (полно), на native_lang, и проставь rule_categories.' },
          '{"correct":true,"error_type":"spelling|article|word_order|verb_conjugation|vocabulary_gap|none","explanation":"короткий разбор именно этой ошибки на родном","correct_form":"верная фраза","correct_translit":"[транскрипция верной фразы родными буквами]","rule_title":"название правила под ошибку (на родном)","rule_summary":"правило целиком, 2-4 фразы на родном","rule_categories":["одна или несколько из: Артикли, Существительные, Глаголы, Времена, Падежи, Предлоги, Порядок слов, Местоимения, Прочее"],"rule_table":[{"form":"форма","translit":"[транскрипция]","translation":"перевод"}]}');
      } catch(e){}
      $('#check').disabled = false;
      if (!res) { toast('Связь барахлит — ответ засчитан', true); return pass(); }
      if (res.correct) return pass();
      Q.errors++; cfg.onError && cfg.onError();
      const qTr = (res && res.correct_translit) ? ` <span style="color:var(--orange)">${esc(res.correct_translit)}</span>` : '';
      if (Q.errors >= 2) { // Graceful Exit: напарник даёт ответ с мнемоникой
        $('#fb').className='feedback ok';
        $('#fb').innerHTML = `🤝 Я подскажу как напарник: <b>${esc(res?.correct_form||correctForm)}</b>${qTr}` + sayBtn(res?.correct_form||correctForm) + `<br>🧠 ${esc(res?.explanation||'Запомните эту конструкцию — она встретится снова.')}`;
        speak(res?.correct_form||correctForm, p.targetLang);
        showErrorRule(res);
        $('#check').textContent = isFinal ? 'Завершить квест' : 'Дальше';
        $('#check').onclick = () => advance(sc, isFinal, true);
        return;
      }
      mustRetype = true; correctForm = res?.correct_form || correctForm || a;
      $('#fb').className='feedback bad';
      $('#fb').innerHTML = `❌ ${esc(res?.explanation||'Есть ошибка, попробуйте ещё раз.')}<br>Верно: <b>${esc(correctForm)}</b>${qTr}` + sayBtn(correctForm) + ` — запомните и введите вручную.`;
      speak(correctForm, p.targetLang);
      showErrorRule(res);   // точное правило под ошибку — сразу
      $('#ans').value=''; $('#ans').focus();
    };
    function pass() {
      $('#fb').className='feedback ok';
      $('#fb').innerHTML = correctForm ? `✅ Отлично! <b>${esc(correctForm)}</b>` + sayBtn(correctForm) : `✅ Отлично!`;
      if (sc.is_branch && !isFinal && Array.isArray(sc.choices) && sc.choices.length>=2) {
        Q.branchesUsed++;
        $('#fb').innerHTML += `<div style="margin-top:10px">Развилка — что делаем дальше?</div>` +
          sc.choices.slice(0,2).map(c=>`<button class="opt" style="margin-top:8px" data-c="${esc(c.id)}">${esc(c.label_target)}</button>`).join('');
        document.querySelectorAll('[data-c]').forEach(b=>b.onclick=()=>{ Q.choice=b.dataset.c; advance(sc,false,false); });
        $('#check').style.display='none';
      } else {
        $('#check').textContent = isFinal ? 'Завершить квест' : 'Дальше';
        $('#check').onclick = () => advance(sc, isFinal, false);
      }
    }
  }
  function advance(sc, isFinal, partner) {
    Q.summary = (Q.summary + ' ' + sc.scene_text).slice(-700);
    if (isFinal) {
      Screen.show(`
        <div class="eyebrow">Квест завершён</div>
        <h1>${Q.errors>=2?'🤝 Дошли вместе!':'🏆 История пройдена!'}</h1>
        <p class="sub">${Q.errors>=2?'Ошибки — часть пути: трудные места вернутся в повторение.':'Лексика урока закреплена в живом сюжете.'}</p>
        <button class="btn btn-primary" id="go">Продолжить</button>`);
      $('#go').onclick = cfg.onDone;
    } else { Q.scene++; if (!sc.is_branch) Q.choice = null; nextScene(); }
  }
}

/* =====================================================================
   ЗАВЕРШЕНИЕ УРОКА: автосохранение (5.1) + диагностика-адаптация (2.7)
   «Gemini советует — приложение решает»; защита с откатом к метрикам.
   ===================================================================== */
const DIAG_TYPES  = ['recognition','spelling','verb_conjugation','word_order','vocabulary_gap','none'];
const DIAG_TRENDS = ['improving','stable','declining'];

async function finishLesson() {
  const acc = L.ft.total ? +(L.ft.ok / L.ft.total).toFixed(2) : 1;
  const prev = DB.analytics.length ? DB.analytics[DB.analytics.length-1].accuracy_first_try : null;
  const hard = Object.keys(L.wordErr).filter(t => L.wordErr[t] >= 2);

  // --- 1) Сбор: запись слов в «Словарь» ---
  L.words.forEach(w => {
    if (!DB.vocab.some(v => norm(v.term)===norm(w.term))) {
      DB.vocab.push({ term:w.term, translation:w.translation, translit:w.translit||'', emoji:w.emoji||'',
        part_of_speech: w.part_of_speech||'', article: w.article||'',
        is_irregular: !!w.is_irregular, forms: w.forms || w.irregular_forms || '', irregular_forms: w.irregular_forms||'',
        lesson: L.code, errors: L.wordErr[w.term]||0,
        status: (L.wordErr[w.term]||0) >= 2 ? 'на закреплении' : 'новое',
        mnemonic:'', date_added: today(), date_review: today() });
    }
  });
  hard.forEach(t => { if (!DB.reviewQueue.includes(t)) DB.reviewQueue.push(t); });
  DB.vocab.forEach(v => { if ((v.errors||0)===0 && v.lesson !== L.code) v.status='освоено'; });

  // --- 2) Диагностика (Gemini, строго из словаря категорий) ---
  Screen.loader('Сохраняю и анализирую урок…');
  let diag = null;
  try {
    const d = await Gemini.call({ task:'diagnose', native_lang:DB.profile.nativeLang, cefr:curCefr(),
      summary:{ accuracy_first_try:acc, errors_by_type:L.errors, hard_words:hard, prev_accuracy:prev } },
      '{"dominant_error_type":"recognition|spelling|verb_conjugation|word_order|vocabulary_gap|none","risk_words":["..."],"confidence_trend":"improving|stable|declining","note_native":"1 короткое предложение на родном языке"}');
    if (DIAG_TYPES.includes(d.dominant_error_type) && DIAG_TRENDS.includes(d.confidence_trend)) diag = d;
  } catch(e){} // откат к чистым метрикам — обучение не блокируется

  // --- 3) Действие: жёсткие правила в коде ---
  (diag?.risk_words||[]).forEach(t => { if (DB.vocab.some(v=>norm(v.term)===norm(t)) && !DB.reviewQueue.includes(t)) DB.reviewQueue.push(t); });
  let next = nextAfterLesson(L.code), note = 'PASS';
  if (acc < 0.70) {                                   // слабый результат: идём дальше, но усиливаем повторение
    note = 'REVIEW';
    L.words.forEach(w => { if (!DB.reviewQueue.includes(w.term)) DB.reviewQueue.push(w.term); });
    DB.vocab.forEach(v => { if (L.words.some(w=>norm(w.term)===norm(v.term))) v.status = 'на закреплении'; });
  }

  // --- листы «Прогресс» и «Аналитика» ---
  DB.progress.push({ code:L.code, date:today(), words:L.words.map(w=>w.term).join(', '), next, note });
  DB.analytics.push({ lesson:L.code, date:today(), accuracy_first_try:acc, errors_by_type:L.errors,
    hard_words:hard, duration_sec: Math.round((Date.now()-L.t0)/1000), hints_used:L.hints,
    delta_accuracy: prev==null ? '' : ((acc-prev)>=0?'+':'')+ (acc-prev).toFixed(2) });
  DB.nextStage = next;
  DB.profile.cefr = parseCode(next.startsWith('EXAM_') ? next.replace('EXAM_','')+'.01' : next)?.lvl || DB.profile.cefr;
  Storage.save(DB);
  toast('Сохранено ✓');

  // --- завершающий экран (5.1): простая фраза, крупные кнопки ---
  const code = L.code, hintsUsed = L.hints; L = null;
  Screen.show(`
    <div class="eyebrow">Точность: ${Math.round(acc*100)}% · подсказок: ${hintsUsed}</div>
    <h1>Урок ${esc(code)} завершён, прогресс сохранён.</h1>
    <p class="sub">${diag?.note_native ? '💡 '+esc(diag.note_native) : (note==='REVIEW' ? 'Точность ниже 70% — лексика урока добавлена в усиленное повторение, но движемся вперёд.' : 'Что дальше?')}</p>
    ${hard.length?`<div class="chiplist">${hard.map(h=>`<span class="chip warn">⚠️ ${esc(h)}</span>`).join('')}</div><p class="note">Эти слова вернутся в Recap и супер-урок.</p>`:''}
    <div style="height:8px"></div>
    <button class="btn btn-primary" id="bNext">${next.startsWith('EXAM_')?'Экзамен '+esc(next.replace('EXAM_','')):'Следующий урок '+esc(next)}</button>
    <button class="btn btn-ghost" id="bSuper">Супер-урок (повторение)</button>
    <button class="btn btn-ghost" id="bTalk">🎙️ Поговорить</button>
    <button class="btn btn-ghost" id="bExit">Выход в меню</button>`);
  $('#bNext').onclick  = () => next.startsWith('EXAM_') ? startExam(next) : startLesson(next);
  $('#bSuper').onclick = startSuperLesson;
  $('#bTalk').onclick  = startDialogue;
  $('#bExit').onclick  = mainMenu;
}

/* =====================================================================
   СУПЕР-УРОК — 30-Step Loop (раздел 6): 80% повторение из KNOWN_VOCAB,
   20% новая функциональная лексика; квесты на шагах 10, 20 и 30.
   ===================================================================== */
async function startSuperLesson() {
  const p = DB.profile, lvl = p.cefr;
  const base = DB.nextStage.startsWith('EXAM_') ? DB.nextStage.replace('EXAM_','')+'.25' : DB.nextStage;
  Screen.loader('Готовлю супер-урок…');
  const knownSample = pick(DB.vocab, Math.min(20, DB.vocab.length)).map(w=>w.term);
  const imported = DB.vocab.filter(w=>w.priority || w.source==='import').map(w=>w.term);
  const riskQueue = DB.vocab.filter(w=>DB.reviewQueue.includes(w.term)).map(w=>w.term);
  const riskFirst = [...new Set([...imported, ...riskQueue])];
  const intensiveTopic = DB.intensive && imported.length
    ? (p.interests ? p.interests + '; ' : '') + 'прикладная отработка импортированных профессиональных терминов в реальных рабочих сценариях'
    : p.interests;
  const sp = { p, lvl, base, knownSample, priority: riskFirst.slice(0,7), topic:intensiveTopic };
  // ПОРЦИЯ 1 (быстрый старт): новые связки + 9 заданий-связок
  let plan1;
  try {
    plan1 = await Gemini.call({
      task:'super_lesson_plan', part:'link', target_lang:p.targetLang, native_lang:p.nativeLang, cefr:lvl,
      topic:intensiveTopic, known_vocab:knownSample, priority_words:sp.priority,
      rules:'80% — повторение known_vocab (СТРОГО приоритет priority_words — профессиональные термины пользователя), 20% — новая функциональная лексика (предлоги, союзы, частицы). Запрещён обратный перевод. Формулировки заданий — на родном языке.'
    },
    '{"functional_new":[{"term":"связка/предлог","emoji":"эмодзи","translit":"[родными буквами]","translation":"перевод"}] — ровно 2,'+
    '"link_drills":[{"prompt_native":"задание: старое слово + новая связка","expected_target":"эталон"}] — ровно 9}');
    if (!plan1.link_drills?.length) throw new Error('EMPTY');
  } catch(e) {
    if (String(e.message||'').startsWith('KEY:')) return keyWizard(true);
    return lessonLoadError(startSuperLesson, e);
  }
  // новые функциональные слова — в словарь
  (plan1.functional_new||[]).forEach(w => {
    if (w.term && !DB.vocab.some(v=>norm(v.term)===norm(w.term)))
      DB.vocab.push({ term:w.term, translation:w.translation||'', translit:w.translit||'', emoji:w.emoji||'',
        irregular:false, forms:'', lesson:'SUPER_'+base, errors:0, status:'новое', mnemonic:'', date_added:today(), date_review:today() });
  });

  const steps = [];
  (plan1.link_drills||[]).slice(0,9).forEach((c,i)=>steps.push({t:'construct', n:`Шаг ${i+1}/30`, c}));
  steps.push({t:'quest1'});
  for (let i=0;i<9;i++) steps.push({t:'construct', n:`Шаг ${i+11}/30`, group:'sent', gi:i});
  steps.push({t:'quest2'});
  for (let i=0;i<9;i++) steps.push({t:'construct', n:`Шаг ${i+21}/30`, group:'gram', gi:i});
  steps.push({t:'quest3'});

  L = { code:'SUPER_'+base, isSuper:true, words:[], steps, i:0, sp,
        superParts:{ sent:{state:'idle',promise:null,err:null,data:null}, gram:{state:'idle',promise:null,err:null,data:null} },
        errors:{recognition:0,writing:0,construction:0,quest:0},
        ft:{ok:0,total:0}, hints:0, t0:Date.now(), wordErr:{}, firstTryDone:{} };
  fetchSuperPart('sent');   // предложения — в фоне, пока ученик делает связки
  renderSuperStep();
}

// Фоновые порции супер-урока: 'sent' (предложения) и 'gram' (грамматика), по 9 заданий.
function fetchSuperPart(which) {
  if (!L || !L.superParts) return;
  const part = L.superParts[which]; if (part.state==='loading'||part.state==='ready') return part.promise;
  const sp = L.sp;
  const taskName = which==='sent' ? 'sentence_drills' : 'grammar_drills';
  const promptRule = which==='sent'
    ? 'Развёрнутые предложения по интересам/контексту пользователя, активно вплетая priority_words. Запрещён обратный перевод. Формулировки — на родном.'
    : 'Грамматический тренинг / свободное построение, с приоритетом priority_words. Запрещён обратный перевод. Формулировки — на родном.';
  part.state='loading'; part.err=null;
  part.promise = (async () => {
    const r = await Gemini.call({
      task:'super_lesson_plan', part:which, target_lang:sp.p.targetLang, native_lang:sp.p.nativeLang, cefr:sp.lvl,
      topic:sp.topic, known_vocab:sp.knownSample, priority_words:sp.priority, rules:promptRule
    },
    '{"'+taskName+'":[{"prompt_native":"задание на родном","expected_target":"эталон"}] — ровно 9}');
    const arr = (r[taskName]||[]).filter(i=>i.prompt_native && i.expected_target).slice(0,9);
    if (arr.length < 3) throw new Error('FEW_DRILLS');
    part.data = arr; part.state='ready';
  })().catch(e => { part.state='error'; part.err=e; throw e; });
  return part.promise;
}
async function ensureSuperPart(which) {
  const part = L.superParts[which];
  if (part.state==='ready') return true;
  if (part.state==='idle') fetchSuperPart(which);
  Screen.loader('Догружаю супер-урок…');
  try { await part.promise; return true; }
  catch(e) {
    if (String(e.message||'').startsWith('KEY:')) { keyWizard(true); return false; }
    lessonLoadError(()=>{ fetchSuperPart(which); ensureSuperPart(which).then(ok=>{ if(ok) renderSuperStep(); }); }, e);
    return false;
  }
}
function renderSuperStep() {
  if (L.i >= L.steps.length) return finishSuper();
  const s = L.steps[L.i];
  if (s.t==='construct') {
    if (s.c) return drillConstruct(s);
    const part = L.superParts[s.group];
    if (part && part.state==='ready') { s.c = part.data[s.gi % part.data.length]; return drillConstruct(s); }
    return ensureSuperPart(s.group).then(ok => { if(!ok) return; const pt=L.superParts[s.group]; s.c = pt.data[s.gi % pt.data.length]; drillConstruct(s); });
  }
  const qcfg = (mu, sc, title) => ({ title, topic:DB.profile.interests, cefr:DB.profile.cefr,
    mustUse:mu, maxScenes:sc, onError:()=>{L.errors.quest++;}, onDone:()=>{L.i++; renderSuperStep();} });
  const lastTerms = DB.vocab.slice(-10).map(w=>w.term);
  if (s.t==='quest1') { fetchSuperPart('sent'); fetchSuperPart('gram'); return runQuest(qcfg(pick(lastTerms,3), 1, 'Шаг 10 · Quest #1')); }
  if (s.t==='quest2') { fetchSuperPart('gram'); return runQuest(qcfg(pick(DB.vocab.map(w=>w.term), Math.min(5,DB.vocab.length)), 1, 'Шаг 20 · Quest #2')); }
  if (s.t==='quest3') return runQuest(qcfg(pick(DB.vocab.map(w=>w.term), Math.min(5,DB.vocab.length)), 2, 'Шаг 30 · Final Mission'));
}
/* В супер-уроке используется тот же drillConstruct: он вызывает renderStep,
   поэтому renderStep маршрутизирует по флагу isSuper. */
const _renderStepLesson = renderStep;
renderStep = function() {
  if (L && L.isSuper) return renderSuperStep();
  return _renderStepLesson();
};
async function finishSuper() {
  const acc = L.ft.total ? +(L.ft.ok/L.ft.total).toFixed(2) : 1;
  const hard = Object.keys(L.wordErr).filter(t=>L.wordErr[t]>=2);
  hard.forEach(t=>{ if(!DB.reviewQueue.includes(t)) DB.reviewQueue.push(t); });
  // слова без ошибок в супер-уроке считаем закреплёнными
  DB.vocab.forEach(v => { if (DB.reviewQueue.includes(v.term) && !(L.wordErr[v.term])) {
    DB.reviewQueue = DB.reviewQueue.filter(x=>x!==v.term); v.status='освоено'; v.date_review=today(); }});
  DB.progress.push({ code:L.code, date:today(), words:hard.join(', '), next:DB.nextStage, note:'PASS' });
  DB.analytics.push({ lesson:L.code, date:today(), accuracy_first_try:acc, errors_by_type:L.errors,
    hard_words:hard, duration_sec:Math.round((Date.now()-L.t0)/1000), hints_used:L.hints, delta_accuracy:'' });
  Storage.save(DB); toast('Сохранено ✓');
  const code = L.code; L = null;
  Screen.show(`
    <h1>Супер-урок завершён, прогресс сохранён.</h1>
    <p class="sub">Точность: ${Math.round(acc*100)}%. Повторение — половина успеха. Что дальше?</p>
    <button class="btn btn-primary" id="bN">Следующий этап: ${esc(DB.nextStage)}</button>
    <button class="btn btn-ghost" id="bE">Выход в меню</button>`);
  $('#bN').onclick = () => DB.nextStage.startsWith('EXAM_') ? startExam(DB.nextStage) : startLesson(DB.nextStage);
  $('#bE').onclick = mainMenu;
}

/* =====================================================================
   ЭКЗАМЕНЫ (раздел 7) и работа над ошибками (раздел 8)
   ===================================================================== */
const EXAM_QUESTIONS = 50;
function buildExamQuestions() {
  const pool = DB.vocab.slice();
  const n = Math.min(EXAM_QUESTIONS, Math.max(10, pool.length * 2));
  const qs = [];
  for (let i=0;i<n;i++) {
    const w = pool[i % pool.length];
    if (i % 3 === 2 && pool.length >= 4) {           // письмо
      qs.push({ kind:'write', w });
    } else {                                          // выбор
      const fill = pick(pool.filter(x=>x.term!==w.term), 3);
      qs.push({ kind:'mcq', w, opts: shuffle([w, ...fill]) });
    }
  }
  return shuffle(qs);
}
function startExam(examCode) {
  if (DB.vocab.length < 4) { toast('Слишком мало слов для экзамена', true); return mainMenu(); }
  const qs = buildExamQuestions();
  const E = { code:examCode, qs, i:0, ok:0, wrong:[] };
  Screen.show(`
    <div class="eyebrow">Экзамен</div>
    <h1>${esc(examCode.replace('EXAM_',''))} · ${qs.length} вопросов</h1>
    <p class="sub">По одному вопросу на экран, без подсказок. Порог сдачи — 85%. Результат объявлю после последнего ответа.</p>
    <button class="btn btn-accent" id="go">Начать экзамен</button>
    <button class="btn btn-ghost" id="back">Позже</button>`, { back: mainMenu });
  $('#go').onclick = () => examStep(E);
  $('#back').onclick = mainMenu;
}
function examStep(E) {
  if (E.i >= E.qs.length) return examResult(E);
  const q = E.qs[E.i], w = q.w;
  const head = `<div class="eyebrow">Экзамен · ${E.i+1} / ${E.qs.length}</div>`;
  if (q.kind==='mcq') {
    Screen.show(`${head}<div class="card">
      <div class="task-text">${esc(w.emoji||'')} ${esc(w.translation)}</div>
      ${q.opts.map(o=>`<button class="opt" data-t="${esc(o.term)}">${esc(o.term)}</button>`).join('')}</div>`);
    document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{
      if (norm(b.dataset.t)===norm(w.term)) E.ok++; else E.wrong.push(w);
      E.i++; examStep(E);
    });
  } else {
    Screen.show(`${head}<div class="card">
      <div class="task-text">Напишите: ${esc(w.emoji||'')} ${esc(w.translation)}</div>
      <input type="text" id="ans" autocomplete="off" autocapitalize="off">
      <button class="btn btn-primary" id="ok" style="margin-top:12px">Ответить</button></div>`);
    $('#ok').onclick = () => {
      if (norm($('#ans').value)===norm(w.term)) E.ok++; else E.wrong.push(w);
      E.i++; examStep(E);
    };
  }
}
function examResult(E) {
  const pct = E.ok / E.qs.length;
  const lvlKey = E.code;
  const passed = pct >= EXAM_PASS;
  if (passed) {
    DB.examAttempts[lvlKey] = 0;
    const next = nextAfterExamPass(E.code);
    DB.progress.push({ code:E.code+'_PASS', date:today(), words:'', next, note:`${E.ok}/${E.qs.length}` });
    DB.nextStage = next; DB.profile.cefr = parseCode(next).lvl;
    Storage.save(DB); toast('Сохранено ✓');
    Screen.show(`<h1>🏆 Экзамен сдан: ${E.ok}/${E.qs.length}</h1>
      <p class="sub">Переход на новый уровень. Следующий урок: <b style="color:var(--ink)">${esc(next)}</b>.</p>
      <button class="btn btn-primary" id="go">Дальше</button>`);
    $('#go').onclick = mainMenu;
    return;
  }
  DB.examAttempts[lvlKey] = (DB.examAttempts[lvlKey]||0) + 1;
  const attempt = DB.examAttempts[lvlKey];
  if (attempt === 1) {
    DB.progress.push({ code:E.code+'_FAIL-1', date:today(), words:'', next:E.code, note:`${E.ok}/${E.qs.length}` });
    Storage.save(DB); toast('Сохранено ✓');
    Screen.show(`<h1>Результат: ${E.ok}/${E.qs.length}</h1>
      <p class="sub">До порога 85% не хватило. Это первая попытка — экзамен можно пересдать сразу или после повторения.</p>
      <button class="btn btn-primary" id="re">Пересдать экзамен</button>
      <button class="btn btn-ghost" id="sup">Супер-урок перед пересдачей</button>
      <button class="btn btn-ghost" id="m">В меню</button>`);
    $('#re').onclick = () => startExam(E.code); $('#sup').onclick = startSuperLesson; $('#m').onclick = mainMenu;
  } else {
    // второй провал → режим работы над ошибками (раздел 8)
    startRemedial(E);
  }
}
function startRemedial(E) {
  const items = [];
  E.wrong.slice(0, 12).forEach(w => { items.push({w, pass:1}); items.push({w, pass:2}); }); // 2 штрафных на ошибку
  let i = 0;
  Screen.show(`<h1>Работа над ошибками</h1>
    <p class="sub">Второй провал — не приговор, а сигнал. Разберём каждую ошибку: по два задания на слово, по одному на экран. Двигаемся только после верного ответа.</p>
    <button class="btn btn-primary" id="go">Начать разбор</button>`);
  $('#go').onclick = step;
  function step() {
    if (i >= items.length) return done();
    const {w, pass} = items[i];
    if (DB.reviewQueue.indexOf(w.term)<0) DB.reviewQueue.push(w.term);
    ensureMnemonic(DB.vocab.find(v=>v.term===w.term)||w);
    Screen.show(`<div class="eyebrow">Разбор · ${i+1} / ${items.length}</div>
      <div class="card">
        <div class="task-text">${esc(w.emoji||'')} ${esc(w.translation)} <span style="color:var(--orange);font-size:14px">${esc(w.translit||'')}</span></div>
        ${pass===1?`<div class="feedback ok" style="display:block;margin-bottom:10px">🧠 Верный ответ: <b>${esc(w.term)}</b>${w.mnemonic?'<br>'+esc(w.mnemonic):''} — введите его вручную.</div>`:''}
        <input type="text" id="ans" autocomplete="off" autocapitalize="off" placeholder="${pass===1?'Перепишите слово':'Теперь по памяти'}">
        <div class="feedback" id="fb"></div>
        <button class="btn btn-primary" id="ok" style="margin-top:12px">Проверить</button>
      </div>`);
    $('#ok').onclick = () => {
      if (norm($('#ans').value)===norm(w.term)) { speak(w.term, DB.profile.targetLang); i++; step(); }
      else { $('#fb').className='feedback bad'; $('#fb').innerHTML=`❌ Верно: <b>${esc(w.term)}</b> — введите ещё раз.`; $('#ans').value=''; }
    };
  }
  function done() {
    DB.examAttempts[E.code] = 0; // после remedial — снова к экзамену
    DB.progress.push({ code:E.code.replace('EXAM_','EXAM_')+'_REMEDIAL', date:today(),
      words: E.wrong.map(w=>w.term).join(', '), next:E.code, note:'' });
    Storage.save(DB); toast('Сохранено ✓');
    Screen.show(`<h1>Разбор завершён, прогресс сохранён.</h1>
      <p class="sub">Исправленные слова добавлены в очередь повторения. Возвращаемся к экзамену.</p>
      <button class="btn btn-primary" id="re">Пересдать экзамен</button>
      <button class="btn btn-ghost" id="m">В меню</button>`);
    $('#re').onclick = () => startExam(E.code); $('#m').onclick = mainMenu;
  }
}

/* =====================================================================
   ГОЛОСОВОЙ ДИАЛОГ «Поговорить» (раздел 5.B): STT → Gemini → TTS,
   двойной ввод (голос/текст), напарник, а не судья.
   ===================================================================== */
function startDialogue() {
  const p = DB.profile;
  const mustUse = pick(DB.vocab.slice(-15).map(w=>w.term), Math.min(2, DB.vocab.length));
  const history = [];
  let turns = 0;
  Screen.show(`
    <div class="eyebrow">Поговорить · тема: ${esc(String(p.interests).split(/[,;]/)[0]||'')}</div>
    <div class="chat" id="chat"></div>
    <div class="chat-input">
      <button class="mic" id="mic" aria-label="Говорить">🎙️</button>
      <input type="text" id="msg" placeholder="Или напишите ответ…">
      <button class="btn btn-primary btn-mini" id="send" style="margin:0">➤</button>
    </div>
    <button class="btn btn-ghost" id="endD" style="margin-top:10px">Завершить диалог</button>`,
    { back: endDialogue });
  const chat = $('#chat');
  const add = (role, text, sub) => {
    const d = document.createElement('div');
    d.className = 'msg ' + role;
    d.innerHTML = esc(text) + (sub?`<small>${esc(sub)}</small>`:'');
    chat.appendChild(d); chat.scrollTop = chat.scrollHeight;
  };
  async function aiTurn(userText) {
    if (userText) { add('user', userText); history.push({role:'user', text:userText}); }
    add('ai', '…');
    let r = null;
    try {
      r = await Gemini.call({ task:'dialogue', target_lang:p.targetLang, native_lang:p.nativeLang, cefr:p.cefr,
        topic:p.interests, must_use:mustUse, history: history.slice(-10),
        rules:'Ты — доброжелательный напарник, а не судья. Реплики короткие, по уровню CEFR. Грубые ошибки — мягкая поправка в gentle_correction, мелкие — поощряй. После 6–8 обменов плавно завершай (is_final=true).' },
        '{"reply_target":"реплика на целевом языке","reply_native":"перевод на родной","understood":true,"gentle_correction":"мягкая поправка на родном или null","is_final":false}');
    } catch(e){}
    chat.lastChild.remove();
    if (!r) { add('ai','Связь прервалась — попробуйте ещё раз.'); return; }
    add('ai', r.reply_target, r.reply_native + (r.gentle_correction ? '\n🤝 ' + r.gentle_correction : ''));
    history.push({role:'ai', text:r.reply_target});
    speak(r.reply_target, p.targetLang);
    turns++;
    if (r.is_final) setTimeout(endDialogue, 2500);
  }
  function endDialogue() {
    try { speechSynthesis.cancel(); } catch(e){}
    if (turns > 0) {
      DB.analytics.push({ lesson:'DIALOGUE', date:today(), accuracy_first_try: masteryPercent()/100 || 0.8,
        errors_by_type:{dialogue:0}, hard_words:[], duration_sec:0, hints_used:0, delta_accuracy:'' });
      Storage.save(DB); toast('Сохранено ✓');
    }
    mainMenu();
  }
  $('#send').onclick = () => { const v = $('#msg').value.trim(); if (v){ $('#msg').value=''; aiTurn(v);} };
  $('#msg').onkeydown = e => { if (e.key==='Enter') $('#send').click(); };
  $('#endD').onclick = endDialogue;
  const mic = $('#mic');
  const rec = makeRecognizer(p.targetLang, t => { mic.classList.remove('rec'); aiTurn(t); }, () => mic.classList.remove('rec'));
  mic.onclick = () => {
    if (!rec) return toast('Распознавание речи недоступно — пишите текстом', true);
    if (mic.classList.contains('rec')) { rec.stop(); mic.classList.remove('rec'); }
    else { mic.classList.add('rec'); try { rec.start(); } catch(e){ mic.classList.remove('rec'); } }
  };
  aiTurn(null); // AILEX начинает разговор
}

/* ---------- запуск ---------- */
try { const _ss = document.getElementById('sysStatus'); if (_ss) _ss.textContent = 'SYSTEM ONLINE · ' + APP_VERSION; } catch(_){}
splashScreen(boot);

</script>

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
